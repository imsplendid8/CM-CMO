function meter(text,limit){
  const c=charLen(text),u=utf8Len(text),e=euckrLen(text);
  const col=c>limit?"var(--bad)":c>limit*.85?"var(--mid)":"var(--good)";
  return `<div class="meter"><div class="meter-bar"><div class="meter-fill" style="width:${Math.min(100,c/limit*100)}%;background:${col}"></div></div>
    <div class="meter-num" style="color:${col}">${c}자 <small>/${limit} · ${u}B(UTF-8) · ${e}B(EUC-KR)</small></div></div>`;
}

  if(p.delivery==="bridge") T.push({id:"bridge",pri:"상",what:"분기(carrotBridge) 색인·canonical 정리",
    why:`<code>carrotBridge.do</code>는 <b>캐롯으로 URL이 분기(이동)</b>되는 페이지 — 브릿지 자체 색인은 거의 없고(전체 55건) 랭킹·링크에쿼티는 캐롯이 가져갑니다. <code>campaignId</code> 파라미터로 URL도 중복됩니다.`,
    before:`<!-- ${p.path}\n     302(추정) 이동 · canonical 없음 · campaignId=... 로 URL 중복 -->`,
    after:`<!-- 목적지가 정본이면: 301 영구이동 + canonical 통일 -->\n<link rel="canonical" href="${p.destUrl}">\n<!-- CM이 랭킹을 직접 확보하려면: 브릿지 대신 hanwhadirect에 상품 콘텐츠 랜딩을 두고 캐롯 견적으로 연결 -->`});

  if(p.delivery!=="bridge") T.push({id:"mobile",pri:"중",what:"모바일(m.)·PC(www) 메타 일치 + canonical",

    before:`<!-- m.hanwhadirect.com 과 www 메타 상이/canonical 누락 가능 -->`,

  if(p.exTitleV==="bad"&&p.delivery==="direct") T.push({id:"h1",pri:"중",what:"H1을 상품명으로 1회만 지정",
    why:`가입 SPA가 통짜 색인돼 주제 신호가 폼 UI에 묻힘 — 페이지당 &lt;h1&gt; 1회`,
    before:`<div class="logo">한화 다이렉트</div>  <!-- h1이 로고/스텝인 경우 -->`,after:`<h1>${c.h1}</h1>`});
  if(p.delivery==="home") T.push({id:"brand",pri:"중",what:"사이트명·브랜드 구조화(Organization/WebSite)",
    why:`메인은 <b>브랜드검색·사이트링크</b>의 기준 — 사이트명 JSON-LD로 네이버·구글 브랜드 노출을 강화합니다.`,

function readForm(){return{url:$("#f_url").value.trim(),brand:$("#f_brand").value.trim(),product:$("#f_product").value.trim(),
  keyword:$("#f_keyword").value.trim(),benefits:$("#f_benefits").value.trim(),title:$("#f_title").value.trim(),
  desc:$("#f_desc").value.trim(),og:$("#f_og").value,h1:$("#f_h1").value,alt:$("#f_alt").value,target:$("#f_target").value};}
function parseCrawlJson(raw){
  let o;try{o=JSON.parse(raw);}catch(e){toast("JSON 파싱 실패");return null;}
  if(Array.isArray(o))o=o[0]||{}; if(o.report)o=o.report;
  const out={};
  out.url=o.url||o.finalUrl||o.requestedUrl||(o.route&&o.route.url)||"";
  if(o.audits){const a=o.audits;const ia=a["image-alt"]&&a["image-alt"].details&&a["image-alt"].details.items;
    if(ia)out.alt=ia.length; if(a["meta-description"]&&a["meta-description"].score===0)out.desc="";
    out.og=a["structured-data"]?"partial":"none";}
  if(o.title!=null)out.title=o.title;
  if(o.description!=null)out.desc=o.description; else if(o.metaDescription!=null)out.desc=o.metaDescription;
  if(o.h1Count!=null)out.h1=o.h1Count; else if(o.h1!=null)out.h1=Array.isArray(o.h1)?o.h1.length:o.h1;
  if(o.imagesMissingAlt!=null)out.alt=o.imagesMissingAlt; else if(o.missingAlt!=null)out.alt=o.missingAlt;
  if(o.og!=null)out.og=(o.og===true?"yes":o.og===false?"none":o.og); else if(o.ogPresent!=null)out.og=o.ogPresent?"yes":"none";
  return out;
}
function nextSeoBlock(name,url,slug,c){
  return `// next-seo (garmeeh/next-seo) · ${name}\nimport { NextSeo } from 'next-seo';\n\nexport const seo = (\n  <NextSeo\n    title="${c.nt}"\n    description="${c.gd}"\n    openGraph={{\n      url: '${url}',\n      title: '${c.st}',\n      description: '${c.sd}',\n      images: [{ url: 'https://cdn.example.com/og/${slug}_1200x630.png', width: 1200, height: 630 }],\n    }}\n  />\n);`;
}
function jsonLdBlock(name,url,brand,c){

function unlighthouseCmd(url){let origin=url,path="/";try{const u=new URL(url);origin=u.origin;path=u.pathname||"/";}catch(e){}

}
function proCopyCard(t,tg,title,desc){
  return `<div class="copy-card"><div style="display:flex;justify-content:space-between;align-items:center"><span class="cc-t">${t}</span><span class="cc-tg">${tg}</span></div>
    <div class="cfield"><span class="cf-lbl">Title<button class="cp" data-copy="${esc(title)}">복사</button></span><div class="cf-text">${esc(title)}</div>${meter(title,30)}</div>
    <div class="cfield"><span class="cf-lbl">Description<button class="cp" data-copy="${esc(desc)}">복사</button></span><div class="cf-text">${esc(desc)}</div>${meter(desc,80)}</div></div>`;
}
function runPro(){
  const f=readForm();
  const tv=classifyTitle(f.title),dv=classifyDesc(f.desc);
  const h1n=f.h1===""?null:parseInt(f.h1,10),altn=f.alt===""?null:parseInt(f.alt,10);
  const ax={title:tv==="good"?76:tv==="mid"?50:22,meta:dv==="good"?78:dv==="mid"?48:18,
    semantic:h1n==null?50:h1n===1?70:h1n===0?38:34,url:/[a-z]{3,}/.test((f.url.split("/").pop()||""))?58:48,
    social:f.og==="yes"?72:f.og==="partial"?46:22,trust:55};
  const p={key:"pro",name:f.product||f.keyword||"대상 상품",product:f.product||f.keyword||"—",url:f.url||"(URL 미입력)",brand:f.brand,delivery:"direct",path:"/",
    exTitle:f.title||"(제목 없음)",exTitleV:tv,exDesc:f.desc||"(설명 없음)",exDescV:dv,exOg:f.og==="yes"?"설정":f.og==="partial"?"일부":"없음",ax};
  const c=genCopy(f),g=gScore(p),n=nScore(p),[,gc]=grade(g),[,nc]=grade(n);
  const ts=todosFor(p,c).slice().sort((a,b)=>PRIO[a.pri]-PRIO[b.pri]);
  const R=$("#proResult");
  R.innerHTML=`
    <div class="scr-hero"><div class="scr-hero-top"><h2>${esc(p.name)}</h2>
      <span class="score-chip" style="background:${bgOf(gc)};color:${inkOf(gc)}"><small>구글</small>${g}</span>
      <span class="score-chip" style="background:${bgOf(nc)};color:${inkOf(nc)}"><small>네이버</small>${n}</span>
      <span class="spacer"></span><button class="btn" id="csvBtn">To-Do CSV ↓</button></div>
      <div class="url-line">${esc(p.url)}</div>
      <div class="cur-grid">
        <div class="cur-box"><div class="cb-top"><span class="cb-k">입력 Title</span><span class="badge ${tv}">${sevWord(tv)}</span></div><div class="cb-v ${tv==="bad"?"bad":""}">${esc(p.exTitle)}</div></div>
        <div class="cur-box"><div class="cb-top"><span class="cb-k">입력 Description</span><span class="badge ${dv}">${sevWord(dv)}</span></div><div class="cb-v ${dv==="bad"?"bad":""}">${esc(p.exDesc)}</div></div>
      </div></div>
    <div class="sec-lbl">자동 생성된 To-Do (우선순위 상→하)</div>
    ${ts.map(t=>todoHtml(p,t)).join("")}
    <div class="sec-lbl">검색엔진별 카피안 (자동 생성 · 심의 검수 전제)</div>
    <div class="copy-grid">
      ${proCopyCard("네이버 타깃","상품명+혜택",c.nt,c.gd)}
      ${proCopyCard("구글 타깃","키워드+해결책",`${f.keyword||p.name} 비교 | ${(f.benefits||"보장").split(/[,，]/)[0].trim()} 보장 - ${f.brand||""}`.trim(),c.gd)}
      ${proCopyCard("소셜/OG","카톡·블로그 감성",c.st,c.sd)}
    </div>
    ${implSection(p,c,{brand:f.brand})}
    <div class="foot-note"><b>휴리스틱 진단</b> · 점수는 입력값 규칙 기반 추정이며 실제 순위를 보장하지 않습니다. 카피는 초안이므로 광고심의 검수 후 사용하세요.</div>`;
  $("#csvBtn").addEventListener("click",()=>{
    const rows=[["url","priority","todo","before","after"]];
    ts.forEach(t=>rows.push([p.url,t.pri,t.what.replace(/&lt;/g,"<").replace(/&gt;/g,">"),t.before.replace(/\n/g," "),t.after.replace(/\n/g," ")]));
    const csv="﻿"+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download=`seo-todo-${(p.name||"page").replace(/\s/g,"_")}.csv`;a.click();toast("CSV 내려받기 시작");});
  R.scrollIntoView({behavior:"smooth",block:"start"});
}

/* ── 토글/이벤트 ── */
function setCat(c){
  cat=c;
  document.querySelectorAll("#seg3 button").forEach(b=>b.classList.toggle("on",b.dataset.cat===c));
  if(c==="범용"){
    $("#subnav").style.display="none";
    $("#v-product").classList.remove("on");$("#v-pro").classList.add("on");
    renderPro();
  }else{
    $("#subnav").style.display="";
    $("#v-pro").classList.remove("on");$("#v-product").classList.add("on");
    curKey=catProducts(c)[0].key;
    renderScreen();
  }
  window.scrollTo({top:0,behavior:"auto"});
}
document.addEventListener("click",e=>{
  const seg=e.target.closest("#seg3 button"); if(seg){setCat(seg.dataset.cat);return;}
  const chip=e.target.closest(".chip"); if(chip){curKey=chip.dataset.screen;renderScreen();window.scrollTo({top:0});return;}
  const cp=e.target.closest(".cp,[data-copy]"); if(cp&&cp.dataset.copy!=null){navigator.clipboard?.writeText(cp.dataset.copy).then(()=>toast("복사됨"),()=>toast("복사 실패"));return;}
  const tg=e.target.closest("[data-toggle]"); if(tg){const id=tg.getAttribute("data-toggle");setDone(id,!isDone(id));
    if($("#v-product").classList.contains("on"))renderScreen();
    else{const el=document.querySelector(`.todo[data-id="${CSS.escape(id)}"]`);if(el)el.classList.toggle("done",isDone(id));}
    return;}
});
$("#themeBtn").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const dark=cur?cur==="dark":matchMedia("(prefers-color-scheme:dark)").matches;
  document.documentElement.setAttribute("data-theme",dark?"light":"dark");});

/* ── init ── */
setCat("장기");
</script>
