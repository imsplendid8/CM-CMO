<meta charset="utf-8">
<title>SEO To-Do 콘솔 — Modooflow</title>
<style>
/* ============================================================
   SEO To-Do 콘솔 — 개발자용 실행 보드 (한화 장기CM + 범용 PRO)
   Modooflow 디자인 시스템 · 자체완결 · 외부 의존성 0
   ============================================================ */
:root{
  --brand:#e0850f; --brand-600:#b96b08; --brand-50:#fdeee0; --brand-tint:#fbf5ec;
  --grad:linear-gradient(135deg,#e0850f 0%,#f29e67 100%);
  --ink:#1e1e2c; --ink-2:#4b4d60; --muted:#8a8ea0; --faint:#c4c8d4;
  --bg:#f4f3f0; --surface:#ffffff; --surface-2:#faf9f6;
  --line:#e6e4dd; --line-2:#efeee8;
  --good:#16a34a; --good-bg:#e7f6ee; --good-ink:#0f7a37;
  --mid:#c47f12;  --mid-bg:#fbf1de;  --mid-ink:#8a5906;
  --bad:#e5484d;  --bad-bg:#fcecec;  --bad-ink:#b4242a;
  --side:#191823; --side-2:#26232f; --side-ink:#c9c6d4; --side-ink-2:#8a869b;
  --r:15px; --r-sm:11px; --r-xs:8px;
  --sh:0 1px 2px rgba(24,20,40,.05),0 6px 22px rgba(24,20,40,.06);
  --sh-lg:0 14px 44px rgba(24,20,40,.13);
  --mono:ui-monospace,"SF Mono","Roboto Mono","Menlo",monospace;
  --sans:'Pretendard','Noto Sans KR','Nanum Gothic','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --brand:#f0a63f; --brand-600:#f7b95f; --brand-50:#3a2a12; --brand-tint:#211a10;
  --grad:linear-gradient(135deg,#e0850f 0%,#f2a95c 100%);
  --ink:#f2f0f6; --ink-2:#c3c1d0; --muted:#8f8ca0; --faint:#54525f;
  --bg:#131118; --surface:#1c1a23; --surface-2:#211f29; --line:#2e2b37; --line-2:#262330;
  --good:#3ecf7a; --good-bg:#13301f; --good-ink:#5fdd92;
  --mid:#e6a53a; --mid-bg:#33270f; --mid-ink:#f0bd5c;
  --bad:#f2696e; --bad-bg:#361c1e; --bad-ink:#f78a8e;
  --side:#0f0e14; --side-2:#1a1822; --side-ink:#c9c6d4; --side-ink-2:#7c798c;
  --sh:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35); --sh-lg:0 14px 44px rgba(0,0,0,.5);
}}
:root[data-theme="dark"]{
  --brand:#f0a63f; --brand-600:#f7b95f; --brand-50:#3a2a12; --brand-tint:#211a10;
  --grad:linear-gradient(135deg,#e0850f 0%,#f2a95c 100%);
  --ink:#f2f0f6; --ink-2:#c3c1d0; --muted:#8f8ca0; --faint:#54525f;
  --bg:#131118; --surface:#1c1a23; --surface-2:#211f29; --line:#2e2b37; --line-2:#262330;
  --good:#3ecf7a; --good-bg:#13301f; --good-ink:#5fdd92;
  --mid:#e6a53a; --mid-bg:#33270f; --mid-ink:#f0bd5c;
  --bad:#f2696e; --bad-bg:#361c1e; --bad-ink:#f78a8e;
  --side:#0f0e14; --side-2:#1a1822; --side-ink:#c9c6d4; --side-ink-2:#7c798c;
  --sh:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35); --sh-lg:0 14px 44px rgba(0,0,0,.5);
}
:root[data-theme="light"]{
  --brand:#e0850f; --brand-600:#b96b08; --brand-50:#fdeee0; --brand-tint:#fbf5ec;
  --grad:linear-gradient(135deg,#e0850f 0%,#f29e67 100%);
  --ink:#1e1e2c; --ink-2:#4b4d60; --muted:#8a8ea0; --faint:#c4c8d4;
  --bg:#f4f3f0; --surface:#ffffff; --surface-2:#faf9f6; --line:#e6e4dd; --line-2:#efeee8;
  --good:#16a34a; --good-bg:#e7f6ee; --good-ink:#0f7a37;
  --mid:#c47f12; --mid-bg:#fbf1de; --mid-ink:#8a5906;
  --bad:#e5484d; --bad-bg:#fcecec; --bad-ink:#b4242a;
  --side:#191823; --side-2:#26232f; --side-ink:#c9c6d4; --side-ink-2:#8a869b;
  --sh:0 1px 2px rgba(24,20,40,.05),0 6px 22px rgba(24,20,40,.06); --sh-lg:0 14px 44px rgba(24,20,40,.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;
  -webkit-font-smoothing:antialiased;letter-spacing:-.01em;word-break:keep-all;}
.app{display:grid;grid-template-columns:262px 1fr;min-height:100vh;}
@media(max-width:780px){.app{grid-template-columns:1fr;}.rail{position:static;height:auto;}}

/* 사이드바 */
.rail{background:linear-gradient(180deg,var(--side),var(--side-2));color:var(--side-ink);
  padding:18px 14px;display:flex;flex-direction:column;gap:4px;position:sticky;top:0;height:100vh;overflow-y:auto;}
.brand{display:flex;align-items:center;gap:11px;padding:4px 6px 14px;}
.brand-logo{width:36px;height:36px;border-radius:10px;background:var(--grad);display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:800;font-size:13px;box-shadow:0 6px 16px rgba(224,133,15,.45);flex:0 0 auto;}
.brand-name{font-size:14.5px;font-weight:800;color:#fff;letter-spacing:-.02em;line-height:1.12;}
.brand-sub{display:block;font-size:9.5px;font-weight:500;color:var(--side-ink-2);margin-top:2px;}
.mode-switch{display:flex;flex-direction:column;gap:5px;padding:4px 2px 10px;border-bottom:1px solid rgba(255,255,255,.08);margin-bottom:8px;}
.mode-btn{display:flex;align-items:center;gap:9px;padding:11px 12px;border-radius:10px;border:1px solid transparent;
  background:rgba(255,255,255,.05);color:var(--side-ink);font-family:inherit;font-size:13px;font-weight:700;
  cursor:pointer;text-align:left;transition:.15s;}
.mode-btn:hover{background:rgba(255,255,255,.1);color:#fff;}
.mode-btn.on{background:var(--grad);color:#fff;box-shadow:0 8px 18px rgba(224,133,15,.32);}
.mode-btn .mb-ico{width:22px;height:22px;border-radius:6px;background:rgba(255,255,255,.14);display:flex;
  align-items:center;justify-content:center;font-size:12px;flex:0 0 auto;}
.mode-btn.on .mb-ico{background:rgba(255,255,255,.25);}
.mb-txt{flex:1;min-width:0;}
.mb-txt small{display:block;font-size:9.5px;font-weight:500;color:var(--side-ink-2);margin-top:1px;}
.mode-btn.on .mb-txt small{color:rgba(255,255,255,.8);}
.pro-tag{font-size:8.5px;font-weight:800;background:#fff;color:#b96b08;padding:1px 5px;border-radius:5px;letter-spacing:.04em;}
.nav-cap{font-size:9.5px;font-weight:800;color:var(--side-ink-2);text-transform:uppercase;letter-spacing:.09em;padding:10px 8px 5px;}
.scr-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;border:none;background:transparent;
  color:var(--side-ink);font-family:inherit;font-size:12.5px;font-weight:600;cursor:pointer;text-align:left;width:100%;transition:.15s;}
.scr-item:hover{background:rgba(255,255,255,.06);color:#fff;}
.scr-item.on{background:rgba(255,255,255,.1);color:#fff;}
.scr-check{width:16px;height:16px;border-radius:5px;border:1.5px solid var(--side-ink-2);flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;font-size:10px;color:transparent;}
.scr-item.done .scr-check{background:var(--good);border-color:var(--good);color:#fff;}
.scr-main{flex:1;min-width:0;}
.scr-main small{display:block;font-size:9.5px;color:var(--side-ink-2);margin-top:1px;}
.rail-foot{margin-top:auto;padding:12px 8px 2px;font-size:9.5px;color:var(--side-ink-2);line-height:1.6;}

/* 메인 */
.main{min-width:0;display:flex;flex-direction:column;}
.topbar{display:flex;align-items:center;justify-content:space-between;gap:14px;padding:16px 28px;
  border-bottom:1px solid var(--line);background:var(--surface);position:sticky;top:0;z-index:20;flex-wrap:wrap;}
.page-title{font-size:18.5px;font-weight:800;letter-spacing:-.03em;}
.page-sub{font-size:11.5px;color:var(--muted);margin-top:2px;}
.tb-actions{display:flex;align-items:center;gap:8px;}
.pill{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--brand-600);
  background:var(--brand-50);border-radius:999px;padding:5px 11px;}
.pill .dot{width:7px;height:7px;border-radius:50%;background:var(--good);box-shadow:0 0 0 3px var(--good-bg);}
.btn{padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);
  font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.btn:hover{border-color:var(--brand);color:var(--brand-600);}
.btn.primary{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(224,133,15,.28);}
.btn.primary:hover{color:#fff;filter:brightness(1.04);}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);
  color:var(--ink-2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.icon-btn:hover{border-color:var(--brand);color:var(--brand-600);}
.content{padding:22px 28px 60px;max-width:1080px;width:100%;}
.view{display:none;} .view.on{display:block;animation:fade .22s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto;}}

/* 화면 헤더 카드 */
.scr-hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;
  margin-bottom:16px;box-shadow:var(--sh);}
.scr-hero-top{display:flex;align-items:center;gap:12px;flex-wrap:wrap;margin-bottom:12px;}
.scr-hero-top h2{font-size:17px;font-weight:800;letter-spacing:-.02em;}
.scr-hero-top .spacer{flex:1;}
.score-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;font-weight:800;
  padding:4px 10px;border-radius:8px;font-variant-numeric:tabular-nums;}
.score-chip small{font-family:var(--sans);font-weight:700;opacity:.75;}
.url-line{font-family:var(--mono);font-size:11.5px;color:var(--brand-600);word-break:break-all;margin-bottom:12px;}
.url-line a{color:inherit;}
.cur-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:720px){.cur-grid{grid-template-columns:1fr;}}
.cur-box{border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;background:var(--surface-2);}
.cur-box .cb-top{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.cur-box .cb-k{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;}
.cur-box .cb-v{font-family:var(--mono);font-size:11.5px;line-height:1.5;color:var(--ink);word-break:break-all;}
.cur-box .cb-v.bad{color:var(--bad-ink);}

/* 진행률 바 */
.prog{display:flex;align-items:center;gap:12px;margin-bottom:16px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:13px 18px;box-shadow:var(--sh);}
.prog-bar{flex:1;height:8px;border-radius:99px;background:var(--line-2);overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:var(--grad);transition:width .3s;}
.prog-num{font-family:var(--mono);font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;}
.prog-num small{color:var(--muted);font-weight:600;}

/* 섹션 */
.sec-lbl{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:18px 2px 10px;}

/* To-Do 아이템 */
.todo{border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);margin-bottom:11px;
  box-shadow:var(--sh);overflow:hidden;transition:.15s;}
.todo.done{opacity:.62;}
.todo-head{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;cursor:pointer;}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--faint);flex:0 0 auto;display:flex;
  align-items:center;justify-content:center;font-size:13px;color:transparent;background:var(--surface);transition:.15s;margin-top:1px;}
.todo.done .chk{background:var(--good);border-color:var(--good);color:#fff;}
.todo-hmain{flex:1;min-width:0;}
.todo-what{font-size:14px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.todo.done .todo-what{text-decoration:line-through;text-decoration-color:var(--faint);}
.todo-why{font-size:12px;color:var(--ink-2);margin-top:4px;line-height:1.55;}
.todo-why code{font-family:var(--mono);font-size:10.5px;background:var(--line-2);padding:1px 5px;border-radius:4px;color:var(--ink);}
.pri{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;letter-spacing:-.01em;flex:0 0 auto;}
.pri.상{background:var(--bad-bg);color:var(--bad-ink);}
.pri.중{background:var(--mid-bg);color:var(--mid-ink);}
.pri.하{background:var(--line-2);color:var(--ink-2);}
.todo-body{padding:0 15px 15px 49px;}
.code-row{margin-top:8px;}
.code-lbl{font-size:9.5px;font-weight:800;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;
  margin-bottom:3px;display:flex;align-items:center;justify-content:space-between;}
.code-lbl .cp{cursor:pointer;color:var(--brand-600);border:none;background:none;font-family:inherit;font-size:10px;font-weight:700;padding:0;}
.code-lbl .cp:hover{text-decoration:underline;}
.codeblk{font-family:var(--mono);font-size:11.5px;line-height:1.6;border-radius:8px;padding:11px 13px;overflow-x:auto;white-space:pre;}
.codeblk.before{background:var(--bad-bg);color:var(--bad-ink);border:1px solid var(--bad-bg);}
.codeblk.after{background:var(--side);color:#e8e6f0;}
.codeblk.after .tag{color:#f0b968;} .codeblk.after .str{color:#7fe0a3;} .codeblk.after .cm{color:#8a869b;}
.meter{display:flex;align-items:center;gap:8px;margin-top:7px;}
.meter-bar{flex:1;height:5px;border-radius:99px;background:var(--line-2);overflow:hidden;}
.meter-fill{height:100%;border-radius:99px;transition:width .3s;}
.meter-num{font-family:var(--mono);font-size:10.5px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
.meter-num small{color:var(--muted);font-weight:600;}

/* PRO 입력 폼 */
.pro-hero{background:linear-gradient(135deg,var(--brand-tint),var(--surface));border:1px solid var(--line);
  border-radius:var(--r);padding:20px 22px;margin-bottom:16px;box-shadow:var(--sh);}
.pro-hero h2{font-size:18px;font-weight:800;display:flex;align-items:center;gap:9px;letter-spacing:-.02em;}
.pro-badge{font-size:10px;font-weight:800;background:var(--grad);color:#fff;padding:3px 9px;border-radius:6px;letter-spacing:.04em;}
.pro-hero p{font-size:12.5px;color:var(--ink-2);margin-top:6px;line-height:1.6;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
@media(max-width:720px){.form-grid{grid-template-columns:1fr;}}
.ff{display:flex;flex-direction:column;gap:5px;}
.ff.full{grid-column:1/-1;}
.ff label{font-size:11px;font-weight:800;color:var(--ink-2);letter-spacing:.01em;}
.ff label small{color:var(--muted);font-weight:600;}
.ff input,.ff select,.ff textarea{font-family:inherit;font-size:12.5px;color:var(--ink);background:var(--surface-2);
  border:1px solid var(--line);border-radius:9px;padding:9px 11px;transition:.15s;width:100%;}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--brand);background:var(--surface);
  box-shadow:0 0 0 3px var(--brand-50);}
.ff textarea{resize:vertical;min-height:52px;line-height:1.5;}
.form-actions{grid-column:1/-1;display:flex;gap:10px;align-items:center;margin-top:4px;flex-wrap:wrap;}
.form-actions .hint{font-size:11px;color:var(--muted);}
.import-card{background:var(--surface);border:1px dashed var(--brand);border-radius:var(--r);padding:15px 18px;margin-bottom:14px;box-shadow:var(--sh);}
.import-card .ic-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;font-size:12.5px;}
.import-card .ic-top b{font-weight:800;}
.import-card textarea{width:100%;min-height:64px;font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink);resize:vertical;line-height:1.5;}
.import-card .ic-actions{display:flex;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap;}
.impl-note{font-size:11.5px;color:var(--ink-2);line-height:1.65;margin-bottom:11px;}
.impl-note a{color:var(--brand-600);font-weight:700;text-decoration:none;}
.impl-note a:hover{text-decoration:underline;}
.impl-block{margin-bottom:11px;}
.impl-block .code-lbl{margin-bottom:4px;}

/* PRO 결과 */
.pro-result{margin-top:18px;}
.copy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:820px){.copy-grid{grid-template-columns:1fr;}}
.copy-card{border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;background:var(--surface);display:flex;flex-direction:column;gap:11px;box-shadow:var(--sh);}
.copy-card .cc-t{font-size:12px;font-weight:800;}
.copy-card .cc-tg{font-size:10px;font-weight:700;color:var(--muted);}
.cfield{display:flex;flex-direction:column;gap:4px;}
.cf-lbl{font-size:9.5px;font-weight:800;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;display:flex;justify-content:space-between;}
.cf-lbl .cp{cursor:pointer;color:var(--brand-600);border:none;background:none;font-family:inherit;font-size:9.5px;font-weight:700;padding:0;}
.cf-text{font-size:12px;line-height:1.5;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:8px 10px;}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap;}
.badge.good{background:var(--good-bg);color:var(--good-ink);}
.badge.mid{background:var(--mid-bg);color:var(--mid-ink);}
.badge.bad{background:var(--bad-bg);color:var(--bad-ink);}
.badge.ghost{background:var(--line-2);color:var(--ink-2);}
.foot-note{font-size:11px;color:var(--muted);line-height:1.6;margin-top:18px;padding:12px 14px;background:var(--surface-2);
  border:1px solid var(--line);border-radius:var(--r-sm);}
.foot-note b{color:var(--ink-2);font-weight:800;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);
  padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:var(--sh-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
.empty-state{text-align:center;padding:50px 20px;color:var(--muted);}
.empty-state .es-ico{font-size:34px;margin-bottom:10px;}
</style>

<div class="app">
  <aside class="rail">
    <div class="brand">
      <div class="brand-logo">MF</div>
      <div><div class="brand-name">Modooflow<span class="brand-sub">SEO To-Do 콘솔</span></div></div>
    </div>
    <div class="mode-switch">
      <button class="mode-btn on" data-mode="hanwha">
        <span class="mb-ico">🏢</span><span class="mb-txt">한화 장기CM<small>실측 6개 화면 · 고정 진단</small></span>
      </button>
      <button class="mode-btn" data-mode="pro">
        <span class="mb-ico">⚡</span><span class="mb-txt">범용 SEO 솔루션 <span class="pro-tag">PRO</span><small>URL 입력 → 진단·To-Do 자동생성</small></span>
      </button>
    </div>
    <div id="railBody"></div>
    <div class="rail-foot" id="railFoot"></div>
  </aside>

  <main class="main">
    <header class="topbar">
      <div>
        <div class="page-title" id="pgTitle">한화 장기CM</div>
        <div class="page-sub" id="pgSub">현행 화면 실측 기반 개발 To-Do</div>
      </div>
      <div class="tb-actions" id="tbActions"></div>
    </header>
    <div class="content">
      <section class="view on" id="v-hanwha"></section>
      <section class="view" id="v-pro"></section>
    </div>
  </main>

function meter(text,limit){

  return `<div class="meter"><div class="meter-bar"><div class="meter-fill" style="width:${Math.min(100,c/limit*100)}%;background:${col}"></div></div>
    <div class="meter-num" style="color:${col}">${c}자 <small>/${limit} · ${u}B(UTF-8) · ${e}B(EUC-KR)</small></div></div>`;
}

function classifyTitle(t){
  if(!t.trim())return"bad";
  if(/[>＞]|고객정보입력|메인&gt;|메인>/.test(t))return"bad";
  const len=charLen(t); if(len<6||len>34)return"mid"; return"good";
}
function classifyDesc(d){
  if(!d.trim())return"bad";
  if(/남자|여자|자가용|영업용|직업을 선택|고객정보|확인필-제/.test(d))return"bad";
  const len=charLen(d); if(len<40)return"mid"; if(len>95)return"mid"; return"good";
}
function genCopy(f){
  const b=(f.benefits||"").split(/[,，·]/).map(s=>s.trim()).filter(Boolean);
  const b0=b[0]||"핵심담보",b1=b[1]||"보장",b2=b[2]||b1;
  const brand=f.brand||"",prod=f.product||f.keyword||"상품",kw=f.keyword||prod;
  const clip=(s,n)=>charLen(s)<=n?s:[...s].slice(0,n).join("");
  return{
    nt:clip(`${brand} ${prod} | ${b0}·${b1} 보장`.trim(),30),
    gd:clip(`${b0}·${b1}·${b2} 보장까지. ${brand} ${prod}을(를) 온라인에서 설계하고 보험료를 확인하세요.`.trim(),80),
    st:clip(`${b0}부터 ${b2}까지 — ${brand} ${prod}`.trim(),30),
    sd:clip(`${b0}·${b1}·${b2}까지 대비하는 ${prod}. 3분 만에 설계하고 카톡으로 공유해요.`.trim(),80),
    h1:`${prod}`
  };
}

/* ── 오픈소스 연동 ────────────────────────────────────────────
   1) unlighthouse/Lighthouse/크롤러 JSON → 진단 폼 자동 채움
   2) next-seo · schema-dts(JSON-LD) 구현코드 생성
   3) unlighthouse 재검증 커맨드
   ─────────────────────────────────────────────────────────── */
function readForm(){return{url:$("#f_url").value.trim(),brand:$("#f_brand").value.trim(),product:$("#f_product").value.trim(),
  keyword:$("#f_keyword").value.trim(),benefits:$("#f_benefits").value.trim(),title:$("#f_title").value.trim(),
  desc:$("#f_desc").value.trim(),og:$("#f_og").value,h1:$("#f_h1").value,alt:$("#f_alt").value,target:$("#f_target").value};}
function parseCrawlJson(raw){
  let o; try{o=JSON.parse(raw);}catch(e){toast("JSON 파싱 실패");return null;}
  if(Array.isArray(o))o=o[0]||{};
  if(o.report)o=o.report;
  const out={};
  out.url=o.url||o.finalUrl||o.requestedUrl||(o.route&&o.route.url)||"";
  if(o.audits){ // Lighthouse / unlighthouse 감사 결과
    const a=o.audits;
    const imgAlt=a["image-alt"]&&a["image-alt"].details&&a["image-alt"].details.items;
    if(imgAlt)out.alt=imgAlt.length;
    if(a["meta-description"]&&a["meta-description"].score===0)out.desc="";
    out.og=a["structured-data"]?"partial":"none";
  }
  if(o.title!=null)out.title=o.title;
  if(o.description!=null)out.desc=o.description; else if(o.metaDescription!=null)out.desc=o.metaDescription;
  if(o.h1Count!=null)out.h1=o.h1Count; else if(o.h1!=null)out.h1=Array.isArray(o.h1)?o.h1.length:o.h1;
  if(o.imagesMissingAlt!=null)out.alt=o.imagesMissingAlt; else if(o.missingAlt!=null)out.alt=o.missingAlt;
  if(o.og!=null)out.og=(o.og===true?"yes":o.og===false?"none":o.og);
  else if(o.ogPresent!=null)out.og=o.ogPresent?"yes":"none";
  return out;
}
function nextSeoBlock(name,url,slug,c){
  return `// next-seo (garmeeh/next-seo) · ${name}\nimport { NextSeo } from 'next-seo';\n\nexport const seo = (\n  <NextSeo\n    title="${c.nt}"\n    description="${c.gd}"\n    openGraph={{\n      url: '${url}',\n      title: '${c.st}',\n      description: '${c.sd}',\n      images: [{ url: 'https://cdn.example.com/og/${slug}_1200x630.png', width: 1200, height: 630 }],\n    }}\n  />\n);`;
}
function jsonLdBlock(name,url,brand,c){
  return `<!-- JSON-LD · google/schema-dts 로 타입검증 (npm i -D schema-dts) -->\n<script type="application/ld+json">\n{\n  "@context": "https://schema.org",\n  "@graph": [\n    { "@type": "Product",\n      "name": "${name}",\n      "brand": { "@type": "Brand", "name": "${brand}" },\n      "url": "${url}",\n      "description": "${c.gd}" },\n    { "@type": "FAQPage",\n      "mainEntity": [{ "@type": "Question",\n        "name": "가입은 어떻게 하나요?",\n        "acceptedAnswer": { "@type": "Answer", "text": "온라인에서 담보를 선택하고 보험료를 확인해 바로 가입할 수 있습니다." } }] }\n  ]\n}\n<\/script>`;
}
function unlighthouseCmd(url){
  let origin=url,path="/";
  try{const u=new URL(url);origin=u.origin;path=u.pathname||"/";}catch(e){}
  return `# 적용 후 재검증 (harlan-zw/unlighthouse)\nnpx unlighthouse --site ${origin} --router.include "${path}"`;
}
function implSection(p,c,opt){
  const brand=(opt&&opt.brand)||"", url=p.url||"", name=p.name||"", slug=p.key||"page";
  const blk=(lbl,code)=>`<div class="impl-block"><div class="code-lbl">${lbl}<button class="cp" data-copy="${esc(code)}">코드 복사</button></div><div class="codeblk after">${esc(code)}</div></div>`;
  return `<div class="sec-lbl">구현 코드 · 오픈소스 적용</div>
    <div class="impl-note">추천 파이프라인 — <a href="https://github.com/harlan-zw/unlighthouse" target="_blank" rel="noopener">unlighthouse</a>로 실측 크롤 → 이 진단 → <a href="https://github.com/garmeeh/next-seo" target="_blank" rel="noopener">next-seo</a>·<a href="https://github.com/google/schema-dts" target="_blank" rel="noopener">schema-dts</a>로 실제 적용. 아래 코드는 위 After 카피를 각 도구 형식으로 옮긴 산출물입니다.</div>
    ${blk("next-seo 설정",nextSeoBlock(name,url,slug,c))}
    ${blk("JSON-LD (schema-dts)",jsonLdBlock(name,url,brand,c))}
    ${blk("적용 후 재검증",unlighthouseCmd(url))}`;
}
