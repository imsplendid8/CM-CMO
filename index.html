<!doctype html>
<html lang="ko">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="description" content="Modooflow — 한화손보 CM SEO·SEM 마케팅 콘솔 허브(전 기능 상단 고정)">
<title>Modooflow · 한화손보 CM 마케팅 콘솔</title>
<style>
@font-face{font-family:'Pretendard Variable';font-weight:45 920;font-style:normal;font-display:swap;src:url('fonts/PretendardVariable.woff2') format('woff2-variations');}
:root{
  --brand:#e0850f; --brand-600:#b96b08; --brand-50:#fdf3e7;
  --grad:linear-gradient(135deg,#f0940f 0%,#e0850f 100%);
  --ink:#0f1729; --ink-2:#4a5163; --muted:#8b93a3; --line:#e8ebef; --line-2:#eef1f4;
  --bg:#f7f8fa; --surface:#ffffff; --surface-2:#f4f6f8;
  --sh:0 1px 2px rgba(15,23,41,.04),0 2px 6px rgba(15,23,41,.05); --sh-lg:0 12px 30px rgba(15,23,41,.10);
  --sans:'Pretendard Variable','Pretendard','Noto Sans KR','Apple SD Gothic Neo',system-ui,-apple-system,sans-serif;
  --mono:ui-monospace,"SF Mono",Menlo,monospace; --top:54px;
}
@media(prefers-color-scheme:dark){:root{--ink:#eef1f6;--ink-2:#b7bdc9;--muted:#7f8697;--line:#262b35;--line-2:#20242d;--bg:#0e1016;--surface:#171a21;--surface-2:#1d212a;--brand-50:#3a2a12;--sh:0 1px 2px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.5);--sh-lg:0 14px 34px rgba(0,0,0,.6);}}
:root[data-theme="dark"]{--ink:#eef1f6;--ink-2:#b7bdc9;--muted:#7f8697;--line:#262b35;--line-2:#20242d;--bg:#0e1016;--surface:#171a21;--surface-2:#1d212a;--brand-50:#3a2a12;--sh:0 1px 2px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.5);--sh-lg:0 14px 34px rgba(0,0,0,.6);}
:root[data-theme="light"]{--ink:#0f1729;--ink-2:#4a5163;--muted:#8b93a3;--line:#e8ebef;--line-2:#eef1f4;--bg:#f7f8fa;--surface:#ffffff;--surface-2:#f4f6f8;--brand-50:#fdf3e7;--sh:0 1px 2px rgba(15,23,41,.04),0 2px 6px rgba(15,23,41,.05);--sh-lg:0 12px 30px rgba(15,23,41,.10);}
*{margin:0;padding:0;box-sizing:border-box;}
html,body{height:100%;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);-webkit-font-smoothing:antialiased;text-rendering:optimizeLegibility;letter-spacing:-.011em;word-break:keep-all;overflow:hidden;}
/* 상단 고정 내비 */
.top{position:fixed;top:0;left:0;right:0;height:var(--top);z-index:30;display:flex;align-items:center;gap:14px;padding:0 16px;background:color-mix(in srgb,var(--surface) 88%,transparent);backdrop-filter:saturate(180%) blur(12px);-webkit-backdrop-filter:saturate(180%) blur(12px);border-bottom:1px solid var(--line);}
.logo{display:flex;align-items:center;gap:9px;flex:0 0 auto;text-decoration:none;color:inherit;}
.logo .m{width:30px;height:30px;border-radius:9px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;box-shadow:0 2px 8px rgba(224,133,15,.35);}
.logo b{font-size:14.5px;font-weight:800;letter-spacing:-.03em;} .logo small{display:block;font-size:9px;color:var(--muted);font-weight:600;letter-spacing:0;}
.nav{display:flex;align-items:center;gap:2px;overflow-x:auto;flex:1;scrollbar-width:thin;}
.nav::-webkit-scrollbar{height:5px;} .nav::-webkit-scrollbar-thumb{background:var(--line);border-radius:9px;}
.navb{display:inline-flex;align-items:center;gap:7px;padding:7px 12px;border-radius:9px;border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:600;color:var(--ink-2);cursor:pointer;white-space:nowrap;transition:.14s;position:relative;}
.navb .ic{font-size:14px;opacity:.9;}
.navb:hover{background:var(--surface-2);color:var(--ink);}
.navb.on{color:var(--ac,var(--brand));background:color-mix(in srgb,var(--ac,var(--brand)) 11%,transparent);font-weight:700;}
.navb.on .ic{opacity:1;}
.tr{display:flex;align-items:center;gap:8px;flex:0 0 auto;}
.tr a,.tr button{display:inline-flex;align-items:center;gap:5px;height:32px;padding:0 11px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-family:inherit;font-size:11.5px;font-weight:600;cursor:pointer;text-decoration:none;transition:.14s;}
.tr a:hover,.tr button:hover{border-color:color-mix(in srgb,var(--brand) 55%,var(--line));color:var(--brand-600);background:var(--surface-2);}
.tr .ext{white-space:nowrap;}
/* 본문 */
.body{position:fixed;top:var(--top);left:0;right:0;bottom:0;}
#frame{width:100%;height:100%;border:0;display:none;background:var(--bg);}
#home{width:100%;height:100%;overflow-y:auto;display:block;}
.home-wrap{max-width:1120px;margin:0 auto;padding:40px 24px 72px;}
.hero{display:flex;align-items:flex-start;gap:15px;margin-bottom:6px;}
.hero .hm{width:46px;height:46px;border-radius:13px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:20px;font-weight:800;flex:0 0 auto;box-shadow:0 4px 14px rgba(224,133,15,.3);}
.hero h1{font-size:24px;font-weight:800;letter-spacing:-.035em;line-height:1.15;}
.hero p{font-size:13.5px;color:var(--ink-2);margin-top:7px;line-height:1.7;max-width:700px;}
.hero p b{color:var(--ink);font-weight:700;}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(304px,1fr));gap:15px;margin-top:28px;}
.card{display:flex;flex-direction:column;background:var(--surface);border:1px solid var(--line);border-radius:15px;padding:20px;box-shadow:var(--sh);transition:transform .16s ease,box-shadow .16s ease,border-color .16s ease;position:relative;overflow:hidden;cursor:pointer;}
.card:hover{box-shadow:var(--sh-lg);transform:translateY(-3px);border-color:color-mix(in srgb,var(--ac) 40%,var(--line));}
.card .ico{width:40px;height:40px;border-radius:11px;background:color-mix(in srgb,var(--ac) 13%,transparent);color:var(--ac);display:flex;align-items:center;justify-content:center;font-size:19px;margin-bottom:13px;}
.card h2{font-size:15.5px;font-weight:800;letter-spacing:-.02em;margin-bottom:5px;}
.card .desc{font-size:12px;color:var(--ink-2);line-height:1.62;flex:1;}
.card .feats{list-style:none;margin:13px 0 0;display:flex;flex-direction:column;gap:6px;padding-top:13px;border-top:1px solid var(--line-2);}
.card .feats li{font-size:11px;color:var(--ink-2);display:flex;gap:7px;line-height:1.45;}
.card .feats li::before{content:"";flex:0 0 5px;width:5px;height:5px;border-radius:50%;background:var(--ac);margin-top:5px;}
.card .go{margin-top:15px;font-size:12px;font-weight:700;color:var(--ac);display:flex;align-items:center;gap:6px;}
.card:hover .go{gap:9px;}
.foot{margin-top:32px;padding-top:22px;border-top:1px solid var(--line);font-size:11.5px;color:var(--muted);line-height:1.75;}
.foot b{color:var(--ink-2);font-weight:700;} .foot a{color:var(--brand-600);font-weight:700;text-decoration:none;}
.themebtn{width:32px;height:32px;padding:0!important;justify-content:center;font-size:14px;}
@media(max-width:760px){.hero h1{font-size:20px;} .tr .ext{display:none;} .logo small{display:none;} .home-wrap{padding:28px 18px 60px;}}
</style>
</head>
<body>
<header class="top">
  <a class="logo" href="#" data-tool="home"><span class="m">◆</span><span><b>Modooflow</b><small>한화손보 CM 마케팅 콘솔</small></span></a>
  <nav class="nav" id="nav"></nav>
  <div class="tr">
    <a class="ext" id="openTab" href="#" target="_blank" rel="noopener" title="현재 화면을 새 탭에서 열기">↗ 새 탭</a>
    <button class="themebtn" id="themeBtn" title="테마 전환">◐</button>
  </div>
</header>
<div class="body">
  <iframe id="frame" title="도구"></iframe>
  <div id="home"></div>
</div>
<script>
"use strict";
const WIKI="https://github.com/imsplendid8/CM-CMO/blob/main/docs/README.md";
const TOOLS=[
 {id:"seo",icon:"🔧",name:"테크니컬 SEO",tag:"SEO",file:"seo-audit.html",url:"https://claude.ai/code/artifact/8a9868bf-142c-4134-b1e7-d48525ae31b7",ac:"#e0850f",
  desc:"담당 상품 현행 화면(제목·메타·OG·H·robots·분기)을 실측 진단하고, 화면에 바로 붙이는 HTML 태깅 가이드·robots.txt 제공.",
  feats:["상품별 우선순위 To-Do + before/after 코드","화면 적용용 HTML(head·h1)·robots.txt","네이버 웹마스터도구 반영·Excel/PPT 전달"]},
 {id:"kw",icon:"🔎",name:"검색광고 키워드",tag:"키워드",file:"keyword-tool.html",url:"https://claude.ai/code/artifact/42429a9c-b8eb-4175-ae0b-0e72aafd8a7e",ac:"#2b6cb0",
  desc:"상품 시드 × 수식어로 검색광고 키워드를 대량 추출·분류·CSV. 네이버 키워드도구 엑셀 병합·검색량 매핑 지원.",
  feats:["거래·정보·브랜드·담보·AI검색 자동 분류","네이버 키워드도구(.xlsx) 병합·검색량 매핑","광고그룹별 CSV 내보내기(업로드용)"]},
 {id:"news",icon:"📰",name:"카테고리 뉴스",tag:"뉴스",file:"news-tool.html",url:"https://claude.ai/code/artifact/5b1757b0-f0e2-4255-8cdf-bd51a22e1fba",ac:"#0e9e8e",
  desc:"상품과 같은 카테고리 기준 경쟁·시장 뉴스를 모아 동향 요약·마케팅 시사점 제공, 로컬 서버로 실시간 갱신.",
  feats:["상품별 동향 요약 + 담당자 참고 시사점","이슈-업계영향-참고포인트 관점 분석","주택화재 ‘대형화재사고’ 추가 감시"]},
 {id:"serp",icon:"🔭",name:"SERP 아카이브",tag:"SERP",file:"serp-tool.html",url:"https://claude.ai/code/artifact/72a87db9-596e-42b6-9d23-7b40f11d2fa3",ac:"#7c5cd6",
  desc:"대표키워드(PC) 네이버 검색결과를 매주 스크린샷 아카이빙하고, 전/후 시각 diff로 변화·경쟁사 소구포인트 분석.",
  feats:["주간 스크린샷 아카이브 + 전/후 비교","전/후 시각 diff 자동 변화감지","경쟁사 소구포인트·한화 상위노출 갭"]},
 {id:"season",icon:"🗓️",name:"시즌 캘린더",tag:"시즌",file:"seasonal-tool.html",url:"https://claude.ai/code/artifact/c21016a1-80b5-4d36-a68e-d93a1984c2b1",ac:"#d6456f",
  desc:"상품별 계절 이슈·키워드(예: 주택화재 7월 장마 누수)를 한 장 연간 캘린더로, 피크 전 선제 대응 시점 안내.",
  feats:["연간 마케팅 이슈 매트릭스(월×이슈)","이번 달 주목 + 다음 달 선제대응 예고","상품 탭 = 월별 이슈 상세"]},
];
const esc=s=>String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));
// Pages·로컬·file: → iframe 임베드 / 그 외(아티팩트 샌드박스) → 새 탭
const LOCAL = location.protocol==="file:" || /github\.io$/.test(location.hostname) || location.hostname==="localhost" || /^127\./.test(location.hostname) || location.hostname==="";
const frame=document.getElementById("frame"),home=document.getElementById("home"),nav=document.getElementById("nav"),openTab=document.getElementById("openTab");

function renderNav(active){
  const item=(id,icon,name,ac,on)=>`<button class="navb${on?" on":""}" data-tool="${id}" style="--ac:${ac||"var(--brand)"}"><span class="ic">${icon}</span>${esc(name)}</button>`;
  let h=item("home","🏠","홈",null,active==="home");
  TOOLS.forEach(t=>h+=item(t.id,t.icon,t.name,t.ac,active===t.id));
  h+=`<a class="navb" href="${WIKI}" target="_blank" rel="noopener" style="text-decoration:none"><span class="ic">📖</span>위키</a>`;
  nav.innerHTML=h;
}
function renderHome(){
  home.innerHTML=`<div class="home-wrap">
    <div class="hero"><span class="hm">◆</span>
      <div><h1>Modooflow 마케팅 콘솔</h1>
      <p>CM사업부 담당 상품의 <b>검색 노출(SEO)·검색광고 키워드·카테고리 뉴스·SERP 아카이브·시즌 캘린더</b>를 한 곳에서.
      상단 메뉴는 항상 고정되어 있어 <b>이동 없이</b> 전 기능을 바로 열 수 있습니다.</p></div></div>
    <div class="grid">${TOOLS.map(t=>`<div class="card" data-tool="${t.id}" style="--ac:${t.ac}">
      <div class="ico">${t.icon}</div><h2>${esc(t.name)}</h2>
      <div class="desc">${esc(t.desc)}</div>
      <ul class="feats">${t.feats.map(f=>`<li>${esc(f)}</li>`).join("")}</ul>
      <div class="go">열기 →</div></div>`).join("")}</div>
    <div class="foot"><b>연결 구조</b> · 상단 고정 메뉴에서 5개 작업공간으로 즉시 전환합니다. 도구들은 같은 담당 상품 집합(홈·장기7·일반2)을 공유합니다. · <a href="${WIKI}" target="_blank" rel="noopener">📖 위키</a><br>
    데이터·카피는 샘플·공개값 기준 · 광고 문구는 배포 전 광고심의 검수 · 검색량/입찰가는 각 광고 플랫폼에서 확정 · 뉴스 요약/시사점은 마케팅 분석(개인정보·영업비밀 미포함).</div>
  </div>`;
}
function show(id){
  if(id==="home"){home.style.display="block";frame.style.display="none";openTab.href="#";openTab.style.visibility="hidden";renderNav("home");location.hash="";return;}
  const t=TOOLS.find(x=>x.id===id); if(!t)return;
  openTab.href=LOCAL?t.file:t.url; openTab.style.visibility="visible";
  if(LOCAL){ home.style.display="none"; frame.style.display="block"; if(frame.getAttribute("src")!==t.file)frame.src=t.file; }
  else { window.open(t.url,"_blank","noopener"); }   // 아티팩트에선 iframe이 막히므로 새 탭
  renderNav(id); location.hash=id;
}
document.addEventListener("click",e=>{
  const b=e.target.closest("[data-tool]"); if(b){e.preventDefault();show(b.dataset.tool);}
});
document.getElementById("themeBtn").addEventListener("click",()=>{const c=document.documentElement.getAttribute("data-theme");const d=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",d?"light":"dark");});
renderHome();
const start=(location.hash||"").replace("#","");
renderNav("home");
if(start&&TOOLS.some(t=>t.id===start)&&LOCAL){show(start);} else {show("home");}
</script>
</body>
</html>
