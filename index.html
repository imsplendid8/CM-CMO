.knote b{color:var(--ink-2);}
.mf{display:flex;gap:8px;padding:14px 20px;border-top:1px solid var(--line);}

const esc=s=>String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;","\"":"&quot;","'":"&#39;"}[m]));

const DEFAULT_PROXY="https://modooflow-naver-proxy.angle0102.workers.dev";
function loadUsage(){
  const box=document.getElementById("usageBox"); if(!box)return;
  const base=((mfKeysSafe().proxy||DEFAULT_PROXY)||"").replace(/\/+$/,""); if(!base){box.innerHTML="";return;}
  fetch(base+"/usage",{cache:"no-store"}).then(r=>r.ok?r.json():null).then(u=>{
    if(!u||!u.tracked){box.innerHTML="";return;}   // KV 미연결 → 위젯 숨김

  }).catch(()=>{box.innerHTML="";});
}

      <div class="ico">${t.icon}</div><h2>${esc(t.name)}</h2>
      <div class="desc">${esc(t.desc)}</div>
      <ul class="feats">${t.feats.map(f=>`<li>${esc(f)}</li>`).join("")}</ul>
      <div class="go">열기 →</div></div>`).join("")}</div>
    <div class="foot"><b>연결 구조</b> · 상단 고정 메뉴에서 5개 작업공간으로 즉시 전환합니다. 도구들은 같은 담당 상품 집합(홈·장기7·일반2)을 공유합니다. · <a href="${WIKI}" target="_blank" rel="noopener">📖 위키</a><br>
    데이터·카피는 샘플·공개값 기준 · 광고 문구는 배포 전 광고심의 검수 · 검색량/입찰가는 각 광고 플랫폼에서 확정 · 뉴스 요약/시사점은 마케팅 분석(개인정보·영업비밀 미포함).</div>
  </div>`;
}
function show(id){
  if(id==="home"){home.style.display="block";frame.style.display="none";openTab.href="#";openTab.style.visibility="hidden";renderNav("home");location.hash="";loadUsage();return;}
  const t=TOOLS.find(x=>x.id===id); if(!t)return;
  openTab.href=LOCAL?t.file:t.url; openTab.style.visibility="visible";
  if(LOCAL){ home.style.display="none"; frame.style.display="block"; if(frame.getAttribute("src")!==t.file)frame.src=t.file; }
  else { window.open(t.url,"_blank","noopener"); }   // 아티팩트에선 iframe이 막히므로 새 탭
  renderNav(id); location.hash=id;
}
document.addEventListener("click",e=>{
  const b=e.target.closest("[data-tool]"); if(b){e.preventDefault();show(b.dataset.tool);}
});
document.getElementById("themeBtn").addEventListener("click",()=>{const c=document.documentElement.getAttribute("data-theme");const d=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",d?"light":"dark");});

/* ===== API 키 설정 (localStorage 'mf_keys' · 이 브라우저에만) ===== */
/* 같은 오리진이므로 iframe 안 툴들도 이 키를 그대로 읽어 씀 (파일·Secrets에 키 붙일 필요 X) */
const KEYS_LS="mf_keys";
const KEY_SCHEMA=[
  {sec:"CORS 프록시 (URL에서 바로 쓰려면 필수)",ac:"#0e9e8e",fields:[
    {k:"proxy",l:"프록시 URL",ph:"https://내워커.<계정>.workers.dev"}]},
  {sec:"네이버 검색 API (뉴스·데이터랩)",ac:"#e0850f",fields:[
    {k:"naverId",l:"Client ID",ph:"developers.naver.com"},
    {k:"naverSecret",l:"Client Secret",ph:"••••••••"}]},
  {sec:"네이버 검색광고 API (검색량)",ac:"#2b6cb0",fields:[
    {k:"adKey",l:"API Key",ph:"searchad.naver.com"},
    {k:"adSecret",l:"Secret Key",ph:"••••••••"},
    {k:"adCustomer",l:"Customer ID",ph:"숫자"}]},
  {sec:"텔레그램 (데일리 브리프)",ac:"#7c5cd6",fields:[
    {k:"tgToken",l:"Bot Token",ph:"@BotFather"},
    {k:"tgChat",l:"Chat ID",ph:"@userinfobot"}]},
];
function loadKeys(){try{return JSON.parse(localStorage.getItem(KEYS_LS)||"{}")||{};}catch(e){return {};}}
function ktoast(m){const t=document.getElementById("ktoast");t.textContent=m;t.classList.add("on");setTimeout(()=>t.classList.remove("on"),1900);}
function renderKeys(){
  const v=loadKeys();
  document.getElementById("keyBody").innerHTML=KEY_SCHEMA.map(s=>
    `<div class="ksec" style="--ac:${s.ac}"><span class="dot"></span>${esc(s.sec)}</div>`+
    s.fields.map(f=>`<div class="krow"><label>${esc(f.l)}</label>
      <input type="password" autocomplete="off" spellcheck="false" data-k="${f.k}" value="${esc(v[f.k]||"")}" placeholder="${esc(f.ph)}"></div>`).join("")
  ).join("")+
  `<div class="knote">👥 <b>팀 전원이 쓰려면</b> — 키를 <b>여기 말고 워커(Cloudflare) 시크릿</b>에 넣으세요. 그러면 팀원은 <b>설정 없이</b> 대시보드만 열면 실시간 데이터가 나옵니다. (프록시 URL은 이미 툴에 기본 내장). 방법 → <b>docs/api-from-url.md</b><br>
   🔒 아래 입력값은 <b>이 브라우저에만</b> 저장되는 <b>개인 override</b>일 뿐(서버·깃 전송/커밋 0) — 워커 시크릿이 없을 때 나 혼자 임시로 쓰거나, 팀 기본값을 덮어쓸 때만 사용합니다.</div>`;
}
function openKeys(){renderKeys();document.getElementById("keyMask").classList.add("on");}
function closeKeys(){document.getElementById("keyMask").classList.remove("on");}
document.getElementById("keyBtn").addEventListener("click",openKeys);
document.getElementById("keyClose").addEventListener("click",closeKeys);
document.getElementById("keyMask").addEventListener("click",e=>{if(e.target.id==="keyMask")closeKeys();});
document.getElementById("keySave").addEventListener("click",()=>{
  const o={};document.querySelectorAll("#keyBody input[data-k]").forEach(i=>{const val=i.value.trim();if(val)o[i.dataset.k]=val;});
  try{localStorage.setItem(KEYS_LS,JSON.stringify(o));ktoast("저장됨 · 이 브라우저에만");closeKeys();}catch(e){ktoast("저장 실패 — 저장공간 확인");}
});
document.getElementById("keyClear").addEventListener("click",()=>{
  if(confirm("저장된 API 키를 이 브라우저에서 모두 지울까요?")){localStorage.removeItem(KEYS_LS);renderKeys();ktoast("모두 지움");}
});
document.addEventListener("keydown",e=>{if(e.key==="Escape")closeKeys();});

renderHome();
loadUsage();
const start=(location.hash||"").replace("#","");
renderNav("home");
if(start&&TOOLS.some(t=>t.id===start)&&LOCAL){show(start);} else {show("home");}
</script>
</body>
</html>
