<html lang="ko">
<head>

<title>Modooflow SEO · 테크니컬 SEO 콘솔</title>
<style>
/* ============================================================
   한화손해보험 다이렉트 · 장기CM SEO To-Do 콘솔 (CM사업부)
   상단 3토글(장기·일반·범용) · 자체완결 · 외부 의존성 0
   ============================================================ */
:root{
  --brand:#e0850f; --brand-600:#b96b08; --brand-50:#fdeee0; --brand-tint:#fbf5ec;
  --grad:linear-gradient(135deg,#e0850f 0%,#f29e67 100%);
  --ink:#1e1e2c; --ink-2:#4b4d60; --muted:#8a8ea0; --faint:#c4c8d4;
  --bg:#f4f3f0; --surface:#ffffff; --surface-2:#faf9f6; --line:#e6e4dd; --line-2:#efeee8;
  --good:#16a34a; --good-bg:#e7f6ee; --good-ink:#0f7a37;
  --mid:#c47f12; --mid-bg:#fbf1de; --mid-ink:#8a5906;
  --bad:#e5484d; --bad-bg:#fcecec; --bad-ink:#b4242a;
  --side:#191823; --side-2:#26232f;
  --r:15px; --r-sm:11px; --r-xs:8px;
  --sh:0 1px 2px rgba(24,20,40,.05),0 6px 22px rgba(24,20,40,.06);
  --sh-lg:0 14px 44px rgba(24,20,40,.13);
  --mono:ui-monospace,"SF Mono","Roboto Mono","Menlo",monospace;
  --sans:'Pretendard','Noto Sans KR','Nanum Gothic','Apple SD Gothic Neo',-apple-system,BlinkMacSystemFont,sans-serif;
}
@media (prefers-color-scheme:dark){:root{
  --brand:#f0a63f; --brand-600:#f7b95f; --brand-50:#3a2a12; --brand-tint:#211a10;
  --grad:linear-gradient(135deg,#e0850f 0%,#f2a95c 100%);
  --ink:#f2f0f6; --ink-2:#c3c1d0; --muted:#8f8ca0; --faint:#54525f;
  --bg:#131118; --surface:#1c1a23; --surface-2:#211f29; --line:#2e2b37; --line-2:#262330;
  --good:#3ecf7a; --good-bg:#13301f; --good-ink:#5fdd92;
  --mid:#e6a53a; --mid-bg:#33270f; --mid-ink:#f0bd5c;
  --bad:#f2696e; --bad-bg:#361c1e; --bad-ink:#f78a8e;
  --side:#0f0e14; --side-2:#1a1822;
  --sh:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35); --sh-lg:0 14px 44px rgba(0,0,0,.5);
}}
:root[data-theme="dark"]{
  --brand:#f0a63f; --brand-600:#f7b95f; --brand-50:#3a2a12; --brand-tint:#211a10;
  --grad:linear-gradient(135deg,#e0850f 0%,#f2a95c 100%);
  --ink:#f2f0f6; --ink-2:#c3c1d0; --muted:#8f8ca0; --faint:#54525f;
  --bg:#131118; --surface:#1c1a23; --surface-2:#211f29; --line:#2e2b37; --line-2:#262330;
  --good:#3ecf7a; --good-bg:#13301f; --good-ink:#5fdd92;
  --mid:#e6a53a; --mid-bg:#33270f; --mid-ink:#f0bd5c;
  --bad:#f2696e; --bad-bg:#361c1e; --bad-ink:#f78a8e;
  --side:#0f0e14; --side-2:#1a1822;
  --sh:0 1px 2px rgba(0,0,0,.3),0 6px 22px rgba(0,0,0,.35); --sh-lg:0 14px 44px rgba(0,0,0,.5);
}
:root[data-theme="light"]{
  --brand:#e0850f; --brand-600:#b96b08; --brand-50:#fdeee0; --brand-tint:#fbf5ec;
  --grad:linear-gradient(135deg,#e0850f 0%,#f29e67 100%);
  --ink:#1e1e2c; --ink-2:#4b4d60; --muted:#8a8ea0; --faint:#c4c8d4;
  --bg:#f4f3f0; --surface:#ffffff; --surface-2:#faf9f6; --line:#e6e4dd; --line-2:#efeee8;
  --good:#16a34a; --good-bg:#e7f6ee; --good-ink:#0f7a37;
  --mid:#c47f12; --mid-bg:#fbf1de; --mid-ink:#8a5906;
  --bad:#e5484d; --bad-bg:#fcecec; --bad-ink:#b4242a;
  --side:#191823; --side-2:#26232f;
  --sh:0 1px 2px rgba(24,20,40,.05),0 6px 22px rgba(24,20,40,.06); --sh-lg:0 14px 44px rgba(24,20,40,.13);
}
*{margin:0;padding:0;box-sizing:border-box;}
html{scroll-behavior:smooth;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;
  -webkit-font-smoothing:antialiased;letter-spacing:-.01em;word-break:keep-all;}
.wrap{max-width:1120px;margin:0 auto;min-height:100vh;}
@media (prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;scroll-behavior:auto;}}

/* ── 상단바 + 3토글 ── */
.topbar{position:sticky;top:0;z-index:30;display:flex;align-items:center;gap:14px 18px;flex-wrap:wrap;
  padding:13px 24px;background:var(--surface);border-bottom:1px solid var(--line);}
.brand{display:flex;align-items:center;gap:11px;}
.brand-logo{width:38px;height:38px;border-radius:10px;background:var(--grad);display:flex;align-items:center;
  justify-content:center;color:#fff;font-weight:800;font-size:13px;box-shadow:0 6px 16px rgba(224,133,15,.42);flex:0 0 auto;letter-spacing:-.02em;}
.brand-name{font-size:15px;font-weight:800;color:var(--ink);letter-spacing:-.02em;line-height:1.15;}
.brand-name small{display:block;font-size:10px;font-weight:600;color:var(--muted);margin-top:1px;letter-spacing:0;}
.seg3{display:inline-flex;background:var(--line-2);border:1px solid var(--line);border-radius:12px;padding:4px;gap:3px;margin-left:auto;}
.seg3 button{border:none;background:transparent;font-family:inherit;font-weight:800;font-size:13px;color:var(--muted);
  padding:9px 20px;border-radius:9px;cursor:pointer;transition:.15s;white-space:nowrap;}
.seg3 button:hover{color:var(--ink);}
.seg3 button.on{background:var(--grad);color:#fff;box-shadow:0 4px 12px rgba(224,133,15,.3);}
.seg3 button .cnt{font-family:var(--mono);font-size:10.5px;opacity:.7;margin-left:4px;}
.icon-btn{width:36px;height:36px;border-radius:9px;border:1px solid var(--line);background:var(--surface);
  color:var(--ink-2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;flex:0 0 auto;}
.icon-btn:hover{border-color:var(--brand);color:var(--brand-600);}

/* ── 상품 칩 서브내비 ── */
.subnav{display:flex;gap:8px;overflow-x:auto;padding:13px 24px;background:var(--bg);border-bottom:1px solid var(--line);
  scrollbar-width:thin;}
.chip{flex:0 0 auto;display:flex;align-items:center;gap:8px;padding:8px 14px;border-radius:999px;border:1px solid var(--line);
  background:var(--surface);color:var(--ink-2);font-family:inherit;font-size:12.5px;font-weight:700;cursor:pointer;
  white-space:nowrap;transition:.15s;}
.chip:hover{border-color:var(--brand);color:var(--ink);}
.chip.on{background:var(--brand-50);border-color:var(--brand);color:var(--brand-600);}
.chip .cdot{width:8px;height:8px;border-radius:50%;flex:0 0 auto;}
.chip small{font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:600;}
.chip.on small{color:var(--brand-600);}
.chip.pinned{border-style:dashed;}

.content{padding:22px 24px 60px;}
.view{display:none;} .view.on{display:block;animation:fade .2s ease;}
@keyframes fade{from{opacity:0;transform:translateY(6px);}to{opacity:1;transform:none;}}
.scope{font-size:11.5px;color:var(--muted);margin-bottom:14px;line-height:1.6;display:flex;gap:8px;align-items:center;flex-wrap:wrap;}
.scope .sc-tag{font-weight:800;color:var(--brand-600);background:var(--brand-50);padding:2px 9px;border-radius:6px;}

/* ── 화면 헤더 ── */
.scr-hero{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;margin-bottom:16px;box-shadow:var(--sh);}
.scr-hero-top{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:11px;}
.scr-hero-top h2{font-size:17px;font-weight:800;letter-spacing:-.02em;}
.scr-hero-top .spacer{flex:1;}
.score-chip{display:inline-flex;align-items:center;gap:5px;font-family:var(--mono);font-size:12px;font-weight:800;
  padding:4px 10px;border-radius:8px;font-variant-numeric:tabular-nums;}
.score-chip small{font-family:var(--sans);font-weight:700;opacity:.75;}
.delivery{font-size:10.5px;font-weight:800;padding:3px 9px;border-radius:999px;}
.delivery.direct{background:var(--brand-50);color:var(--brand-600);}
.delivery.bridge{background:var(--bad-bg);color:var(--bad-ink);}
.delivery.home{background:var(--line-2);color:var(--ink-2);}
.usp-line{font-size:12px;font-weight:600;color:var(--brand-600);background:var(--brand-50);border:1px solid var(--brand-50);border-radius:9px;padding:8px 12px;margin-bottom:11px;line-height:1.5;}
.usp-line b{font-weight:800;}
.url-line{font-family:var(--mono);font-size:11.5px;color:var(--brand-600);word-break:break-all;margin-bottom:4px;}
.url-line a{color:inherit;}
.dest-line{font-family:var(--mono);font-size:11px;color:var(--muted);word-break:break-all;margin-bottom:12px;}
.dest-line b{color:var(--bad-ink);}
.cur-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px;}
@media(max-width:720px){.cur-grid{grid-template-columns:1fr;}}
.cur-box{border:1px solid var(--line);border-radius:var(--r-sm);padding:11px 13px;background:var(--surface-2);}
.cur-box .cb-top{display:flex;align-items:center;gap:7px;margin-bottom:6px;}
.cur-box .cb-k{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;}
.cur-box .cb-v{font-family:var(--mono);font-size:11.5px;line-height:1.5;color:var(--ink);word-break:break-all;}
.cur-box .cb-v.bad{color:var(--bad-ink);}

.prog{display:flex;align-items:center;gap:12px;margin-bottom:16px;background:var(--surface);border:1px solid var(--line);
  border-radius:var(--r);padding:13px 18px;box-shadow:var(--sh);}
.prog-bar{flex:1;height:8px;border-radius:99px;background:var(--line-2);overflow:hidden;}
.prog-fill{height:100%;border-radius:99px;background:var(--grad);transition:width .3s;}
.prog-num{font-family:var(--mono);font-size:13px;font-weight:800;font-variant-numeric:tabular-nums;white-space:nowrap;}
.prog-num small{color:var(--muted);font-weight:600;}
.sec-lbl{font-size:11px;font-weight:800;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin:18px 2px 10px;}
.handoff{display:flex;align-items:center;gap:8px;flex-wrap:wrap;font-size:12px;font-weight:700;color:var(--ink-2);margin-bottom:16px;background:var(--surface-2);border:1px dashed var(--brand);border-radius:var(--r-sm);padding:11px 14px;}
.handoff .hf-lbl{color:var(--brand-600);font-weight:800;}

/* ══ 유료 SaaS 셸 ══ */
.appbar{position:sticky;top:0;z-index:31;display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:11px 22px;background:var(--surface);border-bottom:1px solid var(--line);}
.ab-brand{display:flex;align-items:center;gap:11px;}
.ab-brand .brand-logo{width:36px;height:36px;border-radius:10px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;box-shadow:0 6px 16px rgba(224,133,15,.42);}
.ab-brand .bn{font-size:15px;font-weight:800;letter-spacing:-.02em;display:flex;align-items:center;gap:7px;color:var(--ink);}
.ab-brand small{display:block;font-size:10px;color:var(--muted);font-weight:600;margin-top:1px;}
.plan-badge{font-size:9.5px;font-weight:800;background:var(--grad);color:#fff;padding:2px 7px;border-radius:5px;letter-spacing:.05em;}
.plan-badge.sm{font-size:8.5px;padding:1px 5px;}
.ab-right{margin-left:auto;display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.ws{font-size:11px;font-weight:700;color:var(--ink-2);background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:6px 10px;}
.ws b{color:var(--brand-600);}
.usage{font-size:10.5px;color:var(--muted);font-weight:600;}
.usage b{color:var(--good);font-weight:800;}
.btn.upgrade{background:var(--grad);color:#fff;border:none;box-shadow:0 4px 12px rgba(224,133,15,.3);}
.btn.upgrade:hover{filter:brightness(1.05);color:#fff;}
.avatar{width:34px;height:34px;border-radius:50%;background:var(--side);color:#fff;display:flex;align-items:center;justify-content:center;font-size:11.5px;font-weight:800;flex:0 0 auto;}
.tabs{position:sticky;top:58px;z-index:30;display:flex;gap:2px;padding:0 16px;background:var(--surface);border-bottom:1px solid var(--line);overflow-x:auto;}
.tabs button{border:none;background:none;font-family:inherit;font-size:13.5px;font-weight:700;color:var(--muted);padding:13px 15px;cursor:pointer;border-bottom:2.5px solid transparent;white-space:nowrap;display:flex;align-items:center;gap:6px;transition:.15s;}
.tabs button:hover{color:var(--ink);}
.tabs button.on{color:var(--brand-600);border-bottom-color:var(--brand);}
.tabs .tcnt{font-family:var(--mono);font-size:10.5px;background:var(--line-2);color:var(--ink-2);padding:0 6px;border-radius:99px;font-weight:700;}
.tabs button.on .tcnt{background:var(--brand-50);color:var(--brand-600);}
/* 대시보드 */
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:14px;margin-bottom:18px;}
@media(max-width:820px){.kpi-row{grid-template-columns:1fr 1fr;}}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);}
.kpi .k-num{font-family:var(--mono);font-size:27px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1;}
.kpi .k-lbl{font-size:11.5px;color:var(--muted);font-weight:700;margin-top:6px;}
.kpi .k-sub{font-size:11px;margin-top:4px;font-weight:700;}
.dash-2{display:grid;grid-template-columns:1.35fr 1fr;gap:16px;}
@media(max-width:820px){.dash-2{grid-template-columns:1fr;}}
.panel{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:18px 20px;box-shadow:var(--sh);}
.panel h3{font-size:14px;font-weight:800;margin-bottom:12px;display:flex;align-items:center;gap:8px;}
.rank-item{display:flex;align-items:center;gap:11px;padding:9px 0;border-bottom:1px solid var(--line-2);cursor:pointer;}
.rank-item:last-child{border-bottom:none;}
.rank-item:hover .ri-name{color:var(--brand-600);}
.ri-rank{font-family:var(--mono);font-size:12px;font-weight:800;color:var(--muted);width:16px;}
.ri-name{flex:1;font-size:13px;font-weight:700;}
.ri-name small{display:block;font-size:10.5px;color:var(--muted);font-weight:500;margin-top:1px;}
.ri-score{font-family:var(--mono);font-size:11.5px;font-weight:800;padding:3px 8px;border-radius:7px;font-variant-numeric:tabular-nums;}
.qa{display:flex;flex-direction:column;gap:9px;}
.qa button{display:flex;align-items:center;gap:11px;width:100%;text-align:left;padding:12px 14px;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface-2);font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink);cursor:pointer;transition:.15s;}
.qa button:hover{border-color:var(--brand);background:var(--brand-tint);}
.qa .qa-ico{width:30px;height:30px;border-radius:8px;background:var(--brand-50);color:var(--brand-600);display:flex;align-items:center;justify-content:center;font-size:14px;flex:0 0 auto;}
.qa small{display:block;font-size:10.5px;color:var(--muted);font-weight:500;margin-top:1px;}
/* 요금제 */
.price-hero{text-align:center;padding:12px 0 22px;}
.price-hero h2{font-size:24px;font-weight:800;letter-spacing:-.03em;}
.price-hero p{font-size:13px;color:var(--muted);margin-top:6px;}
.plans{display:grid;grid-template-columns:repeat(3,1fr);gap:16px;align-items:stretch;}
@media(max-width:820px){.plans{grid-template-columns:1fr;}}
.plan{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:22px 20px;box-shadow:var(--sh);display:flex;flex-direction:column;}
.plan.featured{border:2px solid var(--brand);box-shadow:var(--sh-lg);position:relative;}
.plan.featured::before{content:"현재 플랜";position:absolute;top:-11px;left:50%;transform:translateX(-50%);background:var(--grad);color:#fff;font-size:10px;font-weight:800;padding:3px 12px;border-radius:99px;letter-spacing:.04em;white-space:nowrap;}
.plan .p-name{font-size:15px;font-weight:800;}
.plan .p-price{font-size:29px;font-weight:800;letter-spacing:-.02em;margin:10px 0 2px;font-family:var(--sans);}
.plan .p-price small{font-size:13px;color:var(--muted);font-weight:600;font-family:var(--sans);}
.plan .p-desc{font-size:11.5px;color:var(--muted);margin-bottom:16px;line-height:1.5;}
.plan ul{list-style:none;display:flex;flex-direction:column;gap:9px;flex:1;margin-bottom:18px;}
.plan li{font-size:12px;color:var(--ink-2);display:flex;gap:8px;line-height:1.45;}
.plan li::before{content:"✓";color:var(--good);font-weight:800;flex:0 0 auto;}
.plan li.off{color:var(--faint);} .plan li.off::before{content:"—";color:var(--faint);}
.plan .p-cta{padding:11px;border-radius:10px;border:1px solid var(--line);background:var(--surface);font-family:inherit;font-size:13px;font-weight:800;cursor:pointer;color:var(--ink);transition:.15s;}
.plan.featured .p-cta{background:var(--grad);color:#fff;border-color:transparent;}
.plan .p-cta:hover{border-color:var(--brand);}

/* ── To-Do ── */
.todo{border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);margin-bottom:11px;box-shadow:var(--sh);overflow:hidden;}
.todo.done{opacity:.62;}
.todo-head{display:flex;align-items:flex-start;gap:12px;padding:13px 15px;cursor:pointer;}
.chk{width:22px;height:22px;border-radius:7px;border:2px solid var(--faint);flex:0 0 auto;display:flex;align-items:center;
  justify-content:center;font-size:13px;color:transparent;background:var(--surface);transition:.15s;margin-top:1px;}
.todo.done .chk{background:var(--good);border-color:var(--good);color:#fff;}
.todo-hmain{flex:1;min-width:0;}
.todo-what{font-size:14px;font-weight:800;letter-spacing:-.01em;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.todo.done .todo-what{text-decoration:line-through;text-decoration-color:var(--faint);}
.todo-why{font-size:12px;color:var(--ink-2);margin-top:4px;line-height:1.55;}
.todo-why code{font-family:var(--mono);font-size:10.5px;background:var(--line-2);padding:1px 5px;border-radius:4px;color:var(--ink);}
.pri{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;flex:0 0 auto;}
.pri.상{background:var(--bad-bg);color:var(--bad-ink);} .pri.중{background:var(--mid-bg);color:var(--mid-ink);} .pri.하{background:var(--line-2);color:var(--ink-2);}
.todo-body{padding:0 15px 15px 49px;}
.code-row{margin-top:8px;}
.code-lbl{font-size:9.5px;font-weight:800;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;margin-bottom:3px;
  display:flex;align-items:center;justify-content:space-between;}
.code-lbl .cp{cursor:pointer;color:var(--brand-600);border:none;background:none;font-family:inherit;font-size:10px;font-weight:700;padding:0;}
.code-lbl .cp:hover{text-decoration:underline;}
.codeblk{font-family:var(--mono);font-size:11.5px;line-height:1.6;border-radius:8px;padding:11px 13px;overflow-x:auto;white-space:pre;}
.codeblk.before{background:var(--bad-bg);color:var(--bad-ink);}
.codeblk.after{background:var(--side);color:#e8e6f0;}
.codeblk.after .tag{color:#f0b968;} .codeblk.after .str{color:#7fe0a3;} .codeblk.after .cm{color:#8a869b;}
.meter{display:flex;align-items:center;gap:8px;margin-top:7px;}
.meter-bar{flex:1;height:5px;border-radius:99px;background:var(--line-2);overflow:hidden;}
.meter-fill{height:100%;border-radius:99px;transition:width .3s;}
.meter-num{font-family:var(--mono);font-size:10.5px;font-weight:700;font-variant-numeric:tabular-nums;white-space:nowrap;}
.meter-num small{color:var(--muted);font-weight:600;}

/* ── PRO ── */
.pro-hero{background:linear-gradient(135deg,var(--brand-tint),var(--surface));border:1px solid var(--line);border-radius:var(--r);padding:20px 22px;margin-bottom:16px;box-shadow:var(--sh);}
.pro-hero h2{font-size:18px;font-weight:800;display:flex;align-items:center;gap:9px;letter-spacing:-.02em;}
.pro-badge{font-size:10px;font-weight:800;background:var(--grad);color:#fff;padding:3px 9px;border-radius:6px;letter-spacing:.04em;}
.pro-hero p{font-size:12.5px;color:var(--ink-2);margin-top:6px;line-height:1.6;}
.import-card{background:var(--surface);border:1px dashed var(--brand);border-radius:var(--r);padding:15px 18px;margin-bottom:14px;box-shadow:var(--sh);}
.import-card .ic-top{display:flex;align-items:center;justify-content:space-between;gap:10px;margin-bottom:8px;font-size:12.5px;}
.import-card .ic-top b{font-weight:800;}
.import-card textarea{width:100%;min-height:64px;font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;color:var(--ink);resize:vertical;line-height:1.5;}
.import-card .ic-actions{display:flex;align-items:center;gap:10px;margin-top:9px;flex-wrap:wrap;}
.form-grid{display:grid;grid-template-columns:1fr 1fr;gap:13px;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:20px;box-shadow:var(--sh);}
@media(max-width:720px){.form-grid{grid-template-columns:1fr;}}
.ff{display:flex;flex-direction:column;gap:5px;} .ff.full{grid-column:1/-1;}
.ff label{font-size:11px;font-weight:800;color:var(--ink-2);} .ff label small{color:var(--muted);font-weight:600;}
.ff input,.ff select,.ff textarea{font-family:inherit;font-size:12.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:9px 11px;transition:.15s;width:100%;}
.ff input:focus,.ff select:focus,.ff textarea:focus{outline:none;border-color:var(--brand);background:var(--surface);box-shadow:0 0 0 3px var(--brand-50);}
.ff textarea{resize:vertical;min-height:52px;line-height:1.5;}
.form-actions{grid-column:1/-1;display:flex;gap:10px;align-items:center;margin-top:4px;flex-wrap:wrap;}
.form-actions .hint{font-size:11px;color:var(--muted);}
.btn{padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.btn:hover{border-color:var(--brand);color:var(--brand-600);}
.btn.primary{background:var(--grad);color:#fff;border-color:transparent;box-shadow:0 4px 12px rgba(224,133,15,.28);}
.pro-result{margin-top:18px;}
.copy-grid{display:grid;grid-template-columns:repeat(3,1fr);gap:12px;}
@media(max-width:820px){.copy-grid{grid-template-columns:1fr;}}
.copy-card{border:1px solid var(--line);border-radius:var(--r-sm);padding:14px;background:var(--surface);display:flex;flex-direction:column;gap:11px;box-shadow:var(--sh);}
.copy-card .cc-t{font-size:12px;font-weight:800;} .copy-card .cc-tg{font-size:10px;font-weight:700;color:var(--muted);}
.cfield{display:flex;flex-direction:column;gap:4px;}
.cf-lbl{font-size:9.5px;font-weight:800;color:var(--muted);letter-spacing:.05em;text-transform:uppercase;display:flex;justify-content:space-between;}
.cf-lbl .cp{cursor:pointer;color:var(--brand-600);border:none;background:none;font-family:inherit;font-size:9.5px;font-weight:700;padding:0;}
.cf-text{font-size:12px;line-height:1.5;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:7px;padding:8px 10px;}
.impl-note{font-size:11.5px;color:var(--ink-2);line-height:1.65;margin-bottom:11px;}
.impl-note a{color:var(--brand-600);font-weight:700;text-decoration:none;} .impl-note a:hover{text-decoration:underline;}
.impl-block{margin-bottom:11px;} .impl-block .code-lbl{margin-bottom:4px;}

.badge{display:inline-flex;align-items:center;gap:5px;font-size:10.5px;font-weight:800;padding:3px 8px;border-radius:999px;white-space:nowrap;}
.badge.good{background:var(--good-bg);color:var(--good-ink);} .badge.mid{background:var(--mid-bg);color:var(--mid-ink);}
.badge.bad{background:var(--bad-bg);color:var(--bad-ink);} .badge.ghost{background:var(--line-2);color:var(--ink-2);}
.foot-note{font-size:11px;color:var(--muted);line-height:1.6;margin-top:18px;padding:12px 14px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);}
.foot-note b{color:var(--ink-2);font-weight:800;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:var(--sh-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}

const $=(s,el=document)=>el.querySelector(s);

const charLen=s=>[...s].length, utf8Len=s=>new TextEncoder().encode(s).length;
const euckrLen=s=>{let n=0;for(const c of s)n+=(c.codePointAt(0)>127?2:1);return n;};

/* ── 미터 ── */
function meter(text,limit){
  const c=charLen(text),u=utf8Len(text),e=euckrLen(text);
  const col=c>limit?"var(--bad)":c>limit*.85?"var(--mid)":"var(--good)";
  return `<div class="meter"><div class="meter-bar"><div class="meter-fill" style="width:${Math.min(100,c/limit*100)}%;background:${col}"></div></div>
    <div class="meter-num" style="color:${col}">${c}자 <small>/${limit} · ${u}B(UTF-8) · ${e}B(EUC-KR)</small></div></div>`;
}

        <div class="cur-box"><div class="cb-top"><span class="cb-k">입력 Description</span><span class="badge ${dv}">${sevWord(dv)}</span></div><div class="cb-v ${dv==="bad"?"bad":""}">${esc(p.exDesc)}</div></div>
      </div></div>
    <div class="sec-lbl">자동 생성된 To-Do (우선순위 상→하)</div>
    ${ts.map(t=>todoHtml(p,t)).join("")}
    <div class="sec-lbl">검색엔진별 카피안 (자동 생성 · 심의 검수 전제)</div>
    <div class="copy-grid">
      ${proCopyCard("네이버 타깃","상품명+혜택",c.nt,c.gd)}
      ${proCopyCard("구글 타깃","키워드+해결책",`${f.keyword||p.name} 비교 | ${(f.benefits||"보장").split(/[,，]/)[0].trim()} 보장 - ${f.brand||""}`.trim(),c.gd)}
      ${proCopyCard("소셜/OG","카톡·블로그 감성",c.st,c.sd)}
    </div>
    ${implSection(p,c,{brand:f.brand})}
    <div class="foot-note"><b>휴리스틱 진단</b> · 점수는 입력값 규칙 기반 추정이며 실제 순위를 보장하지 않습니다. 카피는 초안이므로 광고심의 검수 후 사용하세요.</div>`;
  $("#csvBtn").addEventListener("click",()=>{
    const rows=[["url","priority","todo","before","after"]];
    ts.forEach(t=>rows.push([p.url,t.pri,t.what.replace(/&lt;/g,"<").replace(/&gt;/g,">"),t.before.replace(/\n/g," "),t.after.replace(/\n/g," ")]));
    const csv="﻿"+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
    const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
    a.download=`seo-todo-${(p.name||"page").replace(/\s/g,"_")}.csv`;a.click();toast("CSV 내려받기 시작");});
  R.scrollIntoView({behavior:"smooth",block:"start"});
}

/* ── 대시보드 ── */
function renderDash(){
  const rows=PRODUCTS.map(p=>({p,g:gScore(p),n:nScore(p)}));
  const avgG=Math.round(rows.reduce((s,x)=>s+x.g,0)/rows.length);
  const avgN=Math.round(rows.reduce((s,x)=>s+x.n,0)/rows.length);
  let tot=0,done=0;PRODUCTS.forEach(p=>{const ts=todosFor(p,COPY[p.key]);tot+=ts.length;done+=ts.filter(t=>isDone(`cm:${p.key}:${t.id}`)).length;});
  const pct=Math.round(done/tot*100);
  const crit=PRODUCTS.filter(p=>p.exTitleV==="bad"||p.exDescV==="bad").length;
  const bridge=PRODUCTS.filter(p=>p.delivery==="bridge").length;
  const worst=rows.slice().sort((a,b)=>(a.g+a.n)-(b.g+b.n)).slice(0,5);
  const gcol=v=>{const[,g]=grade(v);return g==="good"?"var(--good)":g==="mid"?"var(--mid)":"var(--bad)";};
  const kpi=(num,lbl,sub,col)=>`<div class="kpi"><div class="k-num"${col?` style="color:${col}"`:""}>${num}</div><div class="k-lbl">${lbl}</div>${sub?`<div class="k-sub" style="color:${col||"var(--muted)"}">${sub}</div>`:""}</div>`;
  $("#v-dash").innerHTML=`
    <div class="kpi-row">
      ${kpi(PRODUCTS.length,"담당 상품","장기 7 · 일반 2 · 홈")}
      ${kpi(avgG,"평균 구글 점수","100점 만점",gcol(avgG))}
      ${kpi(avgN,"평균 네이버 점수","웹표준 기준",gcol(avgN))}
      ${kpi(pct+"%","To-Do 완료","전체 "+done+"/"+tot,"var(--brand-600)")}
    </div>
    <div class="dash-2">
      <div class="panel">
        <h3>⚠️ 우선 조치 상품 <span style="font-size:11px;color:var(--muted);font-weight:600">· 점수 낮은 순</span></h3>
        ${worst.map((x,i)=>{const avg=Math.round((x.g+x.n)/2),g=grade(avg)[1];return `<div class="rank-item" data-goto="${x.p.cat==="home"?"장기":x.p.cat}:${x.p.key}">
          <span class="ri-rank">${i+1}</span>
          <span class="ri-name">${esc(x.p.name)}<small>${esc(x.p.brand)} · ${delText(x.p.delivery)}</small></span>
          <span class="ri-score" style="background:${bgOf(g)};color:${inkOf(g)}">G${x.g} · N${x.n}</span></div>`;}).join("")}
      </div>
      <div class="panel">
        <h3>⚡ 빠른 작업</h3>
        <div class="qa">
          <button data-nav="pro"><span class="qa-ico">🔍</span><span>범용 진단 실행<small>URL·크롤 JSON → To-Do 자동생성</small></span></button>
          <button data-xls="__all"><span class="qa-ico">📊</span><span>전체 태깅가이드 Excel<small>담당 10상품 통합표 다운로드</small></span></button>
        </div>
      </div>
    </div>
    <div class="panel" style="margin-top:16px">
      <h3>📌 핵심 이슈 요약</h3>
      <div style="font-size:12.5px;color:var(--ink-2);line-height:1.8">
        · <b style="color:var(--bad-ink)">검색로봇(Yeti)에 HTTP 403</b> — 네이버 가이드상 <b>방화벽 차단 시 검색 제외</b> 위험(최우선, 홈 To-Do 참고)<br>
        · 제목/설명 <b style="color:var(--bad-ink)">수정필요 ${crit}종</b> — 가입폼 breadcrumb·폼 라벨 유출<br>
        · <b>분기(carrotBridge) ${bridge}종</b> — 색인·랭킹을 캐롯이 가져감 → HTTP 301·canonical 정리 필요<br>
        · 라이브 DOM(H·alt·OG)은 봇차단(403)으로 미수집 → <b>범용 진단</b>에 unlighthouse 크롤 JSON 붙여넣어 확정
      </div>
    </div>`;
}

/* ── 네비게이션 ── */
let nav="dash";
function setNav(v){
  nav=v;
  document.querySelectorAll("#tabs button").forEach(b=>b.classList.toggle("on",b.dataset.nav===v));
  ["dash","product","pro"].forEach(x=>$("#v-"+x).classList.remove("on"));
  $("#subnav").style.display=(v==="장기"||v==="일반")?"":"none";
  if(v==="dash"){$("#v-dash").classList.add("on");renderDash();}
  else if(v==="장기"||v==="일반"){cat=v;$("#v-product").classList.add("on");curKey=catProducts(v)[0].key;renderScreen();}
  else if(v==="pro"){$("#v-pro").classList.add("on");renderPro();}
  window.scrollTo({top:0,behavior:"auto"});
}
function gotoProduct(c,k){setNav(c);curKey=k;renderScreen();}
document.addEventListener("click",e=>{
  const gt=e.target.closest("[data-goto]"); if(gt){const a=gt.dataset.goto.split(":");gotoProduct(a[0],a[1]);return;}
  const nb=e.target.closest("[data-nav]"); if(nb){setNav(nb.dataset.nav);return;}
  const chip=e.target.closest(".chip"); if(chip){curKey=chip.dataset.screen;renderScreen();window.scrollTo({top:0});return;}
  const xls=e.target.closest("[data-xls]"); if(xls){exportXls(xls.dataset.xls);return;}
  const txt=e.target.closest("[data-txt]"); if(txt){exportText(txt.dataset.txt);return;}
  const cp=e.target.closest(".cp,[data-copy]"); if(cp&&cp.dataset.copy!=null){navigator.clipboard?.writeText(cp.dataset.copy).then(()=>toast("복사됨"),()=>toast("복사 실패"));return;}
  const tg=e.target.closest("[data-toggle]"); if(tg){const id=tg.getAttribute("data-toggle");setDone(id,!isDone(id));
    if($("#v-product").classList.contains("on"))renderScreen();
    else{const el=document.querySelector(`.todo[data-id="${CSS.escape(id)}"]`);if(el)el.classList.toggle("done",isDone(id));}
    return;}
});
$("#themeBtn").addEventListener("click",()=>{
  const cur=document.documentElement.getAttribute("data-theme");
  const dark=cur?cur==="dark":matchMedia("(prefers-color-scheme:dark)").matches;
  document.documentElement.setAttribute("data-theme",dark?"light":"dark");});

/* ── init ── */
setNav("dash");
</script>
