.tl{display:flex;gap:12px;overflow-x:auto;padding:14px 2px 4px;}

.shot .del{float:right;color:var(--faint);cursor:pointer;font-weight:800;}
.shot .del:hover{color:var(--bad);}
.empty{padding:22px 16px;text-align:center;color:var(--muted);font-size:12px;line-height:1.7;}
.cmp{display:grid;grid-template-columns:1fr 1fr;gap:12px;margin-top:12px;}

.cmp .col{border:1px solid var(--line);border-radius:var(--r-sm);overflow:hidden;background:var(--surface-2);}

:root[data-theme="dark"] .box.chg{background:#2a2110;border-color:#4a3a1a;color:#e6c98a;}

.box b{font-weight:800;}

const LS="mf_serp";
function loadArc(){try{return JSON.parse(localStorage.getItem(LS)||"{}")||{};}catch(e){return {};}}
function saveArc(a){try{localStorage.setItem(LS,JSON.stringify(a));}catch(e){toast("저장공간 초과 — 오래된 캡처를 지우거나 백업 후 정리하세요");}}

const todayStr=()=>{const d=new Date();return d.getFullYear()+"-"+String(d.getMonth()+1).padStart(2,"0")+"-"+String(d.getDate()).padStart(2,"0");};

/* 이미지 다운스케일(용량 절약) → dataURL(JPEG) */
function fileToShot(file,cb){
  const rd=new FileReader();
  rd.onload=()=>{const img=new Image();img.onload=()=>{
    const maxW=1000,scale=Math.min(1,maxW/img.width),w=Math.round(img.width*scale),h=Math.round(img.height*scale);
    const cv=document.createElement("canvas");cv.width=w;cv.height=h;cv.getContext("2d").drawImage(img,0,0,w,h);
    let url;try{url=cv.toDataURL("image/jpeg",0.82);}catch(e){url=rd.result;}
    cb(url);
  };img.onerror=()=>cb(rd.result);img.src=rd.result;};
  rd.readAsDataURL(file);
}
function addShot(key,file){const s=safeKey(key);if(!s)return;
  fileToShot(file,url=>{ARC[s]=ARC[s]||[];ARC[s].push({id:Date.now()+"_"+Math.random().toString(36).slice(2,7),date:todayStr(),img:url,note:""});saveArc(ARC);toast("스크린샷 아카이브에 추가됨 · "+todayStr());render();});
}
function delShot(key,id){const s=safeKey(key);if(!s||!ARC[s])return;ARC[s]=ARC[s].filter(x=>x.id!==id);saveArc(ARC);render();}
function editNote(key,id,val){const s=safeKey(key);if(!s||!ARC[s])return;const it=ARC[s].find(x=>x.id===id);if(it){it.note=val;saveArc(ARC);}}

/* 전/후 스크린샷 시각 diff (외부 라이브러리 없이 canvas 픽셀 비교 · pixelmatch 방식) */
function loadImg(src){return new Promise((res,rej)=>{const im=new Image();im.onload=()=>res(im);im.onerror=()=>rej(new Error("이미지 로드 실패"));im.src=src;});}
function imgData(img,W,H){const c=document.createElement("canvas");c.width=W;c.height=H;const x=c.getContext("2d");x.drawImage(img,0,0,W,Math.round(img.height*(W/img.width)));return x.getImageData(0,0,W,H).data;}
function yiqY(d,i){return 0.29889531*d[i]+0.58662247*d[i+1]+0.11448223*d[i+2];}
function yiqI(d,i){return 0.59597799*d[i]-0.27417610*d[i+1]-0.32180189*d[i+2];}
function yiqQ(d,i){return 0.21147017*d[i]-0.52261711*d[i+1]+0.31114694*d[i+2];}
async function diffImages(srcA,srcB,threshold){
  const [ia,ib]=await Promise.all([loadImg(srcA),loadImg(srcB)]);
  const W=Math.max(80,Math.min(ia.width,ib.width,560));
  const hA=Math.round(ia.height*(W/ia.width)),hB=Math.round(ib.height*(W/ib.width));
  const H=Math.min(hA,hB);
  const da=imgData(ia,W,H),db=imgData(ib,W,H);
  const out=document.createElement("canvas");out.width=W;out.height=H;const ox=out.getContext("2d");
  const od=ox.createImageData(W,H);
  const maxDelta=35215*threshold*threshold; let changed=0;
  for(let p=0;p<W*H;p++){const i=p*4;
    const dy=yiqY(da,i)-yiqY(db,i),di=yiqI(da,i)-yiqI(db,i),dq=yiqQ(da,i)-yiqQ(db,i);
    const delta=0.5053*dy*dy+0.2990*di*di+0.1957*dq*dq;
    if(delta>maxDelta){od.data[i]=255;od.data[i+1]=32;od.data[i+2]=110;od.data[i+3]=255;changed++;}
    else{const g=Math.round(yiqY(db,i)*0.55+110);od.data[i]=od.data[i+1]=od.data[i+2]=g;od.data[i+3]=255;} // 배경은 최신 화면을 흐리게
  }
  ox.putImageData(od,0,0);
  return {url:out.toDataURL("image/png"),pct:changed/(W*H)*100,hA,hB,W,H};
}

function renderSidebar(){
  const item=(key,label,cnt,on)=>`<button class="sb-item${on?" on":""}" data-key="${key}"><span>${esc(label)}</span><span class="kc">${cnt}</span></button>`;
  const total=PRODUCTS.reduce((s,p)=>s+shotsOf(p.key).length,0);
  let h=item("__all","▦ 전체 개요",total,curKey==="__all");
  [...new Set(PRODUCTS.map(p=>p.cat))].forEach(cat=>{h+=`<div class="sb-cap">${cat}</div>`;
    PRODUCTS.filter(p=>p.cat===cat).forEach(p=>{h+=item(p.key,p.name,shotsOf(p.key).length,curKey===p.key);});});
  $("#sbNav").innerHTML=h;
}
function serpUrl(kw){return "https://search.naver.com/search.naver?query="+encodeURIComponent(kw);}
function archiveSection(p){
  const shots=shotsOf(p.key);
  const tl=shots.length?`<div class="tl">${shots.map(s=>`<div class="shot"><span class="del" data-del="${s.id}" title="삭제">✕</span>
      <img src="${s.img}" data-zoom="${s.id}" alt="${esc(p.kw)} ${esc(s.date)}">
      <div class="d">${esc(s.date)}</div>
      <input class="note" data-note="${s.id}" value="${esc(s.note||"")}" placeholder="변화 메모(순위·신규 광고 등)" style="width:150px;border:1px solid var(--line);border-radius:6px;padding:3px 6px;background:var(--surface-2);color:var(--ink);font-family:inherit;margin-top:3px"></div>`).join("")}</div>`
    : `<div class="empty">아직 저장된 스크린샷이 없습니다.<br><b>네이버 PC 검색결과 보기</b>로 열어 캡처한 뒤, 위 영역에 이번 주 스크린샷을 올리세요.<br>매주 같은 시점(예: 월요일 오전)에 올리면 주간 변화가 쌓입니다.</div>`;
  // before/after 비교
  const opts=shots.map(s=>`<option value="${s.id}">${esc(s.date)}${s.note?" · "+esc(s.note.slice(0,14)):""}</option>`).join("");
  const cmp=shots.length>=2?`<div class="cmp">
      <div class="col"><select data-cmp="A">${opts}</select><div class="imgwrap" data-col="A"></div></div>
      <div class="col"><select data-cmp="B">${opts}</select><div class="imgwrap" data-col="B"></div></div>
    </div>
    <div class="diffbar"><button class="btn sm primary" id="diffGo">🔍 전/후 변화 감지</button>
      <label class="sens">민감도 <input type="range" id="diffSens" min="1" max="30" value="10"></label>
      <span class="swatch"><i></i>붉은 영역 = 바뀐 부분(신규 광고·순위·문구)</span>
      <span class="diffmeta" id="diffMeta">두 주차를 고른 뒤 변화 감지를 누르세요.</span></div>
    <div class="diffwrap" id="diffWrap"></div>`:"";
  return `<div class="sec">
    <div class="sec-h"><span class="t">📸 주간 SERP 스크린샷 아카이브</span><span class="sub">· ${shots.length}주차 · 이 브라우저에 저장</span>
      <a class="serplink" style="margin-left:auto" href="${serpUrl(p.kw)}" target="_blank" rel="noopener">네이버 PC 검색결과 보기 ↗</a></div>
    <div class="sec-b">
      <div class="drop" id="drop"><b>＋ 이번 주 스크린샷 올리기</b> — 파일 선택 또는 여기로 드래그<input type="file" id="shotFile" accept="image/*" multiple style="display:none"></div>
      ${tl}
      ${shots.length>=2?`<div class="sec-lbl" style="margin:16px 0 0">전/후 비교 (두 주차 선택)</div>${cmp}`:""}
    </div></div>`;
}
function intelSection(p){
  const n=SERPINTEL[safeKey(p.key)]; if(!n)return "";
  const rows=n.comps.map(c=>{const b=areaBadge[c.area]||areaBadge.org;return `<tr><td class="who">${esc(c.who)}</td><td><span class="badge ${b[0]}">${b[1]}</span></td><td>${esc(c.hook)}</td></tr>`;}).join("");
  return `<div class="sec">
    <div class="sec-h"><span class="t">🎯 경쟁사 소구포인트</span><span class="sub">· 네이버 검색결과 근거 · 기준 ${esc(INTEL_ASOF)}</span></div>
    <div class="sec-b">
      <table><thead><tr><th>경쟁사</th><th>노출</th><th>소구포인트</th></tr></thead><tbody>${rows}</tbody></table>
      <div class="box us"><span class="lb">우리 대응</span>${esc(n.ours)}</div>
      <div class="box chg"><span class="lb">변화 분석</span>${esc(n.change)}</div>
    </div></div>`;
}
function renderProduct(){
  const p=getP(curKey);
  $("#pt").textContent=p.name; $("#pts").textContent=`· 대표키워드 "${p.kw}"`;
  $("#content").innerHTML=`
    <div class="seedbar"><div class="st"><h2>${esc(p.name)}</h2><span class="kwchip">${esc(p.kw)} · PC</span>
      <a class="serplink" href="${serpUrl(p.kw)}" target="_blank" rel="noopener">네이버 PC 검색결과 열기 ↗</a></div></div>
    ${archiveSection(p)}
    ${intelSection(p)}
    <div class="note"><b>운영 방법</b> · 매주 같은 시점에 <b>네이버 PC 검색결과</b>를 캡처해 올리면 주차별 아카이브가 쌓이고, <b>전/후 비교</b>로 상단 광고주 교체·신규 진입·문구 변화를 한눈에 봅니다. 변화·소구포인트는 <b>뉴스 콘솔</b>의 동향과 함께 해석하세요. 스크린샷은 이 브라우저에만 저장되니 <b>⬇ 백업</b>으로 팀 공유·이관하세요.</div>`;
  // 비교 초기화
  const shots=shotsOf(p.key);
  if(shots.length>=2){
    const setCol=(which,id)=>{const it=shots.find(s=>s.id===id)||shots[which==="A"?1:0];const w=$(`.imgwrap[data-col="${which}"]`);if(w)w.innerHTML=`<img src="${it.img}" alt="">`;};
    const selA=$('select[data-cmp="A"]'),selB=$('select[data-cmp="B"]');
    selA.selectedIndex=1;selB.selectedIndex=0; // A=이전주, B=최신
    setCol("A",selA.value);setCol("B",selB.value);
    const meta=$("#diffMeta"),wrap=$("#diffWrap"),btn=$("#diffGo"),sens=$("#diffSens");
    const clearDiff=()=>{if(wrap)wrap.innerHTML="";if(meta)meta.textContent="두 주차를 고른 뒤 변화 감지를 누르세요.";};
    async function doDiff(){
      const a=shots.find(s=>s.id===selA.value),b=shots.find(s=>s.id===selB.value);
      if(!a||!b)return;
      if(a.id===b.id){meta.textContent="같은 주차입니다 — 서로 다른 두 주차를 선택하세요.";wrap.innerHTML="";return;}
      btn.disabled=true;btn.textContent="분석 중…";
      try{
        const th=(31-(+sens.value))/100;                       // 민감도↑ → 임계값↓ → 더 예민
        const r=await diffImages(a.img,b.img,th);
        const lenNote=Math.abs(r.hA-r.hB)>r.H*0.06?` · ⚠ 길이 변화(이전 ${r.hA}→최신 ${r.hB}px)`:"";
        const lvl=r.pct>=25?"큰 변화":r.pct>=8?"뚜렷한 변화":r.pct>=2?"소폭 변화":"거의 동일";
        meta.innerHTML=`변화율 <b>${r.pct.toFixed(1)}%</b> · ${lvl} <span style="color:var(--muted)">(${esc(a.date)}→${esc(b.date)})</span>${lenNote}`;
        wrap.innerHTML=`<img src="${r.url}" alt="전/후 변화 감지 결과">`;
      }catch(e){meta.textContent="변화 감지 실패: "+e.message;wrap.innerHTML="";}
      btn.disabled=false;btn.textContent="🔍 전/후 변화 감지";
    }
    selA.addEventListener("change",()=>{setCol("A",selA.value);clearDiff();});
    selB.addEventListener("change",()=>{setCol("B",selB.value);clearDiff();});
    if(btn)btn.addEventListener("click",doDiff);
    if(sens)sens.addEventListener("change",()=>{if(wrap&&wrap.innerHTML)doDiff();});
  }
}
function renderOverview(){
  $("#pt").textContent="전체 개요"; $("#pts").textContent="· 대표키워드 SERP 아카이브";
  const totalShots=PRODUCTS.reduce((s,p)=>s+shotsOf(p.key).length,0);
  const withArc=PRODUCTS.filter(p=>shotsOf(p.key).length).length;
  const thisWeek=PRODUCTS.filter(p=>shotsOf(p.key).some(s=>s.date===todayStr())).length;
  const gaps=["hrmf","golf","overseas"].length; // 한화 상위 미노출 주요 갭(메인)
  const kpi=(n,l)=>`<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`;
  const cards=PRODUCTS.map(p=>{const n=SERPINTEL[p.key];const sc=shotsOf(p.key).length;const s=n?(n.ours.length>92?n.ours.slice(0,92)+"…":n.ours):"";
    return `<div class="ov-card" data-key="${p.key}"><div class="ct">${esc(p.name)}<span class="wk">${sc?sc+"주차":"캡처 0"}</span></div><div class="cs"><b style="color:var(--brand-600)">키워드</b> ${esc(p.kw)} · PC<br>${esc(s)}</div></div>`;}).join("");
  $("#content").innerHTML=`
    <div class="kpi-row">${kpi(withArc+"/"+PRODUCTS.length,"아카이브 시작 상품")}${kpi(totalShots,"누적 스크린샷")}${kpi(thisWeek,"이번주 캡처")}${kpi(gaps,"한화 상위노출 갭(메인)")}</div>
    <div class="note" style="margin-top:0"><b>운영 개요</b> · 각 상품 <b>대표키워드(PC)</b> 네이버 검색결과를 매주 캡처·아카이빙하고, 경쟁사 <b>소구포인트</b>와 <b>변화</b>를 분석합니다. 메인 상품군(운전자·주택화재·골프) 중 <b>주택화재·골프·해외여행</b>은 한화 상품이 상위 미노출로 확인돼 우선 대응 대상입니다. 카드를 클릭해 상세로 이동하세요.</div>
    <div class="sec-lbl">상품별 대표키워드 · 경쟁 요약</div>
    <div class="ov-grid">${cards}</div>`;
}
function render(){const s=safeKey(curKey);(curKey==="__all"||!s)?renderOverview():renderProduct();renderSidebar();window.scrollTo({top:0});}

/* 이벤트 */
document.addEventListener("click",e=>{
  const del=e.target.closest("[data-del]");if(del){delShot(curKey,del.dataset.del);return;}
  const zoom=e.target.closest("[data-zoom]");if(zoom){const it=shotsOf(curKey).find(s=>s.id===zoom.dataset.zoom);if(it){$("#lbImg").src=it.img;$("#lbCap").textContent=getP(curKey).name+" · "+getP(curKey).kw+" · "+it.date;$("#lb").classList.add("show");}return;}
  const drop=e.target.closest("#drop");if(drop){$("#shotFile").click();return;}
  const nav=e.target.closest("[data-key]");if(nav&&nav.dataset.key){curKey=nav.dataset.key;render();return;}
  if(e.target.closest("#lb")){$("#lb").classList.remove("show");}
});
document.addEventListener("change",e=>{if(e.target.id==="shotFile"){[...e.target.files].forEach(f=>addShot(curKey,f));e.target.value="";}});
document.addEventListener("input",e=>{const n=e.target.closest("[data-note]");if(n)editNote(curKey,n.dataset.note,n.value);});
// drag-drop
document.addEventListener("dragover",e=>{if(e.target.closest("#drop")){e.preventDefault();e.target.closest("#drop").classList.add("hot");}});
document.addEventListener("dragleave",e=>{const d=e.target.closest("#drop");if(d)d.classList.remove("hot");});
document.addEventListener("drop",e=>{const d=e.target.closest("#drop");if(d){e.preventDefault();d.classList.remove("hot");[...(e.dataTransfer.files||[])].filter(f=>/^image\//.test(f.type)).forEach(f=>addShot(curKey,f));}});
// 백업/복원
$("#expBtn").addEventListener("click",()=>{const blob=new Blob([JSON.stringify({app:"modooflow-serp",exportedAt:new Date().toISOString(),archive:ARC},null,2)],{type:"application/json"});
  const a=document.createElement("a");a.href=URL.createObjectURL(blob);a.download="modooflow-serp-archive-"+todayStr()+".json";a.click();toast("아카이브 백업 파일 저장됨");});
$("#impFile").addEventListener("change",e=>{const f=e.target.files[0];if(!f)return;const rd=new FileReader();
  rd.onload=()=>{try{const o=JSON.parse(rd.result);const inc=o.archive||o;let n=0;
    Object.keys(inc).forEach(k=>{const s=safeKey(k);if(!s||!Array.isArray(inc[k]))return;ARC[s]=ARC[s]||[];const have=new Set(ARC[s].map(x=>x.id));inc[k].forEach(it=>{if(it&&it.img&&!have.has(it.id)){ARC[s].push(it);n++;}});});
    saveArc(ARC);toast(n+"개 스크린샷 복원됨");render();}catch(err){toast("복원 실패 — 백업 JSON 파일인지 확인");}};
  rd.readAsText(f);e.target.value="";});
$("#themeBtn").addEventListener("click",()=>{const c=document.documentElement.getAttribute("data-theme");const d=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",d?"light":"dark");});
render();
</script>
