<title>Modooflow 약관 · 쉬운 용어 변환</title>
<style>
@font-face{font-family:'Pretendard Variable';font-weight:45 920;font-style:normal;font-display:swap;src:url('fonts/PretendardVariable.woff2') format('woff2-variations');}
:root{
  --brand:#1f9d6b; --brand-600:#177a53; --brand-50:#e4f6ee;
  --grad:linear-gradient(135deg,#1f9d6b 0%,#46c78e 100%);
  --ink:#0f1729; --ink-2:#4a5163; --muted:#8b93a3; --faint:#cdd2db;
  --bg:#f7f8fa; --surface:#ffffff; --surface-2:#f4f6f8; --line:#e8ebef; --line-2:#eef1f4;
  --good:#1f9d6b; --good-bg:#e4f6ee; --mid:#c47f12; --mid-bg:#fbf1de; --bad:#d64545; --bad-bg:#fbe7e4;
  --r:14px; --r-sm:10px; --sh:0 1px 2px rgba(15,23,41,.04),0 2px 6px rgba(15,23,41,.05); --sh-lg:0 12px 30px rgba(15,23,41,.10);
  --mono:ui-monospace,"SF Mono",Menlo,monospace;
  --sans:'Pretendard Variable','Pretendard','Noto Sans KR','Apple SD Gothic Neo',system-ui,-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){:root{--ink:#eef1f6;--ink-2:#b7bdc9;--muted:#7f8697;--faint:#4a4f60;--bg:#0e1016;--surface:#171a21;--surface-2:#1d212a;--line:#262b35;--line-2:#20242d;--brand-50:#122c20;--good-bg:#122c20;--mid-bg:#2e2410;--bad-bg:#331817;--sh:0 1px 2px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.5);--sh-lg:0 14px 34px rgba(0,0,0,.6);}}
:root[data-theme="dark"]{--ink:#eef1f6;--ink-2:#b7bdc9;--muted:#7f8697;--faint:#4a4f60;--bg:#0e1016;--surface:#171a21;--surface-2:#1d212a;--line:#262b35;--line-2:#20242d;--brand-50:#122c20;--good-bg:#122c20;--mid-bg:#2e2410;--bad-bg:#331817;--sh:0 1px 2px rgba(0,0,0,.4),0 2px 6px rgba(0,0,0,.5);--sh-lg:0 14px 34px rgba(0,0,0,.6);}
:root[data-theme="light"]{--ink:#0f1729;--ink-2:#4a5163;--muted:#8b93a3;--faint:#cdd2db;--bg:#f7f8fa;--surface:#ffffff;--surface-2:#f4f6f8;--line:#e8ebef;--line-2:#eef1f4;--brand-50:#e4f6ee;--good-bg:#e4f6ee;--mid-bg:#fbf1de;--bad-bg:#fbe7e4;--sh:0 1px 2px rgba(15,23,41,.04),0 2px 6px rgba(15,23,41,.05);--sh-lg:0 12px 30px rgba(15,23,41,.10);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.011em;word-break:keep-all;}
.app{display:grid;grid-template-columns:230px 1fr;min-height:100vh;}
@media(max-width:820px){.app{grid-template-columns:1fr;}.sidebar{position:static!important;height:auto!important;}}
.sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-brand{display:flex;align-items:center;gap:10px;padding:16px 16px 14px;border-bottom:1px solid var(--line);}
.brand-logo{width:34px;height:34px;border-radius:9px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;box-shadow:0 4px 12px rgba(31,157,107,.35);flex:0 0 auto;}
.bn{font-size:14px;font-weight:800;letter-spacing:-.02em;} .sb-brand small{display:block;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:1px;}
.sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink-2);cursor:pointer;text-align:left;width:100%;transition:.14s;}
.sb-item:hover{background:var(--surface-2);color:var(--ink);} .sb-item.on{background:var(--brand-50);color:var(--brand-600);}
.sb-item .kc{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;} .sb-item.on .kc{color:var(--brand-600);}
.sb-foot{padding:12px 14px;border-top:1px solid var(--line);font-size:9.5px;color:var(--muted);line-height:1.6;}
.sb-foot a{color:var(--brand-600);text-decoration:none;font-weight:700;}
.main{min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--line);}
.topbar #pt{font-size:16px;font-weight:800;letter-spacing:-.02em;} .topbar #pts{font-size:11.5px;color:var(--muted);margin-left:2px;}
.tr{margin-left:auto;display:flex;align-items:center;gap:8px;}
.search{display:flex;align-items:center;gap:7px;background:var(--surface-2);border:1px solid var(--line);border-radius:9px;padding:7px 11px;}
.search input{border:none;background:none;font-family:inherit;font-size:12.5px;color:var(--ink);outline:none;width:180px;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.content{padding:22px 24px 60px;max-width:1080px;}
.kpi-row{display:grid;grid-template-columns:repeat(3,1fr);gap:13px;margin-bottom:18px;}
@media(max-width:820px){.kpi-row{grid-template-columns:1fr 1fr;}}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);}
.kpi .n{font-family:var(--mono);font-size:23px;font-weight:800;letter-spacing:-.03em;line-height:1;}
.kpi .l{font-size:11px;color:var(--muted);font-weight:700;margin-top:6px;}
.sec-lbl{font-size:11px;font-weight:800;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 11px;}
.term{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:16px 18px;box-shadow:var(--sh);margin-bottom:12px;}
.term-h{display:flex;align-items:center;gap:9px;flex-wrap:wrap;}
.term-h .tm{font-size:15.5px;font-weight:800;letter-spacing:-.02em;}
.term-h .cat{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--brand-50);color:var(--brand-600);}
.term-h .grade{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;margin-left:auto;}
.g-hard{background:var(--bad-bg);color:var(--bad);} .g-mid{background:var(--mid-bg);color:var(--mid);} .g-easy{background:var(--good-bg);color:var(--good);}
.term-row{display:grid;grid-template-columns:78px 1fr;gap:10px;margin-top:11px;align-items:start;}
.term-row .k{font-size:11px;font-weight:700;color:var(--muted);padding-top:2px;}
.term-row .v{font-size:13px;line-height:1.6;color:var(--ink-2);}
.term-plain{background:var(--brand-50);border:1px solid color-mix(in srgb,var(--brand) 22%,var(--line));border-radius:10px;padding:11px 13px;margin-top:11px;position:relative;}
.term-plain .lb{font-size:10px;font-weight:800;color:var(--brand-600);letter-spacing:.3px;}
.term-plain .txt{font-size:14px;font-weight:700;color:var(--ink);line-height:1.6;margin-top:4px;padding-right:64px;}
.copy{position:absolute;top:10px;right:10px;font-size:10.5px;font-weight:700;border:1px solid var(--line);background:var(--surface);color:var(--brand-600);border-radius:7px;padding:4px 9px;cursor:pointer;}
.copy:hover{background:var(--brand);color:#fff;border-color:var(--brand);}
.term-tip{font-size:11.5px;color:var(--ink-2);line-height:1.6;margin-top:9px;padding-left:20px;position:relative;}
.term-tip::before{content:"💡";position:absolute;left:0;top:0;}
.note{font-size:11.5px;color:var(--ink-2);line-height:1.7;margin-top:20px;padding:13px 15px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);}
.note b{color:var(--ink);font-weight:800;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%);background:var(--ink);color:var(--surface);font-size:12.5px;font-weight:700;padding:11px 18px;border-radius:10px;box-shadow:var(--sh-lg);opacity:0;transition:.25s;pointer-events:none;z-index:50;}
.toast.show{opacity:1;}
.empty{text-align:center;color:var(--muted);font-size:13px;padding:50px 20px;}
</style>
</head>
<body>
<div class="app">
  <aside class="sidebar">
    <div class="sb-brand"><span class="brand-logo">가</span><span><span class="bn">Modooflow 약관</span><small>쉬운 용어 변환</small></span></div>
    <nav class="sb-nav" id="sbNav"></nav>
    <div class="sb-foot"><a href="index.html">← 통합 콘솔(main)로</a><br>표준약관 용어를 소비자 표현으로 · 가입화면·카피 작성용</div>
  </aside>
  <main class="main">
    <div class="topbar">
      <div><span id="pt">전체 용어</span> <span id="pts"></span></div>
      <div class="tr">
        <div class="search">🔎 <input id="q" placeholder="용어·뜻 검색" autocomplete="off"></div>
        <button class="icon-btn" id="themeBtn" title="테마 전환">◐</button>
      </div>
    </div>
    <div class="content" id="content"></div>
  </main>
</div>

<script>
"use strict";
const $=(s,el=document)=>el.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1500);}

/* 보험 표준약관 용어 → 소비자 쉬운 표현 (샘플·공개 표준약관 기반 · 실제 배포 카피는 광고심의 검수 전제) */
/* grade: hard(매우 어려움)·mid(어려움)·easy(비교적 쉬움) · plain=가입화면/카피 권장 표현 */
const TERMS=[
 // 가입·계약
 {t:"고지의무",cat:"가입·계약",grade:"hard",official:"계약자·피보험자가 청약 시 병력 등 계약상 중요한 사항을 사실대로 알려야 하는 의무.",plain:"가입할 때 아픈 곳·병력을 사실대로 알려주세요 (안 알리면 나중에 보장을 못 받을 수 있어요).",tip:"간편심사 상품은 ‘3가지만 답하면 끝’처럼 고지 부담이 적음을 전면화."},
 {t:"청약철회",cat:"가입·계약",grade:"mid",official:"청약 후 일정 기간(통상 15일) 내에 계약을 철회할 수 있는 권리.",plain:"가입하고 마음이 바뀌면 15일 안에 무료로 취소할 수 있어요.",tip:"‘부담 없이 15일 안에 취소 가능’ 안심 소구로 전환 저항 완화."},
 {t:"청약/승낙",cat:"가입·계약",grade:"mid",official:"청약=가입 신청, 승낙=보험사가 이를 받아들이는 것.",plain:"청약=가입 신청하기 / 승낙=보험사가 가입을 승인하기.",tip:"화면엔 ‘가입 신청’·‘가입 완료’로 표기."},
 {t:"계약 실효/부활",cat:"가입·계약",grade:"hard",official:"실효=보험료 미납 등으로 계약 효력이 정지됨. 부활=실효된 계약을 요건 충족 시 다시 살리는 것.",plain:"실효=보험료를 안 내서 보장이 멈춘 상태 / 부활=멈춘 보험을 다시 살리기.",tip:"‘보장 공백 없이 다시 살리기’ 안내로 이탈 고객 회복."},
 // 보장·담보
 {t:"담보",cat:"보장·담보",grade:"mid",official:"보험이 보장하는 위험·항목.",plain:"보장 항목 — 무엇을 보상해 주는지.",tip:"화면 용어는 ‘담보’보다 ‘보장’으로 통일하면 이해도↑."},
 {t:"특약",cat:"보장·담보",grade:"mid",official:"주계약에 부가하여 가입하는 선택 보장.",plain:"기본 보장에 추가로 붙이는 선택 보장.",tip:"‘꼭 필요한 특약만 골라 담기’ 큐레이션으로 선택 피로 완화."},
 {t:"면책(면책사유)",cat:"보장·담보",grade:"hard",official:"보험사가 보험금을 지급하지 않는 경우.",plain:"보험금을 못 받는 경우 (예외 상황).",tip:"‘이럴 땐 보장이 안 돼요’를 미리 명확히 = 신뢰·민원↓."},
 {t:"면책기간/감액기간",cat:"보장·담보",grade:"hard",official:"면책기간=가입 후 일정 기간 보장하지 않는 기간. 감액기간=초기 일부만 지급하는 기간.",plain:"가입하고 일정 기간은 보장이 안 되거나(면책), 절반만 주는(감액) 기간이 있어요.",tip:"‘가입 즉시 100% 보장’ 상품이면 차별점으로 강조."},
 {t:"자기부담금",cat:"보장·담보",grade:"mid",official:"보험금 지급 시 가입자가 부담하는 일정 금액.",plain:"보험금 받을 때 내가 일부 부담하는 금액(본인부담).",tip:"실손·자차에서 필수 안내. ‘본인부담’으로 풀어쓰기."},
 {t:"보장개시일(책임개시일)",cat:"보장·담보",grade:"mid",official:"보험사의 보장 책임이 시작되는 날.",plain:"보장이 실제로 시작되는 날.",tip:"‘내일 행사도 오늘 가입’처럼 즉시 개시가 강점이면 전면화."},
 {t:"갱신형/비갱신형",cat:"보장·담보",grade:"mid",official:"갱신형=일정 주기로 보험료가 다시 산정됨. 비갱신형=만기까지 보험료 고정.",plain:"갱신형=주기마다 보험료가 오를 수 있음 / 비갱신형=만기까지 그대로.",tip:"장기 상품은 비갱신 고정 매력을 표로 비교."},
 {t:"보험가입금액",cat:"보장·담보",grade:"easy",official:"보장의 최대 한도 금액.",plain:"최대로 받을 수 있는 보장 금액.",tip:"‘최대 OO만원 보장’으로 직관 표기."},
 // 보상·지급
 {t:"실손보상/비례보상",cat:"보상·지급",grade:"hard",official:"실손=실제 발생한 손해만큼 보상. 비례보상=여러 계약 시 손해를 나눠 보상(중복해도 초과 지급 없음).",plain:"실제 손해 본 만큼만 보상해요. 여러 개 들어도 손해액을 나눠 줄 뿐 두 배로 주지 않아요.",tip:"실손형 중복가입 방지 안내 = 불완전판매·민원 예방."},
 {t:"정액보상/중복보장",cat:"보상·지급",grade:"mid",official:"정액=손해액과 무관하게 약정 금액 지급. 정액담보는 여러 계약 시 각각 지급(중복보장).",plain:"정해진 금액을 그대로 줘요. 정액형은 여러 개 들면 각각 다 받을 수 있어요.",tip:"진단비 등 정액담보의 ‘중복 수령 가능’은 가입 유인으로."},
 {t:"대위(청구권 대위)",cat:"보상·지급",grade:"hard",official:"보험사가 보험금 지급 후 손해 원인자(가해자)에게 그 권리를 넘겨받아 청구하는 것.",plain:"보험사가 먼저 물어준 뒤 가해자에게 대신 돌려받는 것 (가입자는 신경 쓸 필요 없어요).",tip:"‘복잡한 구상은 보험사가 알아서’ 편의 소구."},
 {t:"보험료 vs 보험금",cat:"보상·지급",grade:"easy",official:"보험료=계약자가 내는 돈. 보험금=사고 시 지급받는 돈.",plain:"보험료=매달 내는 돈 / 보험금=사고 때 받는 돈.",tip:"초보 고객 혼동 1순위 — 화면에 한 줄 정의 병기."},
 // 대상·주체
 {t:"피보험자",cat:"대상·주체",grade:"mid",official:"보험의 대상이 되는 사람 또는 물건.",plain:"보험이 지켜주는 대상 (그 사람·집·차).",tip:"운전자보험은 ‘운전하는 그 사람’으로 구체화."},
 {t:"계약자/수익자",cat:"대상·주체",grade:"mid",official:"계약자=계약을 맺고 보험료를 내는 사람. 수익자=보험금을 받는 사람.",plain:"계약자=가입하고 보험료 내는 사람 / 수익자=보험금 받는 사람.",tip:"태아·자녀보험에서 관계 설정 안내 필수."},
 {t:"보험가액",cat:"대상·주체",grade:"hard",official:"손해보험에서 피보험 목적물의 평가액(실제 가치).",plain:"보장 대상의 실제 값어치 (예: 집·차의 가격).",tip:"화재보험 가입금액 설정 시 ‘실제 집값 기준’으로 안내."},
 // 자동차·운전자
 {t:"교통사고처리지원금(형사합의금)",cat:"자동차·운전자",grade:"hard",official:"자동차 사고로 인한 형사합의금 등을 보장하는 담보.",plain:"교통사고 후 합의금·형사 부담을 도와주는 보장.",tip:"운전자보험 핵심 담보 — ‘합의금 걱정 덜기’로 소구."},
 {t:"자기차량손해(자차)",cat:"자동차·운전자",grade:"mid",official:"본인 차량의 손해를 보상하는 담보(자기부담금 적용).",plain:"내 차가 망가졌을 때 수리비를 보상 (일부는 본인부담).",tip:"자차 자기부담금 구간을 쉬운 표로 안내."},
 // 주택화재
 {t:"풍수재",cat:"주택화재",grade:"mid",official:"태풍·홍수·폭우 등으로 인한 재해.",plain:"태풍·홍수·폭우로 생긴 피해.",tip:"장마철 ‘누수·침수(풍수재) 보장’ 트리거 카피로."},
 {t:"실화책임",cat:"주택화재",grade:"hard",official:"실수로 낸 화재로 타인에게 입힌 손해에 대한 배상 책임.",plain:"실수로 낸 불로 옆집까지 피해를 준 경우의 배상 책임.",tip:"‘이웃집 피해까지 보장’ 배상책임 담보로 연결."},
 {t:"잔존물제거비용",cat:"주택화재",grade:"hard",official:"사고 후 잔존물(잔해)을 치우는 데 드는 비용 보장.",plain:"불이 난 뒤 잔해·쓰레기를 치우는 비용까지 보장.",tip:"화재 복구 총비용 관점에서 부가 담보로 안내."}
];

let curCat="__all", curQ="";
function cats(){return [...new Set(TERMS.map(t=>t.cat))];}
function gradeLabel(g){return g==="hard"?["g-hard","매우 어려움"]:g==="mid"?["g-mid","어려움"]:["g-easy","쉬운 편"];}

function renderSidebar(){
  const item=(key,label,cnt,on)=>`<button class="sb-item${on?" on":""}" data-cat="${esc(key)}"><span>${esc(label)}</span><span class="kc">${cnt}</span></button>`;
  let h=item("__all","▦ 전체 용어",TERMS.length,curCat==="__all");
  cats().forEach(c=>{const n=TERMS.filter(t=>t.cat===c).length;h+=item(c,c,n,curCat===c);});
  $("#sbNav").innerHTML=h;
}
function match(t){
  if(curCat!=="__all"&&t.cat!==curCat)return false;
  if(!curQ)return true;
  const q=curQ.toLowerCase();
  return (t.t+t.official+t.plain+(t.tip||"")).toLowerCase().indexOf(q)>=0;
}
function termCard(t){
  const [gc,gl]=gradeLabel(t.grade);
  return `<div class="term">
    <div class="term-h"><span class="tm">${esc(t.t)}</span><span class="cat">${esc(t.cat)}</span><span class="grade ${gc}">난이도 · ${gl}</span></div>
    <div class="term-row"><span class="k">표준약관</span><span class="v">${esc(t.official)}</span></div>
    <div class="term-plain"><span class="lb">💬 소비자 쉬운 표현 (가입화면·카피 권장)</span>
      <button class="copy" data-copy="${esc(t.plain)}">복사</button>
      <div class="txt">${esc(t.plain)}</div></div>
    ${t.tip?`<div class="term-tip">${esc(t.tip)}</div>`:""}
  </div>`;
}
function render(){
  renderSidebar();
  const list=TERMS.filter(match);
  $("#pt").textContent=curCat==="__all"?"전체 용어":curCat;
  $("#pts").textContent=`· ${list.length}개`;
  const kpi=(n,l)=>`<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`;
  const hard=TERMS.filter(t=>t.grade==="hard").length;
  const head=curCat==="__all"&&!curQ?`<div class="kpi-row">${kpi(TERMS.length,"등록 용어")}${kpi(cats().length,"분류")}${kpi(hard,"‘매우 어려움’ 최우선 순화")}</div>`:"";
  const body=list.length?`<div class="sec-lbl">약관 원문 → 소비자 표현 · 복사해서 가입화면·카피에 반영</div>${list.map(termCard).join("")}`
    :`<div class="empty">검색 결과가 없습니다.</div>`;
  const note=`<div class="note"><b>사용법</b> · 표준약관의 어려운 용어를 <b>소비자가 이해하는 표현</b>으로 바꿔 가입화면·검색광고·상세 카피에 씁니다. ‘💬 쉬운 표현’을 <b>복사</b>해 바로 반영하세요. · 표현은 <b>배포 전 광고심의 검수</b> 전제(면책·감액 등은 오인 소지 없이 정확히). 데이터는 샘플·공개 표준약관 기준.</div>`;
  $("#content").innerHTML=head+body+note;
}
document.addEventListener("click",e=>{
  const c=e.target.closest("[data-cat]"); if(c){curCat=c.dataset.cat;render();window.scrollTo({top:0});return;}
  const cp=e.target.closest("[data-copy]"); if(cp){const v=cp.dataset.copy;
    (navigator.clipboard?navigator.clipboard.writeText(v):Promise.reject()).then(()=>toast("복사됨 · 가입화면·카피에 붙여넣기")).catch(()=>{
      const ta=document.createElement("textarea");ta.value=v;document.body.appendChild(ta);ta.select();try{document.execCommand("copy");toast("복사됨");}catch(_){toast("복사 실패");}document.body.removeChild(ta);});
    return;}
});
$("#q").addEventListener("input",e=>{curQ=e.target.value.trim();render();});
$("#themeBtn").addEventListener("click",()=>{const c=document.documentElement.getAttribute("data-theme");const d=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",d?"light":"dark");});
render();
</script>
</body>
</html>
