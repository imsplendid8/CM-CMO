name: News Clip

# 카테고리별 뉴스 클리핑 하루 2회(09·13시 KST) → data/clips/ 적립
on:
  schedule:
    - cron: "0 0 * * *"   # 09:00 KST (UTC 00:00)
    - cron: "0 4 * * *"   # 13:00 KST (UTC 04:00)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: news-clip
  cancel-in-progress: false

jobs:
  clip:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Clip news
        env:
          NAVER_CLIENT_ID: ${{ secrets.NAVER_CLIENT_ID }}
          NAVER_CLIENT_SECRET: ${{ secrets.NAVER_CLIENT_SECRET }}
        run: python3 scripts/clip_news.py
      - name: Commit clips
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/clips/
          if git diff --cached --quiet; then echo "변경 없음"; else
            git commit -m "chore(clips): 뉴스 클리핑 $(TZ=Asia/Seoul date '+%F %H:%M')"
            git push
          fi
