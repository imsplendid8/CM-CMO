name: Demand Signals

# 공공데이터(기상특보·공항여객)로 상품별 실시간 수요 신호 → data/signals.json
on:
  schedule:
    - cron: "0 21 * * *"   # 매일 06:00 KST (UTC 21:00)
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: signals
  cancel-in-progress: false

jobs:
  fetch:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch demand signals
        env:
          DATA_GO_KR_KEY: ${{ secrets.DATA_GO_KR_KEY }}
        run: python3 scripts/fetch_signals.py
      - name: Commit signals
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add data/signals.json
          if git diff --cached --quiet; then
            echo "변경 없음"
          else
            git commit -m "chore(signals): 수요 신호 갱신 $(date +%F)"
            git push
          fi
