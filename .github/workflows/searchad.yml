name: Naver SearchAd Volume

# 매주 월 05:00 KST(=일 20:00 UTC) 네이버 검색광고 키워드도구로 실검색량 갱신 → data/volume.json.
# 필요 Secrets(검색/데이터랩 키와 '다름'): NAVER_AD_API_KEY, NAVER_AD_SECRET, NAVER_AD_CUSTOMER
#   발급: searchad.naver.com → 도구 → API 사용 관리. 없으면 source=none(도구에 미반영).
# 수동 실행: Actions → Naver SearchAd Volume → Run workflow

on:
  schedule:
    - cron: "0 20 * * 0"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  volume:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
      - name: Fetch search volume
        env:
          NAVER_AD_API_KEY: ${{ secrets.NAVER_AD_API_KEY }}
          NAVER_AD_SECRET: ${{ secrets.NAVER_AD_SECRET }}
          NAVER_AD_CUSTOMER: ${{ secrets.NAVER_AD_CUSTOMER }}
        run: python3 scripts/naver_searchad_volume.py
      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/volume.json
          git diff --staged --quiet || git commit -m "chore: 검색광고 실검색량 갱신 (data/volume.json)"
          git push
