<script>
"use strict";

const PRODUCTS=[
 {key:"home",cat:"사이트",name:"다이렉트 홈(브랜드)",tier:"대형",core:["한화손보 다이렉트","한화 다이렉트보험","한화손해보험 다이렉트"],special:["자동차보험","운전자보험","장기보험","다이렉트보험"]},

 {key:"driver",cat:"장기",name:"운전자보험",tier:"대형",core:["운전자보험","다이렉트 운전자보험","캐롯 운전자보험"],special:["벌금","변호사선임","형사합의금","교통사고","12대중과실"]},
 {key:"woman",cat:"장기",name:"여성건강보험",tier:"니치",core:["여성건강보험","여성보험","여성 다이렉트보험"],special:["임신","출산","산후조리","여성암","자궁"]},
 {key:"birth",cat:"장기",name:"임신·출산(태아)보험",tier:"니치",core:["태아보험","임신보험","출산보험"],special:["태아","선천이상","미숙아","산모","제왕절개"]},

/* 키워드 생성 (advertools kw_generate 스타일) */
function genKeywords(p){
  const rows=[],seen=new Set();
  const core=p.core[0];
  const rule=(intent,gram)=>{
    const pf = gram>=3 ? "구글" : (intent==="거래"?"네이버":intent==="정보"?"구글":intent==="브랜드"?"네이버":"공통");
    const mt = gram>=3 ? "구문" : (intent==="거래"?"구문":intent==="정보"?"확장":intent==="브랜드"?"일치":"구문");
    return [pf,mt];
  };
  const push=(kw,gram,intent,pfO,mtO)=>{kw=kw.trim().replace(/\s+/g," ");if(!kw||seen.has(kw))return;seen.add(kw);
    let pf,mt; if(pfO){pf=pfO;mt=mtO||"대화형";}else{[pf,mt]=rule(intent,gram);} rows.push({kw,gram,intent,pf,mt});};
  p.core.forEach(c=>push(c,c.split(" ").length,"거래"));           // 시드·동의어
  MODS.forEach(g=>g.words.forEach(w=>{push(`${core} ${w}`,2,g.intent);if(g.front)push(`${w} ${core}`,2,g.intent);}));
  p.special.forEach(s=>{push(`${core} ${s}`,2,"담보");push(`${core} ${s} 보장`,3,"담보");});
  AGES.forEach(a=>["보험료","추천","비교"].forEach(w=>push(`${a} ${core} ${w}`,3,"거래")));
  ["필요할까","어디가 좋을까","얼마","단점","순위"].forEach(w=>push(`${core} ${w}`,2,"정보"));
  // AI 검색(생성형: ChatGPT·Perplexity·네이버 Cue:·AI Overviews) — 대화형 질의(AEO/GEO)
  const sp0=p.special[0]||"", sp1=p.special[1]||sp0;
  const aiq=[
    `${core} 40대인데 추천해줄 수 있어?`,
    `${core} 가입할 때 뭘 확인해야 해?`,
    `${core} 보험료 대략 얼마나 나와?`,
    `${core}에 ${sp0} 보장되는 상품 알려줘`,
    `${core} 갱신형이랑 비갱신형 차이 설명해줘`,
    `${core} 지금 가입하는 게 좋을까?`,
    `${core} 어떤 특약을 넣는 게 좋아?`,
    `${sp1} 때문에 ${core} 필요할까?`,
    `가성비 좋은 ${core} 조건 정리해줘`,
  ];
  aiq.forEach(q=>push(q,q.split(" ").length,"AI","AI","대화형"));
  return rows;
}
const ALL={}; PRODUCTS.forEach(p=>ALL[p.key]=genKeywords(p));
const INTENT_COL={거래:"var(--trx)",정보:"var(--inf)",브랜드:"var(--brd)",담보:"var(--brand)"};

let curKey="__all", pf="all", VOL={};
const nk=s=>String(s).replace(/\s/g,"");
const hasVol=()=>Object.keys(VOL).length>0;
const volOf=kw=>VOL[nk(kw)]||null;
const fmtVol=n=>n>=10000?(n/10000).toFixed(1)+"만":n>=1000?(n/1000).toFixed(1)+"천":String(n);
const filt=rows=>pf==="all"?rows:rows.filter(r=>r.pf===pf||(pf!=="AI"&&r.pf==="공통"));

function renderSidebar(){
  const total=Object.values(ALL).reduce((s,r)=>s+r.length,0);
  const item=(key,label,cnt,on)=>`<button class="sb-item${on?" on":""}" data-key="${key}"><span>${esc(label)}</span><span class="kc">${cnt}</span></button>`;
  let h=item("__all",`▦ 전체 개요`,total,curKey==="__all");
  ["사이트","장기","일반"].forEach(cat=>{
    h+=`<div class="sb-cap">${cat}</div>`;
    PRODUCTS.filter(p=>p.cat===cat).forEach(p=>h+=item(p.key,p.name,ALL[p.key].length,curKey===p.key));
  });
  $("#sbNav").innerHTML=h;
}
function intentCounts(rows){const c={거래:0,정보:0,브랜드:0,담보:0,AI:0};rows.forEach(r=>c[r.intent]++);return c;}
function pfCounts(rows){const c={네이버:0,구글:0,공통:0,AI:0};rows.forEach(r=>c[r.pf]++);return c;}

function renderOverview(){
  $("#pt").textContent="전체 개요"; $("#pts").textContent="· 10개 광고그룹 통합";
  const total=Object.values(ALL).reduce((s,r)=>s+filt(r).length,0);
  const allrows=Object.values(ALL).flatMap(filt);
  const ic=intentCounts(allrows), pc=pfCounts(allrows);
  const kpi=(n,l,s,col)=>`<div class="kpi"><div class="n"${col?` style="color:${col}"`:""}>${n}</div><div class="l">${l}</div>${s?`<div class="s" style="color:${col||"var(--muted)"}">${s}</div>`:""}</div>`;
  const cards=PRODUCTS.map(p=>{
    const rows=filt(ALL[p.key]),ic=intentCounts(rows),tot=rows.length||1;
    const seg=(v,c)=>`<i style="width:${v/tot*100}%;background:${c}"></i>`;
    return `<div class="ov-card" data-key="${p.key}">
      <div class="ct">${esc(p.name)}<span class="tier ${p.tier}">${p.tier}</span></div>
      <div class="cn">${rows.length}<span style="font-size:12px;color:var(--muted);font-weight:600"> 키워드</span></div>
      <div class="cs">시드: ${esc(p.core[0])}</div>
      <div class="bars">${seg(ic.거래,"var(--trx)")}${seg(ic.담보,"var(--brand)")}${seg(ic.정보,"var(--inf)")}${seg(ic.브랜드,"var(--brd)")}${seg(ic.AI,"#0e9e9c")}</div>
    </div>`;
  }).join("");
  $("#content").innerHTML=`
    <div class="kpi-row">
      ${kpi(total,"총 키워드","10개 상품(광고그룹)")}
      ${kpi(pc.네이버+pc.공통,"네이버 우선","거래·브랜드형 중심","var(--nav-ink)")}
      ${kpi(pc.구글+pc.공통,"구글 우선","정보·롱테일 중심","var(--goo-ink)")}
      ${kpi(ic.거래,"거래형 키워드","가입·보험료·비교","var(--trx)")}
    </div>
    <div class="sec-lbl">상품별 키워드 집합 <span style="font-weight:600;color:var(--muted);text-transform:none">· 카드를 클릭하면 상세</span></div>
    <div class="ov-grid">${cards}</div>
    <div class="legend">
      <span><i class="lg" style="background:var(--trx)"></i>거래형</span>
      <span><i class="lg" style="background:var(--brand)"></i>담보형</span>
      <span><i class="lg" style="background:var(--inf)"></i>정보형</span>
      <span><i class="lg" style="background:var(--brd)"></i>브랜드형</span>
      <span><i class="lg" style="background:#0e9e9c"></i>AI검색(대화형)</span>
    </div>
    <div class="note"><b>키워드 생성 방식</b> · 상품 시드 × 수식어(보험료·비교·가입 등) 조합(<a href="https://github.com/eliasdabbas/advertools" target="_blank" rel="noopener">advertools</a> kw_generate 방식) + 담보 키워드 + 연령 롱테일 + 질문형. <b>인텐트</b>(거래/정보/브랜드/담보)로 분류하고 <b>플랫폼</b>(네이버 검색광고 vs 구글 Ads)·<b>매치타입</b>을 추천합니다.<br><b>검색량·경쟁도·입찰가</b>는 <b>네이버 검색광고 키워드도구</b>·<b>구글 Keyword Planner</b>에서 확정하세요(본 도구는 키워드 후보 추출·분류 담당). 실검색 수요 추세는 네이버 데이터랩·구글 트렌드(<a href="https://github.com/GeneralMills/pytrends" target="_blank" rel="noopener">pytrends</a>)로 검증.<br><b>AI 검색어</b> · ChatGPT·Perplexity·네이버 Cue:·구글 AI Overviews 등 <b>생성형 검색</b>용 대화형 질의(AEO/GEO)도 포함 — 상단 <b>플랫폼 필터 'AI검색'</b>으로 확인.</div>`;
}
function renderProduct(){
  const p=PRODUCTS.find(x=>x.key===curKey);const rows=filt(ALL[p.key]);
  $("#pt").textContent=p.name; $("#pts").textContent=`· ${rows.length} 키워드`;
  const ic=intentCounts(rows),pc=pfCounts(rows);
  const kpi=(n,l,col)=>`<div class="kpi"><div class="n"${col?` style="color:${col}"`:""}>${n}</div><div class="l">${l}</div></div>`;
  const vh=hasVol();
  const rows2=vh?rows.slice().sort((a,b)=>{const va=volOf(a.kw),vb=volOf(b.kw);return((vb?vb.pc+vb.mobile:-1)-(va?va.pc+va.mobile:-1));}):rows;
  const trows=rows2.map(r=>{const v=volOf(r.kw);const vol=v?(v.pc||0)+(v.mobile||0):null;
    return `<tr>
    <td class="kw">${esc(r.kw)}</td>
    <td class="c gram">${r.gram}단어</td>
    <td class="c"><span class="pill ${r.intent}">${r.intent}</span></td>
    <td class="c"><span class="pill ${r.pf}">${r.pf}</span></td>
    <td class="c gram">${r.mt}</td>`+(vh?`<td class="c" style="font-family:var(--mono);font-weight:700">${vol!=null?fmtVol(vol):"—"}</td><td class="c gram">${v?esc(v.comp||"—"):"—"}</td>`:"")+`</tr>`;}).join("");
  $("#content").innerHTML=`
    <div class="seedbar"><div class="st"><h2>${esc(p.name)}</h2><span class="tier ${p.tier}">검색수요 ${p.tier}</span>
      <span style="margin-left:auto;font-size:11.5px;color:var(--muted)">광고그룹 = 이 상품</span></div>
      <div class="seeds">${p.core.map(c=>`<span class="seed">${esc(c)}</span>`).join("")}${p.special.map(s=>`<span class="seed" style="background:var(--surface-2);color:var(--ink-2)">+${esc(s)}</span>`).join("")}</div></div>
    <div class="kpi-row">
      ${kpi(rows.length,"총 키워드")}
      ${kpi(ic.거래+ic.담보,"거래·담보형","var(--trx)")}
      ${kpi(pc.네이버+pc.공통,"네이버 우선","var(--nav-ink)")}
      ${kpi(pc.구글+pc.공통,"구글 우선","var(--goo-ink)")}
    </div>
    <div class="sec-lbl">추출 키워드 <span style="font-weight:600;color:var(--muted);text-transform:none">· 인텐트·플랫폼·매치타입 자동 분류</span></div>
    <div class="tbl-wrap"><table><thead><tr><th>키워드</th><th class="c">구성</th><th class="c">인텐트</th><th class="c">추천 플랫폼</th><th class="c">매치타입</th>${vh?'<th class="c">월검색량</th><th class="c">경쟁도</th>':''}</tr></thead><tbody>${trows}</tbody></table></div>
    <div class="note"><b>바로 활용</b> · 우측 상단 <b>CSV 내보내기</b>로 네이버 검색광고/구글 Ads 업로드용 파일을 받으세요(광고그룹=상품, 키워드, 인텐트, 플랫폼, 매치타입). 거래형=구문/일치로 좁게, 정보형=확장으로 넓게 세팅 권장.</div>`;
}
function render(){ curKey==="__all"?renderOverview():renderProduct(); renderSidebar(); window.scrollTo({top:0}); }

function exportCsv(){
  const list = curKey==="__all" ? PRODUCTS : [PRODUCTS.find(p=>p.key===curKey)];
  const vh=hasVol();
  const rows=[["광고그룹","키워드","구성(단어수)","인텐트","추천플랫폼","매치타입"].concat(vh?["월PC검색량","월모바일검색량","경쟁도"]:[])];
  list.forEach(p=>filt(ALL[p.key]).forEach(r=>{const v=volOf(r.kw);rows.push([p.name,r.kw,r.gram,r.intent,r.pf,r.mt].concat(vh?[v?v.pc:"",v?v.mobile:"",v?v.comp||"":""]:[]));}));
  const csv="﻿"+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`검색광고키워드_${curKey==="__all"?"전체":PRODUCTS.find(p=>p.key===curKey).name}.csv`;a.click();
  toast(`CSV 내보내기 (${rows.length-1}개 키워드)`);
}

document.addEventListener("click",e=>{
  const si=e.target.closest(".sb-item,[data-key]"); if(si&&si.dataset.key){curKey=si.dataset.key;render();return;}
  const sg=e.target.closest("#pfSeg button"); if(sg){pf=sg.dataset.pf;document.querySelectorAll("#pfSeg button").forEach(b=>b.classList.toggle("on",b===sg));render();return;}
});
$("#exp").addEventListener("click",exportCsv);
$("#volLoad").addEventListener("click",()=>{try{const o=JSON.parse($("#volJson").value);const src=o.keywords||o;VOL={};Object.keys(src).forEach(k=>{VOL[nk(k)]=src[k];});toast(Object.keys(VOL).length+"개 키워드 검색량 적용");render();}catch(e){toast("JSON 파싱 실패");}});
$("#volSample").addEventListener("click",()=>{$("#volJson").value=JSON.stringify({keywords:{"암보험":{pc:9000,mobile:76000,comp:"높음"},"암보험 비교":{pc:250,mobile:1900,comp:"중간"},"다이렉트 암보험":{pc:400,mobile:3300,comp:"높음"},"40대 암보험 추천":{pc:60,mobile:520,comp:"낮음"}}},null,2);});
$("#themeBtn").addEventListener("click",()=>{const c=document.documentElement.getAttribute("data-theme");const d=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",d?"light":"dark");});
render();
</script>
