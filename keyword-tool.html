<style>

}

  --bg:#0f1420; --surface:#171d2a; --surface-2:#1c2431; --line:#293246; --line-2:#222a3a;
  --nav-bg:#0f2c1c; --goo-bg:#122238; --com-bg:#221838; --trx-bg:#33270f; --inf-bg:#0f2c22; --brd-bg:#331426;
  --sh:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35); --sh-lg:0 12px 40px rgba(0,0,0,.5);
}}

:root[data-theme="light"]{--brand:#2b6cb0;--brand-600:#1e4e8c;--brand-50:#e7f0fa;--brand-tint:#eef5fc;--ink:#1a1f2c;--ink-2:#48506a;--muted:#8b90a3;--faint:#c4c8d4;--bg:#f3f5f8;--surface:#fff;--surface-2:#f8fafc;--line:#e4e8ef;--line-2:#eef1f6;--nav-bg:#e6f8ee;--goo-bg:#e8f0fe;--com-bg:#efe9fe;--trx-bg:#fbf1de;--inf-bg:#e3f5ee;--brd-bg:#fbe9f4;--sh:0 1px 2px rgba(20,28,60,.05),0 6px 20px rgba(20,28,60,.06);--sh-lg:0 12px 40px rgba(20,28,60,.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;word-break:keep-all;}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh;}
@media(max-width:820px){.app{grid-template-columns:1fr;}.sidebar{position:static!important;height:auto!important;}}
.sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-brand{display:flex;align-items:center;gap:10px;padding:16px 16px 14px;border-bottom:1px solid var(--line);}
.brand-logo{width:34px;height:34px;border-radius:9px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:14px;font-weight:800;box-shadow:0 6px 16px rgba(43,108,176,.4);flex:0 0 auto;}
.bn{font-size:14px;font-weight:800;letter-spacing:-.02em;} .sb-brand small{display:block;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:1px;}
.sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;}
.sb-cap{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:13px 8px 5px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink-2);cursor:pointer;text-align:left;width:100%;transition:.14s;}
.sb-item:hover{background:var(--surface-2);color:var(--ink);} .sb-item.on{background:var(--brand-50);color:var(--brand-600);}
.sb-item .kc{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;} .sb-item.on .kc{color:var(--brand-600);}
.sb-foot{padding:12px 14px;border-top:1px solid var(--line);font-size:9.5px;color:var(--muted);line-height:1.6;}
.sb-foot a{color:var(--brand-600);text-decoration:none;font-weight:700;}
.main{min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--line);}
.topbar #pt{font-size:16px;font-weight:800;letter-spacing:-.02em;} .topbar #pts{font-size:11.5px;color:var(--muted);margin-left:2px;}
.tr{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.seg{display:inline-flex;background:var(--line-2);border:1px solid var(--line);border-radius:9px;padding:3px;gap:2px;}
.seg button{border:none;background:none;font-family:inherit;font-size:11.5px;font-weight:700;color:var(--muted);padding:6px 11px;border-radius:7px;cursor:pointer;}
.seg button.on{background:var(--surface);color:var(--brand-600);box-shadow:var(--sh);}
.btn{padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.btn:hover{border-color:var(--brand);color:var(--brand-600);} .btn.primary{background:var(--grad);color:#fff;border:none;box-shadow:0 4px 12px rgba(43,108,176,.28);}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.content{padding:22px 24px 60px;max-width:1160px;}
.imp{margin:16px 24px 0;background:var(--surface);border:1px dashed var(--brand);border-radius:var(--r-sm);box-shadow:var(--sh);}
.imp summary{cursor:pointer;font-size:12px;font-weight:800;color:var(--brand-600);padding:11px 15px;list-style:none;}
.imp summary::-webkit-details-marker{display:none;} .imp summary::before{content:"▸ ";} .imp[open] summary::before{content:"▾ ";}
.imp .ib{padding:0 15px 13px;}
.imp textarea{width:100%;min-height:66px;font-family:var(--mono);font-size:11px;background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;color:var(--ink);resize:vertical;}
.imp .ir{display:flex;gap:9px;align-items:center;margin-top:9px;flex-wrap:wrap;} .imp .hint{font-size:11px;color:var(--muted);}
.pform{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.pform input,.pform select{font-family:inherit;font-size:12.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;width:100%;}
.pform input:focus,.pform select:focus{outline:none;border-color:var(--brand);background:var(--surface);box-shadow:0 0 0 3px var(--brand-50);}
.pfrow{display:flex;gap:9px;align-items:center;flex-wrap:wrap;} .pfrow select{max-width:120px;} .pfrow .hint{font-size:11px;color:var(--muted);}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:16px;}
@media(max-width:820px){.kpi-row{grid-template-columns:1fr 1fr;}}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);}
.kpi .n{font-family:var(--mono);font-size:24px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1;}
.kpi .l{font-size:11px;color:var(--muted);font-weight:700;margin-top:6px;} .kpi .s{font-size:11px;margin-top:3px;font-weight:700;}
.seedbar{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 18px;margin-bottom:16px;box-shadow:var(--sh);}
.seedbar .st{display:flex;align-items:center;gap:10px;flex-wrap:wrap;margin-bottom:9px;}
.seedbar h2{font-size:16px;font-weight:800;} .tier{font-size:10px;font-weight:800;padding:2px 8px;border-radius:6px;}
.tier.대형{background:var(--trx-bg);color:var(--trx);} .tier.중형{background:var(--inf-bg);color:var(--inf-ink,var(--inf));} .tier.니치{background:var(--line-2);color:var(--ink-2);}
.seeds{display:flex;flex-wrap:wrap;gap:6px;}
.seed{font-family:var(--mono);font-size:11.5px;font-weight:700;background:var(--brand-50);color:var(--brand-600);padding:4px 10px;border-radius:7px;}
.sec-lbl{font-size:11px;font-weight:800;letter-spacing:.05em;text-transform:uppercase;color:var(--muted);margin:16px 2px 9px;display:flex;align-items:center;gap:8px;}
.pill{font-size:10px;font-weight:800;padding:2px 8px;border-radius:999px;}
.pill.네이버{background:var(--nav-bg);color:var(--nav-ink);} .pill.구글{background:var(--goo-bg);color:var(--goo-ink);} .pill.공통{background:var(--com-bg);color:var(--com-ink);}
.pill.거래{background:var(--trx-bg);color:var(--trx);} .pill.정보{background:var(--inf-bg);color:var(--inf);} .pill.브랜드{background:var(--brd-bg);color:var(--brd);} .pill.담보{background:var(--brand-50);color:var(--brand-600);}
.pill.AI{background:rgba(14,158,156,.16);color:#0b7370;}
.src{font-size:9.5px;font-weight:800;padding:1px 6px;border-radius:5px;} .src.도구{background:var(--line-2);color:var(--ink-2);} .src.네이버{background:var(--nav-bg);color:var(--nav-ink);} .src.검색광고{background:var(--goo-bg);color:var(--goo-ink);}
@media(prefers-color-scheme:dark){.pill.AI{color:#5fe0dc;}}
:root[data-theme="dark"] .pill.AI{color:#5fe0dc;} :root[data-theme="light"] .pill.AI{color:#0b7370;}
.tbl-wrap{overflow-x:auto;border:1px solid var(--line);border-radius:var(--r-sm);background:var(--surface);box-shadow:var(--sh);}
table{border-collapse:collapse;width:100%;font-size:12.5px;min-width:640px;}
th,td{padding:9px 13px;text-align:left;border-bottom:1px solid var(--line-2);white-space:nowrap;}
th{font-size:10px;font-weight:800;color:var(--muted);letter-spacing:.04em;text-transform:uppercase;background:var(--surface-2);position:sticky;top:0;}
tbody tr:last-child td{border-bottom:none;} tbody tr:hover{background:var(--surface-2);}
td.kw{font-weight:700;color:var(--ink);white-space:normal;} td.c{text-align:center;}
.gram{font-family:var(--mono);font-size:10.5px;color:var(--muted);}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(230px,1fr));gap:13px;}
.ov-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);cursor:pointer;transition:.15s;}
.ov-card:hover{border-color:var(--brand);box-shadow:var(--sh-lg);transform:translateY(-1px);}
.ov-card .ct{font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:7px;justify-content:space-between;}
.ov-card .cn{font-family:var(--mono);font-size:20px;font-weight:800;margin:8px 0 2px;} .ov-card .cs{font-size:11px;color:var(--muted);}
.bars{display:flex;height:7px;border-radius:99px;overflow:hidden;margin-top:9px;background:var(--line-2);}
.bars i{height:100%;display:block;}
.legend{display:flex;flex-wrap:wrap;gap:8px 14px;font-size:11px;color:var(--ink-2);margin-top:10px;}
.legend span{display:inline-flex;align-items:center;gap:5px;} .lg{width:9px;height:9px;border-radius:2px;}
.note{font-size:11.5px;color:var(--ink-2);line-height:1.7;margin-top:18px;padding:13px 15px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);}
.note b{font-weight:800;} .note a{color:var(--brand-600);font-weight:700;text-decoration:none;} .note a:hover{text-decoration:underline;}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:var(--sh-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
<style id="mf-saas-theme">

function genKeywords(p){
  const rows=[],seen=new Set();
  const core=p.core[0];
  const rule=(intent,gram)=>{
    const pf = gram>=3 ? "구글" : (intent==="거래"?"네이버":intent==="정보"?"구글":intent==="브랜드"?"네이버":"공통");
    const mt = gram>=3 ? "구문" : (intent==="거래"?"구문":intent==="정보"?"확장":intent==="브랜드"?"일치":"구문");
    return [pf,mt];
  };
  const push=(kw,gram,intent,pfO,mtO)=>{kw=kw.trim().replace(/\s+/g," ");if(!kw||seen.has(kw))return;seen.add(kw);
    let pf,mt; if(pfO){pf=pfO;mt=mtO||"대화형";}else{[pf,mt]=rule(intent,gram);} rows.push({kw,gram,intent,pf,mt});};
  p.core.forEach(c=>push(c,c.split(" ").length,"거래"));           // 시드·동의어
  MODS.forEach(g=>g.words.forEach(w=>{push(`${core} ${w}`,2,g.intent);if(g.front)push(`${w} ${core}`,2,g.intent);}));
  p.special.forEach(s=>{push(`${core} ${s}`,2,"담보");push(`${core} ${s} 보장`,3,"담보");});
  AGES.forEach(a=>["보험료","추천","비교"].forEach(w=>push(`${a} ${core} ${w}`,3,"거래")));
  ["필요할까","어디가 좋을까","얼마","단점","순위"].forEach(w=>push(`${core} ${w}`,2,"정보"));
  // AI 검색(생성형: ChatGPT·Perplexity·네이버 Cue:·AI Overviews) — 대화형 질의(AEO/GEO)
  const sp0=p.special[0]||"", sp1=p.special[1]||sp0;
  const aiq=[
    `${core} 40대인데 추천해줄 수 있어?`,
    `${core} 가입할 때 뭘 확인해야 해?`,
    `${core} 보험료 대략 얼마나 나와?`,
    `${core}에 ${sp0} 보장되는 상품 알려줘`,
    `${core} 갱신형이랑 비갱신형 차이 설명해줘`,
    `${core} 지금 가입하는 게 좋을까?`,
    `${core} 어떤 특약을 넣는 게 좋아?`,
    `${sp1} 때문에 ${core} 필요할까?`,
    `가성비 좋은 ${core} 조건 정리해줘`,
  ];
  aiq.forEach(q=>push(q,q.split(" ").length,"AI","AI","대화형"));
  return rows;
}

function classifyImported(kw){
  let intent="정보";
  if(/보험료|비교|다이렉트|가입|견적|계산기|얼마|추천|순위|저렴|할인|가격/.test(kw))intent="거래";
  else if(/한화|캐롯|삼성화재|현대해상|db손해|메리츠|kb손해|흥국|롯데/i.test(kw))intent="브랜드";
  const gram=kw.trim().split(/\s+/).length;
  const pf=gram>=3?"구글":(intent==="거래"?"네이버":intent==="브랜드"?"네이버":"공통");
  const mt=intent==="거래"?"구문":intent==="브랜드"?"일치":"확장";
  return {intent,pf,mt,gram};
}
function importMap(map,target){
  if(!target||target==="__all"){toast("왼쪽에서 상품(또는 범용 키워드 생성)을 먼저 선택하세요");return;}
  const existing=new Set(rowsOf(target).map(r=>nk(r.kw)));
  const add=[];
  Object.keys(map).forEach(k=>{const key=nk(k);const v=map[k]||{};
    if(v.pc!=null||v.mobile!=null)VOL[key]={pc:v.pc||0,mobile:v.mobile||0,comp:v.comp||""};   // 검색량 있으면 함께 반영
    if(!k.trim()||existing.has(key))return;existing.add(key);
    const c=classifyImported(k);add.push({kw:k.trim(),gram:c.gram,intent:c.intent,pf:c.pf,mt:c.mt,src:"네이버"});
  });
  IMPORTED[target]=(IMPORTED[target]||[]).concat(add);
  toast(add.length+"개 키워드 추가 · 합계 "+rowsOf(target).length+"개");render();
}

function applyVolumeData(vd){
  if(!vd||vd.source!=="searchad"||!vd.products)return;
  Object.keys(vd.products).forEach(key=>{
    if(!PRODUCTS.some(p=>p.key===key))return;
    const map=(vd.products[key]||{}).keywords||{};
    const existing=new Set(rowsOf(key).map(r=>nk(r.kw)));
    const add=[];
    Object.keys(map).forEach(k=>{const nkey=nk(k);const v=map[k]||{};
      if(v.pc!=null||v.mobile!=null)VOL[nkey]={pc:v.pc||0,mobile:v.mobile||0,comp:v.comp||""};
      if(!k.trim()||existing.has(nkey))return;existing.add(nkey);
      const c=classifyImported(k);add.push({kw:k.trim(),gram:c.gram,intent:c.intent,pf:c.pf,mt:c.mt,src:"검색광고"});
    });
    if(add.length)IMPORTED[key]=(IMPORTED[key]||[]).concat(add);
  });
  render();
}

          <span class="hint">입력값은 브라우저에서만 처리 · 거래·정보·브랜드·담보·AI검색 키워드를 한 번에 생성</span></div>
      </div></div>
    ${PROSEED?productBody(PROSEED)+`<div class="note"><b>바로 활용</b> · CSV 내보내기로 업로드용 파일 저장 · 검색량 불러오기(상단)로 실수요 붙이기.</div>`:`<div class="note">브랜드·대표 키워드를 입력하고 <b>키워드 생성</b>을 누르면 네이버·구글·AI검색 키워드가 한 번에 나옵니다.</div>`}`;
  $("#pgen").addEventListener("click",()=>{

    PROSEED={key:"__pro",name:(brand?brand+" ":"")+name,cat:"도구",tier:$("#ptier").value,core:core.length?core:[name],special:special.length?special:[name],_brand:brand,_name:name};

function render(){ curKey==="__all"?renderOverview():curKey==="__pro"?renderPro():renderProduct(); renderSidebar(); window.scrollTo({top:0}); }

function exportCsv(){
  if(curKey==="__pro"&&!PROSEED){toast("먼저 범용 키워드를 생성하세요");return;}
  const list = curKey==="__all" ? PRODUCTS : [getP(curKey)];
  const vh=hasVol();
  const rows=[["광고그룹","키워드","출처","구성(단어수)","인텐트","추천플랫폼","매치타입"].concat(vh?["월PC검색량","월모바일검색량","경쟁도"]:[])];
  list.forEach(p=>filt(rowsOf(p.key)).forEach(r=>{const v=volOf(r.kw);rows.push([p.name,r.kw,r.src||"도구",r.gram,r.intent,r.pf,r.mt].concat(vh?[v?v.pc:"",v?v.mobile:"",v?v.comp||"":""]:[]));}));
  const csv="﻿"+rows.map(r=>r.map(x=>`"${String(x).replace(/"/g,'""')}"`).join(",")).join("\n");
  const a=document.createElement("a");a.href=URL.createObjectURL(new Blob([csv],{type:"text/csv"}));
  a.download=`검색광고키워드_${curKey==="__all"?"전체":PRODUCTS.find(p=>p.key===curKey).name}.csv`;a.click();
  toast(`CSV 내보내기 (${rows.length-1}개 키워드)`);
}

  const si=e.target.closest(".sb-item,[data-key]"); if(si&&si.dataset.key){curKey=si.dataset.key;render();return;}
  const sg=e.target.closest("#pfSeg button"); if(sg){pf=sg.dataset.pf;document.querySelectorAll("#pfSeg button").forEach(b=>b.classList.toggle("on",b===sg));render();return;}

$("#exp").addEventListener("click",exportCsv);
function decodeEntities(s){return String(s).replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&quot;/g,'"').replace(/&#39;|&apos;/g,"'");}
function colIndex(letters){let n=0;for(let i=0;i<letters.length;i++)n=n*26+(letters.charCodeAt(i)-64);return n-1;}
// 헤더 자동 인식 → {키워드:{pc,mobile,comp}} (연관키워드·월간검색수·경쟁 컬럼)
function rowsToVolMap(R){
  if(!R.length)return {};
  let hi=R.findIndex(r=>{const j=r.join(" ");return /키워드|keyword/i.test(j)&&/(검색수|monthly|searches|volume|경쟁|competition)/i.test(j);});
  if(hi<0)hi=0;
  const H=R[hi].map(s=>String(s||"").toLowerCase());
  const find=(...ks)=>H.findIndex(h=>ks.some(k=>h.includes(k)));
  const iKw=find("연관키워드","키워드","keyword");
  const iPc=find("월간검색수(pc)","pc"),iMo=find("모바일","mobile"),iAvg=find("avg. monthly","monthly searches","평균","검색수"),iComp=find("경쟁","competition");
  const num=x=>{if(x==null)return 0;const n=parseInt(String(x).replace(/[^\d]/g,""));return isNaN(n)?0:n;};
  const out={};
  for(let i=hi+1;i<R.length;i++){const c=R[i]||[];const kw=iKw>=0?c[iKw]:c[0];if(!kw||!String(kw).trim())continue;
    let pc=iPc>=0?num(c[iPc]):0,mo=iMo>=0?num(c[iMo]):0; if(!pc&&!mo&&iAvg>=0)mo=num(c[iAvg]);
    out[String(kw).trim()]={pc,mobile:mo,comp:iComp>=0?String(c[iComp]||""):""};
  }
  return out;
}
function parseVolCsv(text){
  const R=text.split(/\r?\n/).filter(l=>l.trim()).map(l=>l.split(/\t|,/).map(s=>s.replace(/^"|"$/g,"").trim()));
  return rowsToVolMap(R);
}
// ── 엑셀(.xlsx) 파서 — 외부 라이브러리 없이 브라우저 내장 압축해제(DecompressionStream) ──
async function inflateRaw(bytes){
  const st=new Blob([bytes]).stream().pipeThrough(new DecompressionStream("deflate-raw"));
  return new Uint8Array(await new Response(st).arrayBuffer());
}
async function readXlsx(arrayBuffer){
  const u8=new Uint8Array(arrayBuffer),dv=new DataView(arrayBuffer);
  let eo=-1;for(let i=u8.length-22;i>=0;i--){if(dv.getUint32(i,true)===0x06054b50){eo=i;break;}}
  if(eo<0)throw new Error("ZIP EOCD 없음");
  const cdOff=dv.getUint32(eo+16,true),cdCnt=dv.getUint16(eo+10,true),entries={};let p=cdOff;
  for(let n=0;n<cdCnt;n++){if(dv.getUint32(p,true)!==0x02014b50)break;
    const method=dv.getUint16(p+10,true),compSize=dv.getUint32(p+20,true),nameLen=dv.getUint16(p+28,true),extraLen=dv.getUint16(p+30,true),commLen=dv.getUint16(p+32,true),lho=dv.getUint32(p+42,true);
    const name=new TextDecoder().decode(u8.subarray(p+46,p+46+nameLen));entries[name]={method,compSize,lho};p+=46+nameLen+extraLen+commLen;}
  async function read(name){const e=entries[name];if(!e)return null;
    const lnLen=dv.getUint16(e.lho+26,true),lxLen=dv.getUint16(e.lho+28,true),start=e.lho+30+lnLen+lxLen,data=u8.subarray(start,start+e.compSize);
    const raw=e.method===8?await inflateRaw(data):data;return new TextDecoder("utf-8").decode(raw);}
  const ssXml=await read("xl/sharedStrings.xml")||"";const shared=[];
  ssXml.replace(/<si>([\s\S]*?)<\/si>/g,(m,inner)=>{const txt=(inner.match(/<t[^>]*>([\s\S]*?)<\/t>/g)||[]).map(t=>t.replace(/<[^>]+>/g,"")).join("");shared.push(decodeEntities(txt));return "";});
  let sheet="xl/worksheets/sheet1.xml";if(!entries[sheet])sheet=Object.keys(entries).find(k=>/^xl\/worksheets\/.*\.xml$/.test(k));
  const shXml=await read(sheet)||"";const R=[];
  shXml.replace(/<row[^>]*>([\s\S]*?)<\/row>/g,(m,inner)=>{const cells=[];
    inner.replace(/<c\b([^>]*?)(?:\/>|>([\s\S]*?)<\/c>)/g,(mm,attrs,body)=>{const rM=attrs.match(/r="([A-Z]+)\d+"/);if(!rM)return "";
      const col=colIndex(rM[1]),isS=/t="s"/.test(attrs),vM=body&&body.match(/<v>([\s\S]*?)<\/v>/),tM=body&&body.match(/<t[^>]*>([\s\S]*?)<\/t>/);
      let val="";if(isS&&vM)val=shared[parseInt(vM[1])]||"";else if(vM)val=vM[1];else if(tM)val=decodeEntities(tM[1]);
      cells[col]=String(val);return "";});
    R.push(cells);return "";});
  return R;
}
async function applyVolFile(f){
  const target=(curKey==="__pro"&&PROSEED)?"__pro":curKey;
  if(/\.xlsx$/i.test(f.name)){                                                                        // 네이버 키워드도구 다운로드 = 엑셀(.xlsx)
    try{const R=await readXlsx(await f.arrayBuffer());const map=rowsToVolMap(R);
      if(!Object.keys(map).length){toast("엑셀에서 키워드를 못 읽었습니다 — 키워드도구 다운로드 파일인지 확인");return;}
      importMap(map,target);}
    catch(e){toast("엑셀 읽기 실패: "+e.message);}
    return;
  }
  const rd=new FileReader();
  rd.onload=()=>{let t="";
    try{t=new TextDecoder("utf-8",{fatal:true}).decode(rd.result);}                                  // 정상 UTF-8
    catch(e){try{t=new TextDecoder("euc-kr").decode(rd.result);}catch(e2){t=new TextDecoder("utf-8").decode(rd.result);}}  // 실패 시 EUC-KR(네이버 CSV 대응)
    importKeywords(t);};
  rd.readAsArrayBuffer(f);
}
// 네이버 실시간 연동 — 팀 공유 프록시(기본) 우선, 로컬 서버 폴백
const DEFAULT_PROXY="https://modooflow-naver-proxy.angle0102.workers.dev";
function mfKeys(){try{return JSON.parse(localStorage.getItem("mf_keys")||"{}")||{};}catch(e){return {};}}
function adNum(v){if(v==null)return 0;const s=String(v);if(s.indexOf("<")>=0)return 5;const n=parseInt(s.replace(/[^0-9]/g,""),10);return isNaN(n)?0:n;}
(function(){try{const s=JSON.parse(localStorage.getItem("nv_keys")||"null");if(s){$("#nvApi").value=s.api||"";$("#nvCust").value=s.cust||"";if(s.sec)$("#nvSec").value=s.sec;$("#nvSave").checked=true;}}catch(e){}})();
$("#nvGo").addEventListener("click",()=>{
  const api=$("#nvApi").value.trim(),sec=$("#nvSec").value.trim(),cust=$("#nvCust").value.trim();
  const kk=mfKeys(),proxy=(kk.proxy||DEFAULT_PROXY||"").replace(/\/+$/,"");
  if(!proxy && (!api||!sec||!cust)){$("#nvStatus").textContent="키 3개(액세스라이선스·비밀키·CUSTOMER ID)를 모두 입력하세요";return;}
  if($("#nvSave").checked&&(api||sec||cust))localStorage.setItem("nv_keys",JSON.stringify({api,cust,sec}));else if(!$("#nvSave").checked)localStorage.removeItem("nv_keys");
  const prods = curKey==="__pro"&&PROSEED?[PROSEED] : (curKey==="__all"||curKey==="__pro")?PRODUCTS : [getP(curKey)];
  const seeds=[...new Set(prods.flatMap(p=>p.core.slice(0,2)))];
  const target=(curKey==="__pro"&&PROSEED)?"__pro":curKey;
  $("#nvStatus").textContent="네이버 조회 중… (시드 "+seeds.length+"개)";
  if(proxy){   // ① 프록시 경유(검색광고 HMAC은 워커가 서명) — 팀은 키 입력 불필요(워커 시크릿)
    const hd={};if(api)hd["x-mf-ad-key"]=api;if(sec)hd["x-mf-ad-secret"]=sec;if(cust)hd["x-mf-ad-customer"]=cust;
    const batches=[];for(let i=0;i<seeds.length;i+=5)batches.push(seeds.slice(i,i+5));
    Promise.all(batches.map(b=>fetch(proxy+"/searchad/keywordstool?showDetail=1&hintKeywords="+encodeURIComponent(b.join(",")),{headers:hd}).then(r=>r.json())))
      .then(rs=>{const map={};let err=null;
        rs.forEach(r=>{if(r&&!r.keywordList&&(r.error||r.message||r.title)){err=r.error||r.message||r.title;return;}
          ((r&&r.keywordList)||[]).forEach(it=>{const k=(it.relKeyword||"").trim();if(!k)return;map[k]={pc:adNum(it.monthlyPcQcCnt),mobile:adNum(it.monthlyMobileQcCnt),comp:it.compIdx||""};});});
        if(!Object.keys(map).length){$("#nvStatus").textContent="검색광고 오류: "+(err||"결과 없음");return;}
        importMap(map,target);
        $("#nvStatus").textContent="✔ 검색광고 실검색량 "+Object.keys(map).length+"개 병합됨(프록시)";
      }).catch(()=>{$("#nvStatus").innerHTML="실시간 연동 실패 — 허브 ⚙프록시 URL 또는 워커 시크릿(AD_KEY 등)을 확인하세요";});
    return;
  }
  // ② 로컬 연동 서버(폴백)
  fetch("/naver",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({apiKey:api,secret:sec,customer:cust,seeds})})
    .then(r=>r.json()).then(d=>{
      if(d.error){$("#nvStatus").textContent="네이버 오류: "+d.error;return;}
      const kw=d.keywords||{};importMap(kw,target);
      $("#nvStatus").textContent="✔ 네이버 연관키워드 "+Object.keys(kw).length+"개 병합됨";
    }).catch(()=>{$("#nvStatus").innerHTML="연동 서버를 못 찾았어요 — 터미널에서 <b>python3 scripts/naver_local_server.py</b> 실행 후 <b>http://localhost:8787/keyword-tool.html</b> 로 여세요";});
});

render();
