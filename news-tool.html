const $=(s,el=document)=>el.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
function toast(m){const t=$("#toast");t.textContent=m;t.classList.add("show");clearTimeout(t._t);t._t=setTimeout(()=>t.classList.remove("show"),1600);}
const getP=k=>PRODUCTS.find(p=>p.key===k);

function renderSidebar(){

  let h=item("__all","▦ 전체 개요",curKey==="__all");
  ["사이트","장기","일반"].forEach(cat=>{
    h+=`<div class="sb-cap">${cat}</div>`;
    PRODUCTS.filter(p=>p.cat===cat).forEach(p=>{h+=item(p.key,p.name,curKey===p.key);});
  });
  $("#sbNav").innerHTML=h;
}
function naverMore(p){return "https://search.naver.com/search.naver?where=news&sort=1&query="+encodeURIComponent(p.q);}
function newsPanel(p){

  const items=n.items.map(it=>`<li class="nm-item"><a href="${esc(it.url)}" target="_blank" rel="noopener">${esc(it.t)}<span class="gs">${esc(it.gist||"")}</span></a><span class="mt">${esc(it.src||"")}<br>${esc(it.date||"")}</span></li>`).join("");
  return `<div class="newsmon">
    <div class="nm-top"><span class="t">📰 ${esc(p.name)}</span>
      <span class="asof">${stamp}</span>
      <button class="nm-refresh" data-refresh="${esc(p.key)}" title="로컬 연동 서버로 최신 뉴스 가져오기">🔄 실시간 갱신</button>

    <div class="sec-lbl">카테고리별 동향 · 카드를 클릭하면 상세</div>
    <div class="ov-grid">${cards}</div>
    <div class="note"><b>카테고리 뉴스 모니터링</b> · 담당 상품과 같은 카테고리 기준으로 경쟁사·시장 뉴스를 모아 요약·분석합니다. 헤드라인·링크는 공개 뉴스, 요약·시사점은 마케팅 관점 분석(개인정보·영업비밀 미포함). 실시간 갱신은 로컬 연동 서버(<b>python3 scripts/naver_local_server.py</b>)로 동작합니다.</div>`;
}
function render(){curKey==="__all"?renderOverview():renderProduct();renderSidebar();window.scrollTo({top:0});}

/* 실시간 갱신 (로컬 연동 서버 /news) */
(function(){try{const s=JSON.parse(localStorage.getItem("nv_news")||"null");if(s){$("#nwId").value=s.id||"";if(s.sec)$("#nwSec").value=s.sec;$("#nwSave").checked=true;}}catch(e){}})();
function newsCred(){return {id:$("#nwId").value.trim(),sec:$("#nwSec").value.trim()};}
$("#nwSaveBtn").addEventListener("click",()=>{const c=newsCred();if(!c.id||!c.sec){toast("Client ID/Secret을 입력하세요");return;}
  if($("#nwSave").checked)localStorage.setItem("nv_news",JSON.stringify(c));else localStorage.removeItem("nv_news");toast("뉴스 API 키 저장됨 · 🔄 실시간 갱신 사용 가능");});
function fetchNews(p){const c=newsCred();const qs=[p.q].concat(p.extra||[]);   // 추가 키워드(예: 대형화재사고)도 함께 감시
  return Promise.all(qs.map(q=>fetch("/news",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({clientId:c.id,clientSecret:c.sec,query:q,display:6})}).then(r=>r.json())))
    .then(rs=>{const e=rs.find(r=>r&&r.error);if(e)return {error:e.error};
      const seen=new Set(),items=[];rs.forEach(r=>(r.items||[]).forEach(it=>{if(it&&it.url&&!seen.has(it.url)){seen.add(it.url);items.push(it);}}));
      return {items};});}
function needCred(){const c=newsCred();if(!c.id||!c.sec){toast("상단 '🔌 뉴스 실시간 갱신 설정'에 Client ID/Secret을 먼저 입력하세요");$("#livePanel").open=true;$("#livePanel").scrollIntoView({behavior:"smooth"});return false;}return true;}
function applyItems(key,items){const clean=(items||[]).filter(it=>it.t&&it.url);if(!clean.length)return 0;
  NEWSMON[key].items=clean;NEWSMON[key].live=new Date().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});return clean.length;}
function refreshOne(key,btn){const p=getP(key);if(!p||!NEWSMON[key])return;if(!needCred())return;
  if(btn){btn.disabled=true;btn.textContent="⏳ 가져오는 중…";}
  fetchNews(p).then(d=>{if(d.error){toast("뉴스 오류: "+d.error);return;}const c=applyItems(key,d.items);toast(c?("최신 뉴스 "+c+"건 갱신됨"):"가져온 뉴스가 없습니다");render();})
    .catch(()=>{toast("연동 서버를 못 찾았어요 — python3 scripts/naver_local_server.py 실행 후 localhost:8787로 여세요");if(btn){btn.disabled=false;btn.textContent="🔄 실시간 갱신";}});}
$("#refreshAll").addEventListener("click",()=>{if(!needCred())return;const btn=$("#refreshAll");btn.disabled=true;btn.textContent="⏳ 전체 갱신 중…";
  const keys=PRODUCTS.filter(p=>NEWSMON[p.key]).map(p=>p.key);let i=0,ok=0,fail=false;
  (function next(){if(i>=keys.length){btn.disabled=false;btn.textContent="🔄 전체 갱신";if(!fail){toast(ok+"개 카테고리 갱신 완료");render();}return;}
    const key=keys[i++];fetchNews(getP(key)).then(d=>{if(d.error){fail=true;toast("뉴스 오류: "+d.error);btn.disabled=false;btn.textContent="🔄 전체 갱신";return;}if(applyItems(key,d.items))ok++;setTimeout(next,120);})
      .catch(()=>{fail=true;toast("연동 서버를 못 찾았어요 — 로컬 서버를 켜고 localhost:8787로 여세요");btn.disabled=false;btn.textContent="🔄 전체 갱신";});})();});

document.addEventListener("click",e=>{
  const rb=e.target.closest(".nm-refresh");if(rb){e.stopPropagation();refreshOne(rb.dataset.refresh,rb);return;}
  const nav=e.target.closest("[data-key]");if(nav&&nav.dataset.key){curKey=nav.dataset.key;render();}
});
$("#themeBtn").addEventListener("click",()=>{const c=document.documentElement.getAttribute("data-theme");const d=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",d?"light":"dark");});
render();
</script>
</body>
</html>
