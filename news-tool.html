<title>Modooflow News · 카테고리 뉴스 모니터링</title>
<style>
:root{
  --brand:#0e9e8e; --brand-600:#0a7d70; --brand-50:#e2f5f2; --brand-tint:#eef8f6;
  --grad:linear-gradient(135deg,#0e9e8e 0%,#3fc9b6 100%);
  --ink:#152420; --ink-2:#42544e; --muted:#8299932e; --muted:#7f9088; --faint:#c1d0cb;
  --bg:#f2f6f4; --surface:#ffffff; --surface-2:#f6faf8; --line:#e2e9e6; --line-2:#eef3f1;
  --nav:#03C75A; --nav-bg:#e6f8ee; --nav-ink:#0a7c3e;
  --trx:#c47f12; --trx-bg:#fbf1de;
  --r:14px; --r-sm:10px; --sh:0 1px 2px rgba(16,40,34,.05),0 6px 20px rgba(16,40,34,.06); --sh-lg:0 12px 40px rgba(16,40,34,.12);
  --mono:ui-monospace,"SF Mono","Roboto Mono",Menlo,monospace;
  --sans:'Pretendard','Noto Sans KR','Nanum Gothic','Apple SD Gothic Neo',-apple-system,sans-serif;
}
@media(prefers-color-scheme:dark){:root{
  --brand:#3fc9b6; --brand-600:#5fd8c7; --brand-50:#0f2a26; --brand-tint:#0f231f;
  --ink:#eef4f1; --ink-2:#bccbc5; --muted:#82938c; --faint:#465049;
  --bg:#0e1613; --surface:#151d1a; --surface-2:#1a2421; --line:#28322e; --line-2:#212b28;
  --nav-bg:#0f2c1c; --trx-bg:#33270f;
  --sh:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35); --sh-lg:0 12px 40px rgba(0,0,0,.5);
}}
:root[data-theme="dark"]{--brand:#3fc9b6;--brand-600:#5fd8c7;--brand-50:#0f2a26;--brand-tint:#0f231f;--ink:#eef4f1;--ink-2:#bccbc5;--muted:#82938c;--faint:#465049;--bg:#0e1613;--surface:#151d1a;--surface-2:#1a2421;--line:#28322e;--line-2:#212b28;--nav-bg:#0f2c1c;--trx-bg:#33270f;--sh:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.35);--sh-lg:0 12px 40px rgba(0,0,0,.5);}
:root[data-theme="light"]{--brand:#0e9e8e;--brand-600:#0a7d70;--brand-50:#e2f5f2;--brand-tint:#eef8f6;--ink:#152420;--ink-2:#42544e;--muted:#7f9088;--faint:#c1d0cb;--bg:#f2f6f4;--surface:#fff;--surface-2:#f6faf8;--line:#e2e9e6;--line-2:#eef3f1;--nav-bg:#e6f8ee;--trx-bg:#fbf1de;--sh:0 1px 2px rgba(16,40,34,.05),0 6px 20px rgba(16,40,34,.06);--sh-lg:0 12px 40px rgba(16,40,34,.12);}
*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;word-break:keep-all;}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh;}
@media(max-width:820px){.app{grid-template-columns:1fr;}.sidebar{position:static!important;height:auto!important;}}
.sidebar{background:var(--surface);border-right:1px solid var(--line);display:flex;flex-direction:column;position:sticky;top:0;height:100vh;overflow-y:auto;}
.sb-brand{display:flex;align-items:center;gap:10px;padding:16px 16px 14px;border-bottom:1px solid var(--line);}
.brand-logo{width:34px;height:34px;border-radius:9px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:16px;font-weight:800;box-shadow:0 6px 16px rgba(14,158,142,.4);flex:0 0 auto;}
.bn{font-size:14px;font-weight:800;letter-spacing:-.02em;} .sb-brand small{display:block;font-size:9.5px;color:var(--muted);font-weight:600;margin-top:1px;}
.sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;}
.sb-cap{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:13px 8px 5px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink-2);cursor:pointer;text-align:left;width:100%;transition:.14s;}
.sb-item:hover{background:var(--surface-2);color:var(--ink);} .sb-item.on{background:var(--brand-50);color:var(--brand-600);}
.sb-item .kc{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;} .sb-item.on .kc{color:var(--brand-600);}
.sb-foot{padding:12px 14px;border-top:1px solid var(--line);font-size:9.5px;color:var(--muted);line-height:1.6;}
.sb-foot a{color:var(--brand-600);text-decoration:none;font-weight:700;}
.main{min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--line);}
.topbar #pt{font-size:16px;font-weight:800;letter-spacing:-.02em;} .topbar #pts{font-size:11.5px;color:var(--muted);margin-left:2px;}
.tr{margin-left:auto;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.btn{padding:8px 13px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);font-family:inherit;font-size:12px;font-weight:700;cursor:pointer;transition:.15s;}
.btn:hover{border-color:var(--brand);color:var(--brand-600);} .btn.primary{background:var(--grad);color:#fff;border:none;box-shadow:0 4px 12px rgba(14,158,142,.28);}
.btn:disabled{opacity:.55;cursor:default;}
.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.content{padding:22px 24px 60px;max-width:1080px;}
.imp{margin:16px 24px 0;background:var(--surface);border:1px dashed var(--brand);border-radius:var(--r-sm);box-shadow:var(--sh);}
.imp summary{cursor:pointer;font-size:12px;font-weight:800;color:var(--brand-600);padding:11px 15px;list-style:none;}
.imp summary::-webkit-details-marker{display:none;} .imp summary::before{content:"▸ ";} .imp[open] summary::before{content:"▾ ";}
.imp .ib{padding:0 15px 13px;}
.pform{display:flex;flex-direction:column;gap:8px;margin-top:4px;}
.pform input{font-family:inherit;font-size:12.5px;color:var(--ink);background:var(--surface-2);border:1px solid var(--line);border-radius:8px;padding:9px 11px;width:100%;}
.pform input:focus{outline:none;border-color:var(--brand);background:var(--surface);box-shadow:0 0 0 3px var(--brand-50);}
.pfrow{display:flex;gap:9px;align-items:center;flex-wrap:wrap;} .pfrow .hint{font-size:11px;color:var(--muted);}
.pfrow .hint a{color:var(--brand-600);font-weight:700;text-decoration:none;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px;}
@media(max-width:820px){.kpi-row{grid-template-columns:1fr 1fr;}}
.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);}
.kpi .n{font-family:var(--mono);font-size:24px;font-weight:800;letter-spacing:-.03em;font-variant-numeric:tabular-nums;line-height:1;}
.kpi .l{font-size:11px;color:var(--muted);font-weight:700;margin-top:6px;}
.seedbar{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 18px;margin-bottom:18px;box-shadow:var(--sh);}
.seedbar h2{font-size:17px;font-weight:800;letter-spacing:-.02em;}
.seedbar .st{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.tier{font-size:10px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--brand-50);color:var(--brand-600);}
.sec-lbl{font-size:11px;font-weight:800;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;margin:20px 0 11px;}
/* 뉴스 카드 */
.newsmon{border:1px solid var(--line);border-radius:var(--r);background:var(--surface);overflow:hidden;box-shadow:var(--sh);}
.nm-top{display:flex;align-items:center;gap:9px;padding:13px 16px;border-bottom:1px solid var(--line-2);background:var(--surface-2);flex-wrap:wrap;}
.nm-top .t{font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:7px;}
.nm-top .asof{margin-left:auto;font-size:10.5px;color:var(--muted);font-family:var(--mono);}
.nm-top .more{font-size:11px;font-weight:700;color:var(--nav-ink);text-decoration:none;white-space:nowrap;}
.nm-top .more:hover{text-decoration:underline;}
.nm-refresh{font-family:inherit;font-size:11px;font-weight:800;color:var(--nav-ink);background:var(--nav-bg);border:1px solid var(--nav-ink);border-radius:8px;padding:4px 9px;cursor:pointer;white-space:nowrap;transition:.14s;}
.nm-refresh:hover{background:var(--nav-ink);color:#fff;} .nm-refresh:disabled{opacity:.55;cursor:default;}
.nm-body{padding:14px 16px;}
.nm-box{border-radius:var(--r-sm);padding:11px 13px;font-size:12px;line-height:1.72;}
.nm-sum{background:var(--brand-tint);border:1px solid var(--brand-50);color:var(--ink-2);}
.nm-ins{background:var(--trx-bg);border:1px solid #f0e0bf;color:#7a5610;margin-top:9px;}
:root[data-theme="dark"] .nm-ins{color:#e6c98a;border-color:#4a3a1a;}
@media(prefers-color-scheme:dark){.nm-ins{color:#e6c98a;border-color:#4a3a1a;}}
.nm-box b{font-weight:800;}
.nm-box .lb{display:inline-block;font-size:10px;font-weight:800;letter-spacing:.3px;padding:1px 7px;border-radius:99px;margin-right:7px;vertical-align:1px;}
.nm-sum .lb{background:var(--brand);color:#fff;} .nm-ins .lb{background:#c47f12;color:#fff;}
.nm-list{list-style:none;margin:13px 0 0;padding:0;}
.nm-item{display:flex;gap:10px;padding:9px 2px;border-top:1px solid var(--line-2);font-size:12.5px;line-height:1.55;}
.nm-item:first-child{border-top:0;}
.nm-item a{color:var(--ink);text-decoration:none;font-weight:700;flex:1;}
.nm-item a:hover{color:var(--brand-600);text-decoration:underline;}
.nm-item .mt{font-size:10.5px;color:var(--muted);white-space:nowrap;font-family:var(--mono);padding-top:2px;text-align:right;}
.nm-item .gs{display:block;font-size:11px;font-weight:500;color:var(--ink-2);margin-top:2px;}
/* 🔥 수요 트리거 */
.nm-trg{background:linear-gradient(180deg,color-mix(in srgb,#e2564a 7%,var(--surface)),var(--surface));border:1px solid color-mix(in srgb,#e2564a 30%,var(--line));}
.nm-trg .lb{background:#fdecea;color:#c23b2e;} .nm-trg .lb small{font-weight:600;color:var(--muted);margin-left:5px;letter-spacing:0;}
.trg-list{display:grid;grid-template-columns:repeat(auto-fill,minmax(210px,1fr));gap:9px;margin-top:10px;}
.trg{display:flex;flex-direction:column;gap:2px;padding:10px 12px;background:var(--surface);border:1px solid var(--line);border-radius:10px;text-decoration:none;transition:.14s;}
.trg:hover{border-color:#e2564a;transform:translateY(-1px);box-shadow:var(--sh);}
.trg b{font-size:12.5px;font-weight:800;color:var(--ink);line-height:1.35;} .trg span{font-size:11px;color:var(--ink-2);line-height:1.45;} .trg em{font-size:10.5px;font-style:normal;font-weight:700;color:#c23b2e;margin-top:2px;}
.sig-live{margin:9px 0 2px;padding:8px 12px;border-radius:9px;background:#fff4f2;border:1px solid #f3b7ad;color:#a5291b;font-size:11.5px;font-weight:600;line-height:1.5;}
.sig-live b{font-weight:800;color:#8f1d10;} .sig-live .src{color:var(--muted);font-weight:600;}
@media(prefers-color-scheme:dark){.sig-live{background:#2a1512;border-color:#5a231c;color:#f3b7ad;} .sig-live b{color:#f7c9c1;}}
/* 카드뉴스 */
.nm-cards{display:grid;grid-template-columns:repeat(auto-fill,minmax(232px,1fr));gap:12px;margin-top:14px;}
.nm-card{display:flex;flex-direction:column;gap:7px;padding:14px 15px;background:var(--surface);border:1px solid var(--line);border-radius:12px;text-decoration:none;box-shadow:var(--sh);transition:.15s;position:relative;overflow:hidden;}
.nm-card:hover{border-color:var(--brand);box-shadow:var(--sh-lg);transform:translateY(-2px);}
.nm-card.hot{border-color:color-mix(in srgb,#e2564a 45%,var(--line));background:linear-gradient(180deg,color-mix(in srgb,#e2564a 5%,var(--surface)),var(--surface));}
.nm-card-h{display:flex;align-items:center;gap:7px;font-size:10px;}
.nm-card-h .num{font-family:var(--mono);font-weight:800;color:var(--faint);font-size:12px;}
.nm-card-h .mt{margin-left:auto;color:var(--muted);font-family:var(--mono);}
.hotbadge{font-size:9.5px;font-weight:800;color:#fff;background:#e2564a;padding:2px 7px;border-radius:99px;letter-spacing:.2px;}
.nm-card-t{font-size:13px;font-weight:800;color:var(--ink);line-height:1.4;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical;overflow:hidden;}
.nm-card:hover .nm-card-t{color:var(--brand-600);}
.nm-card-g{font-size:11px;font-weight:500;color:var(--ink-2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden;}
.ov-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(260px,1fr));gap:14px;}
.ov-card{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);cursor:pointer;transition:.15s;}
.ov-card:hover{border-color:var(--brand);box-shadow:var(--sh-lg);transform:translateY(-1px);}
.ov-card .ct{font-size:13.5px;font-weight:800;display:flex;align-items:center;gap:7px;justify-content:space-between;}
.ov-card .cs{font-size:12px;color:var(--ink-2);margin-top:7px;line-height:1.6;}
.note{font-size:11.5px;color:var(--ink-2);line-height:1.7;margin-top:20px;padding:13px 15px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);}
.note b{font-weight:800;} .note a{color:var(--brand-600);font-weight:700;text-decoration:none;}
.crumb{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted);text-decoration:none;margin-bottom:2px;}
.crumb:hover{color:var(--brand-600);}
.toast{position:fixed;bottom:22px;left:50%;transform:translateX(-50%) translateY(20px);background:var(--ink);color:var(--bg);padding:10px 18px;border-radius:10px;font-size:12.5px;font-weight:700;opacity:0;pointer-events:none;transition:.25s;z-index:50;box-shadow:var(--sh-lg);}
.toast.show{opacity:1;transform:translateX(-50%) translateY(0);}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
<style id="mf-saas-theme">
/* Clean SaaS Light — 통일 뉴트럴 테마 + Pretendard 자체호스팅 (액센트색은 각 툴 유지) */
@font-face{font-family:'Pretendard Variable';font-weight:45 920;font-style:normal;font-display:swap;src:url('fonts/PretendardVariable.woff2') format('woff2-variations');}

 --ink:#0f1729;--ink-2:#4a5163;--muted:#8b93a3;--faint:#cdd2db;

<div class="app">
  <aside class="sidebar">
    <div class="sb-brand"><div class="brand-logo">📰</div>
      <div><div class="bn">Modooflow News</div><small>카테고리 뉴스 모니터링</small></div></div>

<script>
"use strict";
/* 담당 상품(카테고리) — 키워드/ SEO 도구와 동일 집합 */
const PRODUCTS=[
 {key:"home",cat:"사이트",name:"다이렉트 홈(브랜드)",tier:"대형",q:"한화손해보험 다이렉트"},
 {key:"hrmf",cat:"장기",name:"주택화재보험",tier:"대형",q:"주택화재보험",extra:["대형화재사고"]},
 {key:"golf",cat:"장기",name:"골프보험",tier:"중형",q:"골프보험",extra:["홀인원"]},

    <div class="sec-lbl">📰 최신 헤드라인 (상품 카테고리)</div>
    <div class="newsmon"><div class="nm-body"><ul class="nm-list" style="margin-top:0">${top}</ul></div></div>
    <div class="sec-lbl">상품 카테고리별 동향 · 카드를 클릭하면 상세(🔥=수요 트리거)</div>
    <div class="ov-grid">${cards}</div>
    <div class="note"><b>카테고리 뉴스 모니터링</b> · 담당 상품 + 업계·경쟁사 동향을 요약·분석합니다. 헤드라인·링크는 공개 뉴스, 요약·시사점은 마케팅 관점 분석(개인정보·영업비밀 미포함). 실시간 갱신은 <b>팀 공유 프록시</b>(허브 ⚙) 또는 로컬 서버로 동작합니다.</div>`;
}
function render(){curKey==="__all"?renderOverview():renderProduct();renderSidebar();window.scrollTo({top:0});}

/* 실시간 갱신 (로컬 연동 서버 /news) */
(function(){try{const s=JSON.parse(localStorage.getItem("nv_news")||"null");if(s){$("#nwId").value=s.id||"";if(s.sec)$("#nwSec").value=s.sec;$("#nwSave").checked=true;}}catch(e){}})();
function newsCred(){return {id:$("#nwId").value.trim(),sec:$("#nwSec").value.trim()};}
$("#nwSaveBtn").addEventListener("click",()=>{const c=newsCred();if(!c.id||!c.sec){toast("Client ID/Secret을 입력하세요");return;}
  if($("#nwSave").checked)localStorage.setItem("nv_news",JSON.stringify(c));else localStorage.removeItem("nv_news");toast("뉴스 API 키 저장됨 · 🔄 실시간 갱신 사용 가능");});
/* 팀 공유 프록시 기본값 — 팀원은 브라우저에 키 입력 없이 이 URL로 실시간 데이터를 받음.
   키는 이 워커에 서버 시크릿(env.NAVER_ID/SECRET)으로 저장되어 팀 전원 공유. ⚙설정창 값은 개인 override용. */
const DEFAULT_PROXY="https://modooflow-naver-proxy.angle0102.workers.dev";
function mfKeys(){try{return JSON.parse(localStorage.getItem("mf_keys")||"{}")||{};}catch(e){return {};}}
function naverCreds(){const k=mfKeys(),c=newsCred();return {id:k.naverId||c.id,sec:k.naverSecret||c.sec,proxy:(k.proxy||DEFAULT_PROXY||"").replace(/\/+$/,"")};}
function stripTag(s){return String(s||"").replace(/<[^>]*>/g,"").replace(/&quot;/g,'"').replace(/&amp;/g,"&").replace(/&lt;/g,"<").replace(/&gt;/g,">").replace(/&#39;/g,"'").trim();}
function hostOf(u){try{return new URL(u).hostname.replace(/^www\./,"");}catch(e){return "";}}
function fetchNews(p){const {id,sec,proxy}=naverCreds();const qs=[p.q].concat(p.extra||[]);   // 추가 키워드(예: 대형화재사고)도 함께 감시
  if(proxy){   // ① 프록시 경유(기본) — 워커 시크릿으로 팀 공유. 개인 키(id/sec) 있으면 헤더로 override
    const hd={};if(id)hd["x-mf-naver-id"]=id;if(sec)hd["x-mf-naver-secret"]=sec;
    return Promise.all(qs.map(q=>fetch(proxy+"/naver/v1/search/news.json?display=6&sort=date&query="+encodeURIComponent(q),
        {headers:hd}).then(r=>r.json())))
      .then(rs=>{const e=rs.find(r=>r&&(r.error||r.errorMessage));if(e)return {error:e.error||e.errorMessage};
        const seen=new Set(),items=[];
        rs.forEach(r=>((r&&r.items)||[]).forEach(it=>{const url=it.link||it.originallink;if(url&&!seen.has(url)){seen.add(url);
          items.push({t:stripTag(it.title),url:url,src:hostOf(it.originallink||it.link),date:it.pubDate?new Date(it.pubDate).toISOString().slice(0,10):""});}}));
        return {items};});
  }
  // ② 로컬 연동 서버(폴백 · 프록시 URL을 비웠을 때만)
  return Promise.all(qs.map(q=>fetch("/news",{method:"POST",headers:{"Content-Type":"application/json"},body:JSON.stringify({clientId:id,clientSecret:sec,query:q,display:6})}).then(r=>r.json())))
    .then(rs=>{const e=rs.find(r=>r&&r.error);if(e)return {error:e.error};
      const seen=new Set(),items=[];rs.forEach(r=>(r.items||[]).forEach(it=>{if(it&&it.url&&!seen.has(it.url)){seen.add(it.url);items.push(it);}}));
      return {items};});}
function needCred(){const c=naverCreds();if(c.proxy)return true;   // 프록시가 키를 들고 있으므로 브라우저 키 불필요
  if(!c.id||!c.sec){toast("실시간 연동: 워커 시크릿(팀 공유) 또는 ⚙설정창 키가 필요합니다");$("#livePanel").open=true;$("#livePanel").scrollIntoView({behavior:"smooth"});return false;}return true;}
function applyItems(key,items){const clean=(items||[]).filter(it=>it.t&&it.url);if(!clean.length)return 0;
  NEWSMON[key].items=clean;NEWSMON[key].live=new Date().toLocaleString("ko-KR",{month:"2-digit",day:"2-digit",hour:"2-digit",minute:"2-digit"});return clean.length;}
function refreshOne(key,btn){const p=getP(key);if(!p||!NEWSMON[key])return;if(!needCred())return;
  if(btn){btn.disabled=true;btn.textContent="⏳ 가져오는 중…";}
  fetchNews(p).then(d=>{if(d.error){toast("뉴스 오류: "+d.error);return;}const c=applyItems(key,d.items);toast(c?("최신 뉴스 "+c+"건 갱신됨"):"가져온 뉴스가 없습니다");render();})
    .catch(()=>{toast("실시간 연동 실패 — 허브 ⚙프록시 URL·키를 확인하세요(또는 로컬 서버 localhost:8787)");if(btn){btn.disabled=false;btn.textContent="🔄 실시간 갱신";}});}
$("#refreshAll").addEventListener("click",()=>{if(!needCred())return;const btn=$("#refreshAll");btn.disabled=true;btn.textContent="⏳ 전체 갱신 중…";
  const keys=ALLMON.filter(p=>NEWSMON[p.key]).map(p=>p.key);let i=0,ok=0,fail=false;
  (function next(){if(i>=keys.length){btn.disabled=false;btn.textContent="🔄 전체 갱신";if(!fail){toast(ok+"개 카테고리 갱신 완료");render();}return;}
    const key=keys[i++];fetchNews(getP(key)).then(d=>{if(d.error){fail=true;toast("뉴스 오류: "+d.error);btn.disabled=false;btn.textContent="🔄 전체 갱신";return;}if(applyItems(key,d.items))ok++;setTimeout(next,120);})
      .catch(()=>{fail=true;toast("실시간 연동 실패 — 허브 ⚙프록시 URL·키를 확인하세요(또는 로컬 서버)");btn.disabled=false;btn.textContent="🔄 전체 갱신";});})();});

document.addEventListener("click",e=>{
  const rb=e.target.closest(".nm-refresh");if(rb){e.stopPropagation();refreshOne(rb.dataset.refresh,rb);return;}
  const nav=e.target.closest("[data-key]");if(nav&&nav.dataset.key){curKey=nav.dataset.key;render();}
});
$("#themeBtn").addEventListener("click",()=>{const c=document.documentElement.getAttribute("data-theme");const d=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",d?"light":"dark");});
render();
fetch("data/signals.json",{cache:"no-store"}).then(r=>r.ok?r.json():null).then(s=>{if(s&&s.triggers){SIGNALS=s;render();}}).catch(()=>{}); // 실시간 수요 신호(있으면)
</script>
</body>
</html>
