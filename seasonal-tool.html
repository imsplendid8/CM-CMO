  --ink:#f4ecf0; --ink-2:#cbbcc4; --muted:#9a8892; --faint:#5a4650;
  --bg:#161016; --surface:#1e1720; --surface-2:#241b27; --line:#332632; --line-2:#2a1f28;
  --nav-bg:#0f2c1c; --spring-bg:#122a16; --summer-bg:#322109; --fall-bg:#31190e; --winter-bg:#122438; --year-bg:#221a33;

:root[data-theme="dark"]{--brand:#ef7a9c;--brand-600:#f398b3;--brand-50:#3a1a26;--brand-tint:#2c1620;--ink:#f4ecf0;--ink-2:#cbbcc4;--muted:#9a8892;--faint:#5a4650;--bg:#161016;--surface:#1e1720;--surface-2:#241b27;--line:#332632;--line-2:#2a1f28;--nav-bg:#0f2c1c;--spring-bg:#122a16;--summer-bg:#322109;--fall-bg:#31190e;--winter-bg:#122438;--year-bg:#221a33;--sh:0 1px 2px rgba(0,0,0,.3),0 6px 20px rgba(0,0,0,.4);--sh-lg:0 12px 40px rgba(0,0,0,.55);}

*{margin:0;padding:0;box-sizing:border-box;}
body{font-family:var(--sans);background:var(--bg);color:var(--ink);line-height:1.55;-webkit-font-smoothing:antialiased;letter-spacing:-.01em;word-break:keep-all;}
.app{display:grid;grid-template-columns:250px 1fr;min-height:100vh;}

.brand-logo{width:34px;height:34px;border-radius:9px;background:var(--grad);color:#fff;display:flex;align-items:center;justify-content:center;font-size:15px;font-weight:800;box-shadow:0 6px 16px rgba(214,69,111,.4);flex:0 0 auto;}

.sb-nav{flex:1;padding:10px;display:flex;flex-direction:column;gap:2px;}
.sb-cap{font-size:9.5px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.08em;padding:13px 8px 5px;}
.sb-item{display:flex;align-items:center;gap:9px;padding:9px 10px;border-radius:9px;border:none;background:none;font-family:inherit;font-size:12.5px;font-weight:700;color:var(--ink-2);cursor:pointer;text-align:left;width:100%;transition:.14s;}
.sb-item:hover{background:var(--surface-2);color:var(--ink);} .sb-item.on{background:var(--brand-50);color:var(--brand-600);}
.sb-item .kc{margin-left:auto;font-family:var(--mono);font-size:10px;color:var(--muted);font-weight:700;} .sb-item.on .kc{color:var(--brand-600);}

.main{min-width:0;display:flex;flex-direction:column;}
.topbar{position:sticky;top:0;z-index:20;display:flex;align-items:center;gap:12px;flex-wrap:wrap;padding:12px 24px;background:var(--surface);border-bottom:1px solid var(--line);}

.icon-btn{width:34px;height:34px;border-radius:9px;border:1px solid var(--line);background:var(--surface);color:var(--ink-2);cursor:pointer;font-size:14px;display:flex;align-items:center;justify-content:center;}
.content{padding:22px 24px 60px;max-width:1140px;}
.kpi-row{display:grid;grid-template-columns:repeat(4,1fr);gap:13px;margin-bottom:18px;}

.kpi{background:var(--surface);border:1px solid var(--line);border-radius:var(--r);padding:15px 16px;box-shadow:var(--sh);}
.kpi .n{font-family:var(--mono);font-size:22px;font-weight:800;letter-spacing:-.03em;line-height:1;}

.sec-lbl{font-size:11px;font-weight:800;color:var(--ink-2);text-transform:uppercase;letter-spacing:.05em;margin:22px 0 11px;display:flex;align-items:center;gap:8px;}
.sec-lbl .now{background:var(--brand);color:#fff;font-size:10px;padding:1px 8px;border-radius:99px;letter-spacing:0;}

.now-card{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--sc);border-radius:var(--r);padding:14px 16px;box-shadow:var(--sh);cursor:pointer;transition:.15s;}

.now-card .h{display:flex;align-items:center;gap:8px;justify-content:space-between;}
.now-card .pn{font-size:13.5px;font-weight:800;} .now-card .tag{font-size:10.5px;font-weight:800;padding:2px 8px;border-radius:99px;background:var(--scb);color:var(--sc);}
.now-card .why{font-size:11.5px;color:var(--ink-2);margin:8px 0;line-height:1.6;}
.chips{display:flex;flex-wrap:wrap;gap:6px;}
.chip{font-size:11px;font-weight:700;background:var(--surface-2);border:1px solid var(--line);color:var(--ink-2);padding:3px 9px;border-radius:99px;text-decoration:none;transition:.13s;}
.chip:hover{border-color:var(--brand);color:var(--brand-600);}
.now-card .act{font-size:11px;color:var(--nav-ink);font-weight:700;margin-top:9px;background:var(--nav-bg);padding:6px 9px;border-radius:7px;line-height:1.5;}
/* 히트맵 */
.hm-wrap{overflow-x:auto;background:var(--surface);border:1px solid var(--line);border-radius:var(--r);box-shadow:var(--sh);padding:6px;}

table.hm th,table.hm td{padding:0;text-align:center;}
table.hm thead th{font-size:10.5px;font-weight:800;color:var(--muted);padding:7px 0;}
table.hm thead th.mnow{color:var(--brand);}
table.hm td.pname,table.hm th.pname{text-align:left;font-size:12px;font-weight:700;color:var(--ink);white-space:nowrap;padding:0 12px 0 8px;min-width:130px;}
table.hm td.pname.main::after{content:"★";color:var(--brand);font-size:9px;margin-left:4px;vertical-align:2px;}
.cell{height:30px;border:2px solid var(--surface);border-radius:6px;font-size:9px;font-weight:800;color:#fff;display:flex;align-items:center;justify-content:center;cursor:pointer;line-height:1;overflow:hidden;}
.cell.on{}
.mcol-now{background:var(--brand-50);}
.rowline td{border-bottom:1px solid var(--line-2);}
.lg{display:flex;flex-wrap:wrap;gap:10px 16px;margin-top:12px;font-size:11px;color:var(--ink-2);}

.ytl .mo.now{outline:2px solid var(--brand);outline-offset:-2px;color:var(--brand);}
.wins{display:flex;flex-direction:column;gap:13px;}
.win{background:var(--surface);border:1px solid var(--line);border-left:4px solid var(--sc);border-radius:var(--r);box-shadow:var(--sh);overflow:hidden;}
.win-h{display:flex;align-items:center;gap:9px;padding:12px 16px;background:var(--scb);flex-wrap:wrap;}
.win-h .mrange{font-family:var(--mono);font-size:11px;font-weight:800;color:var(--sc);background:var(--surface);padding:2px 8px;border-radius:6px;}
.win-h .tag{font-size:13px;font-weight:800;color:var(--ink);}
.win-h .season{font-size:10.5px;font-weight:800;color:var(--sc);margin-left:auto;}
.win-b{padding:13px 16px;}
.win-b .why{font-size:12.5px;color:var(--ink-2);line-height:1.7;}
.win-b .kwl{margin:11px 0;}
.win-b .act{font-size:11.5px;color:var(--nav-ink);font-weight:700;background:var(--nav-bg);padding:8px 11px;border-radius:8px;line-height:1.6;}
.win-b .act b{color:var(--nav-ink);}
.mini-lbl{font-size:10px;font-weight:800;color:var(--muted);text-transform:uppercase;letter-spacing:.04em;margin-bottom:6px;display:block;}
.note{font-size:11.5px;color:var(--ink-2);line-height:1.7;margin-top:18px;padding:13px 15px;background:var(--surface-2);border:1px solid var(--line);border-radius:var(--r-sm);}
.note b{font-weight:800;} .note a{color:var(--brand-600);font-weight:700;text-decoration:none;}
.crumb{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:700;color:var(--muted);text-decoration:none;}
.crumb:hover{color:var(--brand-600);}
.datalab{font-size:11px;font-weight:700;color:var(--brand-600);text-decoration:none;} .datalab:hover{text-decoration:underline;}
@media(prefers-reduced-motion:reduce){*{animation:none!important;transition:none!important;}}
</style>
</head>

const $=(s,el=document)=>el.querySelector(s);
const esc=s=>String(s).replace(/[&<>"']/g,m=>({"&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;"}[m]));
const getP=k=>PRODUCTS.find(p=>p.key===k);
const winsOf=k=>SEASONAL[k]||[];
function mrange(ms){const s=ms.slice().sort((a,b)=>a-b);// 연속 구간 표기
  let out=[],i=0;while(i<s.length){let j=i;while(j+1<s.length&&s[j+1]===s[j]+1)j++;out.push(s[i]===s[j]?`${s[i]}월`:`${s[i]}~${s[j]}월`);i=j+1;}return out.join(", ");}
function searchUrl(kw){return "https://search.naver.com/search.naver?query="+encodeURIComponent(kw);}
const DATALAB="https://datalab.naver.com/keyword/trendSearch.naver";
let curKey="__all";

function renderSidebar(){
  const item=(key,label,cnt,on)=>`<button class="sb-item${on?" on":""}" data-key="${key}"><span>${esc(label)}</span><span class="kc">${cnt}</span></button>`;
  let h=item("__all","▦ 연간 캘린더","",curKey==="__all");
  ["사이트","장기","일반"].forEach(cat=>{h+=`<div class="sb-cap">${cat}</div>`;
    PRODUCTS.filter(p=>p.cat===cat).forEach(p=>{h+=item(p.key,p.name,winsOf(p.key).length,curKey===p.key);});});
  $("#sbNav").innerHTML=h;
}
function chip(kw){return `<a class="chip" href="${searchUrl(kw)}" target="_blank" rel="noopener">${esc(kw)}</a>`;}

function renderOverview(){
  $("#pt").textContent="연간 시즈널 캘린더"; $("#pts").textContent=`· ${MONTHS[CURM-1]} 기준`;
  // 이번 달 주목: curMonth 포함 윈도우
  const now=[];PRODUCTS.forEach(p=>winsOf(p.key).forEach(w=>{if(w.m.includes(CURM))now.push({p,w});}));
  now.sort((a,b)=>(MAIN.has(b.p.key)?1:0)-(MAIN.has(a.p.key)?1:0));
  const nextM=CURM%12+1;const next=[];PRODUCTS.forEach(p=>winsOf(p.key).forEach(w=>{if(w.m.includes(nextM)&&!w.m.includes(CURM))next.push(p.name+" · "+w.tag);}));
  const totalWins=PRODUCTS.reduce((s,p)=>s+winsOf(p.key).length,0);
  const nowCards=now.map(({p,w})=>{const s=seasonOf(w.m),sc=SEASON[s];
    return `<div class="now-card" data-key="${p.key}" style="--sc:${sc[1]};--scb:${sc[2]}">
      <div class="h"><span class="pn">${esc(p.name)}${MAIN.has(p.key)?" ★":""}</span><span class="tag">${esc(w.tag)}</span></div>
      <div class="why">${esc(w.why)}</div>
      <div class="chips">${w.kws.slice(0,5).map(chip).join("")}</div>
      <div class="act">⏱ ${esc(w.act)}</div></div>`;}).join("");
  const kpi=(n,l)=>`<div class="kpi"><div class="n">${n}</div><div class="l">${l}</div></div>`;
  $("#content").innerHTML=`
    <div class="kpi-row">${kpi(now.length,MONTHS[CURM-1]+" 주목 이슈")}${kpi(totalWins,"연간 시즈널 이슈")}${kpi(now.filter(x=>MAIN.has(x.p.key)).length,"이번달 메인상품")}${kpi(MONTHS[nextM-1],"다음 선제대응")}</div>
    <div class="sec-lbl">📌 이번 달 주목 <span class="now">${MONTHS[CURM-1]}</span> <span style="font-weight:600;color:var(--muted);text-transform:none">· ★ = 메인 상품군</span></div>
    ${now.length?`<div class="now-grid">${nowCards}</div>`:`<div class="note" style="margin-top:0">이번 달 특이 시즌 이슈가 없습니다. 아래 연간 히트맵에서 다가오는 시즌을 확인하세요.</div>`}
    ${next.length?`<div class="note"><b>다음 달(${MONTHS[nextM-1]}) 선제 대응 예고</b> · ${next.map(esc).join(" · ")} → 지금 콘텐츠·검색광고 준비를 시작하세요.</div>`:""}
    <div class="sec-lbl" style="margin-top:24px">🗓️ 연간 히트맵 <span style="font-weight:600;color:var(--muted);text-transform:none">· 상품 × 월 · 셀 클릭 시 상세</span></div>
    ${heatmap()}
    <div class="lg">${Object.keys(SEASON).map(s=>`<span><i style="background:${SEASON[s][1]}"></i>${SEASON[s][0]}</span>`).join("")}<span style="color:var(--brand);font-weight:700">▮ ${MONTHS[CURM-1]} (이번 달)</span></div>`;
}
function heatmap(){
  let head=`<tr><th class="pname">상품 \\ 월</th>`+MONTHS.map((m,i)=>`<th class="${i+1===CURM?"mnow":""}">${i+1}</th>`).join("")+`</tr>`;
  let body=PRODUCTS.map(p=>{
    // 월별 커버 윈도우 찾기
    const cells=[];for(let m=1;m<=12;m++){
      const w=winsOf(p.key).find(w=>w.m.includes(m));
      if(w){const s=seasonOf(w.m),sc=SEASON[s];cells.push(`<td class="${m===CURM?"mcol-now":""}" style="padding:2px"><div class="cell on" data-key="${p.key}" title="${esc(w.tag)} (${esc(mrange(w.m))})" style="background:${sc[1]}">${m===CURM?"●":""}</div></td>`);}
      else cells.push(`<td class="${m===CURM?"mcol-now":""}" style="padding:2px"><div class="cell" data-key="${p.key}" style="background:var(--surface-2);border-color:var(--line)"></div></td>`);
    }
    return `<tr class="rowline"><td class="pname${MAIN.has(p.key)?" main":""}" data-key="${p.key}" style="cursor:pointer">${esc(p.name)}</td>${cells.join("")}</tr>`;
  }).join("");
  return `<div class="hm-wrap"><table class="hm"><thead>${head}</thead><tbody>${body}</tbody></table></div>`;
}
function renderProduct(){
  const p=getP(curKey);const wins=winsOf(p.key);
  $("#pt").textContent=p.name; $("#pts").textContent=`· 연간 시즈널 이슈 ${wins.length}건`;
  // 연간 타임라인: 각 월에 커버 여부
  const tl=MONTHS.map((mm,i)=>{const m=i+1;const w=wins.find(w=>w.m.includes(m));const s=w?seasonOf(w.m):null;
    return `<div class="mo${m===CURM?" now":""}" ${w?`style="background:${SEASON[s][2]};color:${SEASON[s][1]};border-color:${SEASON[s][1]}"`:""} title="${w?esc(w.tag):""}">${m}</div>`;}).join("");
  const cards=wins.map(w=>{const s=seasonOf(w.m),sc=SEASON[s];const active=w.m.includes(CURM);
    return `<div class="win" style="--sc:${sc[1]};--scb:${sc[2]}">
      <div class="win-h"><span class="mrange">${esc(mrange(w.m))}</span><span class="tag">${esc(w.tag)}</span>
        <span class="season">${sc[0]}${active?" · 이번 달 ●":""}</span></div>
      <div class="win-b">
        <div class="why">${esc(w.why)}</div>
        <div class="kwl"><span class="mini-lbl">이슈 키워드 <a class="datalab" href="${DATALAB}" target="_blank" rel="noopener">데이터랩에서 추세 검증 ↗</a></span><div class="chips">${w.kws.map(chip).join("")}</div></div>
        <div class="act">⏱ <b>선제 대응</b> · ${esc(w.act)}</div>
      </div></div>`;}).join("");
  $("#content").innerHTML=`
    <div class="seedbar"><h2>${esc(p.name)}${MAIN.has(p.key)?' <span style="font-size:11px;color:var(--brand);font-weight:800">★ 메인 상품군</span>':""}</h2>
      <div class="ytl">${tl}</div></div>
    <div class="sec-lbl">시즌별 이슈 · 키워드 · 선제 대응</div>
    <div class="wins">${cards}</div>
    <div class="note"><b>활용</b> · 각 시즌 <b>선제 대응 시점</b>(보통 피크 3~4주 전)에 맞춰 <b>SEO 태그·검색광고 키워드·뉴스 모니터링</b>을 준비하세요. 키워드 칩은 네이버 검색, <b>데이터랩</b> 링크로 실제 검색 추세를 검증할 수 있습니다.</div>`;
}
function render(){curKey==="__all"?renderOverview():renderProduct();renderSidebar();window.scrollTo({top:0});}
document.addEventListener("click",e=>{const nav=e.target.closest("[data-key]");if(nav&&nav.dataset.key){curKey=nav.dataset.key;render();}});
$("#themeBtn").addEventListener("click",()=>{const c=document.documentElement.getAttribute("data-theme");const d=c?c==="dark":matchMedia("(prefers-color-scheme:dark)").matches;document.documentElement.setAttribute("data-theme",d?"light":"dark");});
render();
</script>
</body>
